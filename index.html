      <button class="btn btn-outline btn-sm" style="margin-top:8px;" onclick="copyOrderSQL()">📋 SQL 복사</button>
    </div>
    <div class="divider"></div>
    <button class="btn btn-danger" onclick="resetApp()">로그아웃</button>
  `);
}

function copyOrderSQL(){
  const sql=`-- 제품 분류 컬럼
ALTER TABLE products ADD COLUMN IF NOT EXISTS classification TEXT DEFAULT '';
-- 납품서 신규 컬럼
ALTER TABLE sales_orders ADD COLUMN IF NOT EXISTS order_type TEXT DEFAULT 'sale';
ALTER TABLE sales_orders ADD COLUMN IF NOT EXISTS location_id UUID;
ALTER TABLE sales_orders ADD COLUMN IF NOT EXISTS location_name TEXT DEFAULT '';
ALTER TABLE sales_orders ADD COLUMN IF NOT EXISTS discount_type TEXT DEFAULT 'amount';
ALTER TABLE sales_orders ADD COLUMN IF NOT EXISTS discount_value DECIMAL(10,2) DEFAULT 0;
ALTER TABLE sales_orders ADD COLUMN IF NOT EXISTS warehouse_id UUID;
ALTER TABLE sales_orders ADD COLUMN IF NOT EXISTS warehouse_name TEXT DEFAULT '';
-- 원재료 · 레시피
CREATE TABLE IF NOT EXISTS ingredients (id UUID DEFAULT gen_random_uuid() PRIMARY KEY, name TEXT NOT NULL, category TEXT DEFAULT '원료', package_qty DECIMAL(10,3), package_unit TEXT DEFAULT 'g', package_price DECIMAL(10,2) DEFAULT 0, density DECIMAL(8,4), notes TEXT DEFAULT '', created_at TIMESTAMPTZ DEFAULT now(), updated_at TIMESTAMPTZ DEFAULT now());
CREATE TABLE IF NOT EXISTS recipes (id UUID DEFAULT gen_random_uuid() PRIMARY KEY, product_id UUID REFERENCES products(id) ON DELETE CASCADE, batch_weight_g INTEGER DEFAULT 1000, notes TEXT DEFAULT '', created_at TIMESTAMPTZ DEFAULT now(), updated_at TIMESTAMPTZ DEFAULT now());
CREATE TABLE IF NOT EXISTS recipe_items (id UUID DEFAULT gen_random_uuid() PRIMARY KEY, recipe_id UUID REFERENCES recipes(id) ON DELETE CASCADE, ingredient_id UUID REFERENCES ingredients(id) ON DELETE SET NULL, ingredient_name TEXT DEFAULT '', amount_g DECIMAL(10,3) DEFAULT 0, amount_unit TEXT DEFAULT 'g');
ALTER TABLE ingredients ADD COLUMN IF NOT EXISTS current_stock INTEGER DEFAULT 0;
ALTER TABLE consignment_locations ADD COLUMN IF NOT EXISTS commission_rate DECIMAL(5,2) DEFAULT 0;
ALTER TABLE products ADD COLUMN IF NOT EXISTS product_type TEXT DEFAULT 'single';
CREATE TABLE IF NOT EXISTS package_items (id UUID DEFAULT gen_random_uuid() PRIMARY KEY, package_id UUID REFERENCES products(id) ON DELETE CASCADE, component_type TEXT NOT NULL, component_id UUID NOT NULL, component_name TEXT DEFAULT '', qty INTEGER DEFAULT 1);
ALTER TABLE package_items ENABLE ROW LEVEL SECURITY;
DROP POLICY IF EXISTS "Public" ON package_items; DROP POLICY IF EXISTS "Authenticated" ON package_items; CREATE POLICY "Authenticated" ON package_items FOR ALL TO authenticated USING (true) WITH CHECK (true);
ALTER TABLE ingredients ENABLE ROW LEVEL SECURITY; ALTER TABLE recipes ENABLE ROW LEVEL SECURITY; ALTER TABLE recipe_items ENABLE ROW LEVEL SECURITY;
DROP POLICY IF EXISTS "Public" ON ingredients; DROP POLICY IF EXISTS "Authenticated" ON ingredients; CREATE POLICY "Authenticated" ON ingredients FOR ALL TO authenticated USING (true) WITH CHECK (true); DROP POLICY IF EXISTS "Public" ON recipes; DROP POLICY IF EXISTS "Authenticated" ON recipes; CREATE POLICY "Authenticated" ON recipes FOR ALL TO authenticated USING (true) WITH CHECK (true); DROP POLICY IF EXISTS "Public" ON recipe_items; DROP POLICY IF EXISTS "Authenticated" ON recipe_items; CREATE POLICY "Authenticated" ON recipe_items FOR ALL TO authenticated USING (true) WITH CHECK (true);
ALTER TABLE products ADD COLUMN IF NOT EXISTS weight_g DECIMAL(10,2); ALTER TABLE products ADD COLUMN IF NOT EXISTS weight_unit TEXT DEFAULT 'g'; ALTER TABLE products ADD COLUMN IF NOT EXISTS cost_mode TEXT DEFAULT 'manual';
-- 창고 테이블
CREATE TABLE IF NOT EXISTS warehouses (id UUID DEFAULT gen_random_uuid() PRIMARY KEY, name TEXT NOT NULL, is_default BOOLEAN DEFAULT false, notes TEXT DEFAULT '', is_active BOOLEAN DEFAULT true, created_at TIMESTAMPTZ DEFAULT now(), updated_at TIMESTAMPTZ DEFAULT now());
CREATE TABLE IF NOT EXISTS warehouse_stocks (id UUID DEFAULT gen_random_uuid() PRIMARY KEY, product_id UUID REFERENCES products(id) ON DELETE CASCADE, warehouse_id UUID REFERENCES warehouses(id) ON DELETE CASCADE, quantity INTEGER DEFAULT 0, updated_at TIMESTAMPTZ DEFAULT now(), UNIQUE(product_id, warehouse_id));
ALTER TABLE warehouses ENABLE ROW LEVEL SECURITY; ALTER TABLE warehouse_stocks ENABLE ROW LEVEL SECURITY;
DROP POLICY IF EXISTS "Public" ON warehouses; DROP POLICY IF EXISTS "Authenticated" ON warehouses; CREATE POLICY "Authenticated" ON warehouses FOR ALL TO authenticated USING (true) WITH CHECK (true); DROP POLICY IF EXISTS "Public" ON warehouse_stocks; DROP POLICY IF EXISTS "Authenticated" ON warehouse_stocks; CREATE POLICY "Authenticated" ON warehouse_stocks FOR ALL TO authenticated USING (true) WITH CHECK (true);
-- transactions 컬럼 추가
ALTER TABLE transactions ADD COLUMN IF NOT EXISTS warehouse_id UUID; ALTER TABLE transactions ADD COLUMN IF NOT EXISTS warehouse_name TEXT DEFAULT ''; ALTER TABLE transactions ADD COLUMN IF NOT EXISTS to_warehouse_id UUID; ALTER TABLE transactions ADD COLUMN IF NOT EXISTS to_warehouse_name TEXT DEFAULT '';
-- 판매서
CREATE TABLE IF NOT EXISTS sales_orders (id UUID DEFAULT gen_random_uuid() PRIMARY KEY, order_no TEXT NOT NULL, customer TEXT DEFAULT '', status TEXT DEFAULT 'draft', sale_date DATE, ship_date DATE, notes TEXT DEFAULT '', total_amount DECIMAL(12,2) DEFAULT 0, created_by TEXT DEFAULT '', created_at TIMESTAMPTZ DEFAULT now(), updated_at TIMESTAMPTZ DEFAULT now());
CREATE TABLE IF NOT EXISTS sales_order_items (id UUID DEFAULT gen_random_uuid() PRIMARY KEY, order_id UUID REFERENCES sales_orders(id) ON DELETE CASCADE, product_id UUID REFERENCES products(id) ON DELETE SET NULL, product_name TEXT DEFAULT '', product_code TEXT DEFAULT '', quantity INTEGER DEFAULT 1, unit_price DECIMAL(10,2) DEFAULT 0);
-- 발주서
CREATE TABLE IF NOT EXISTS purchase_orders (id UUID DEFAULT gen_random_uuid() PRIMARY KEY, order_no TEXT NOT NULL, supplier TEXT DEFAULT '', status TEXT DEFAULT 'draft', order_date DATE, expected_date DATE, notes TEXT DEFAULT '', total_amount DECIMAL(12,2) DEFAULT 0, created_by TEXT DEFAULT '', created_at TIMESTAMPTZ DEFAULT now(), updated_at TIMESTAMPTZ DEFAULT now());
CREATE TABLE IF NOT EXISTS purchase_order_items (id UUID DEFAULT gen_random_uuid() PRIMARY KEY, order_id UUID REFERENCES purchase_orders(id) ON DELETE CASCADE, product_id UUID REFERENCES products(id) ON DELETE SET NULL, product_name TEXT DEFAULT '', product_code TEXT DEFAULT '', quantity INTEGER DEFAULT 1, unit_price DECIMAL(10,2) DEFAULT 0);
-- 판매 시점 단가·원가 스냅샷 (가격 변경 시 과거 매출·마진이 소급 왜곡되지 않도록)
ALTER TABLE transactions ADD COLUMN IF NOT EXISTS unit_price DECIMAL(10,2);
ALTER TABLE transactions ADD COLUMN IF NOT EXISTS cost_price DECIMAL(10,2);
ALTER TABLE sales_order_items ADD COLUMN IF NOT EXISTS cost_price DECIMAL(10,2);
-- 발주서 품목에 원재료 지원 (product_id는 products FK라 원재료는 ingredient_id에 저장)
ALTER TABLE purchase_order_items ADD COLUMN IF NOT EXISTS item_type TEXT DEFAULT 'product';
ALTER TABLE purchase_order_items ADD COLUMN IF NOT EXISTS ingredient_id UUID;
-- 주문번호 유니크 인덱스 (동시 작성 중복 방지 — 기존 중복이 있으면 먼저 정리 후 실행)
CREATE UNIQUE INDEX IF NOT EXISTS uq_sales_order_no ON sales_orders(order_no);
CREATE UNIQUE INDEX IF NOT EXISTS uq_purchase_order_no ON purchase_orders(order_no);
-- RLS
ALTER TABLE sales_orders ENABLE ROW LEVEL SECURITY; ALTER TABLE sales_order_items ENABLE ROW LEVEL SECURITY; ALTER TABLE purchase_orders ENABLE ROW LEVEL SECURITY; ALTER TABLE purchase_order_items ENABLE ROW LEVEL SECURITY;
DROP POLICY IF EXISTS "Public" ON sales_orders; DROP POLICY IF EXISTS "Authenticated" ON sales_orders; CREATE POLICY "Authenticated" ON sales_orders FOR ALL TO authenticated USING (true) WITH CHECK (true); DROP POLICY IF EXISTS "Public" ON sales_order_items; DROP POLICY IF EXISTS "Authenticated" ON sales_order_items; CREATE POLICY "Authenticated" ON sales_order_items FOR ALL TO authenticated USING (true) WITH CHECK (true); DROP POLICY IF EXISTS "Public" ON purchase_orders; DROP POLICY IF EXISTS "Authenticated" ON purchase_orders; CREATE POLICY "Authenticated" ON purchase_orders FOR ALL TO authenticated USING (true) WITH CHECK (true); DROP POLICY IF EXISTS "Public" ON purchase_order_items; DROP POLICY IF EXISTS "Authenticated" ON purchase_order_items; CREATE POLICY "Authenticated" ON purchase_order_items FOR ALL TO authenticated USING (true) WITH CHECK (true);
-- 🔒 기본 테이블도 인증 사용자만 접근 (로그인 없이는 데이터 접근·수정 차단)
DO $$ DECLARE t text; BEGIN
  FOREACH t IN ARRAY ARRAY['products','transactions','consignment_locations','consignment_stocks'] LOOP
    EXECUTE format('ALTER TABLE %I ENABLE ROW LEVEL SECURITY', t);
    EXECUTE format('DROP POLICY IF EXISTS "Public" ON %I', t);
    EXECUTE format('DROP POLICY IF EXISTS "Authenticated" ON %I', t);
    EXECUTE format('CREATE POLICY "Authenticated" ON %I FOR ALL TO authenticated USING (true) WITH CHECK (true)', t);
  END LOOP;
END $$;`;
  navigator.clipboard.writeText(sql).then(()=>toast('SQL 복사됨! Supabase SQL Editor에 붙여넣어 실행하세요','s'));
}

window.addCategorySetting=function(){const input=document.getElementById('new-cat-input');const val=input?.value.trim();if(!val){toast('입력하세요','e');return;}const cats=getCategories();if(cats.includes(val)){toast('이미 있습니다','e');return;}saveCategories([...cats,val]);input.value='';refreshCategoryTagList();};
window.deleteCategorySetting=function(name){saveCategories(getCategories().filter(c=>c!==name));refreshCategoryTagList();};
function refreshCategoryTagList(){const cats=getCategories();const el=document.getElementById('cat-tag-list');if(!el)return;el.innerHTML=cats.length===0?'<span style="color:var(--muted);font-size:13px;">없음</span>':cats.map(c=>`<div class="tag-item">${esc(c)}<button class="tag-del" onclick="deleteCategorySetting('${jsAttr(c)}')">×</button></div>`).join('');}
window.addClassificationSetting=function(){const input=document.getElementById('new-cls-input');const val=input?.value.trim();if(!val){toast('입력하세요','e');return;}const cls=getClassifications();if(cls.includes(val)){toast('이미 있습니다','e');return;}saveClassifications([...cls,val]);input.value='';refreshClassificationTagList();};
window.deleteClassificationSetting=function(name){saveClassifications(getClassifications().filter(c=>c!==name));refreshClassificationTagList();};
function refreshClassificationTagList(){const cls=getClassifications();const el=document.getElementById('cls-tag-list');if(!el)return;el.innerHTML=cls.length===0?'<span style="color:var(--muted);font-size:13px;">없음</span>':cls.map(c=>`<div class="tag-item">${esc(c)}<button class="tag-del" onclick="deleteClassificationSetting('${jsAttr(c)}')">×</button></div>`).join('');}
window.saveTypeLabelChanges=function(){const own=document.getElementById('type-own-input')?.value.trim()||'자체생산';const oem=document.getElementById('type-oem-input')?.value.trim()||'OEM';saveTypeLabels({own,oem});toast('저장됨','s');};
function changeName(){const n=document.getElementById('new-name').value.trim();if(!n)return;S.cfg.username=n;localStorage.setItem('inv_username',n);closeModal();toast('이름 변경됨','s');}
window.saveCompanyInfoForm=function(){saveCompanyInfo({name:document.getElementById('co-name')?.value.trim(),bizNo:document.getElementById('co-bizno')?.value.trim(),addr:document.getElementById('co-addr')?.value.trim(),bizType:document.getElementById('co-biztype')?.value.trim(),industry:document.getElementById('co-industry')?.value.trim(),manager:document.getElementById('co-manager')?.value.trim(),email:document.getElementById('co-email')?.value.trim(),bank:document.getElementById('co-bank')?.value.trim()});toast('회사정보 저장됨','s');};
async function refreshAll(){toast('새로고침 중...','i');await loadAll();closeModal();go(S.tab);toast('완료','s');}
async function resetApp(){if(!confirm('로그아웃하시겠습니까?'))return;try{await S.sb?.auth.signOut();}catch(e){}localStorage.removeItem('inv_username');location.reload();}

/* ── 유틸 ── */
function fmtDate(d){if(!d)return'-';const dt=new Date(d);return`${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`;}

function showModal(title,body,btns=[]){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  const footer=document.getElementById('modal-footer');
  if(btns.length){footer.innerHTML=btns.map(b=>`<button class="btn ${b.cls}" onclick="${b.fn}">${b.label}</button>`).join('');footer.style.display='flex';}
  else{footer.innerHTML='';footer.style.display='none';}
  document.getElementById('overlay').classList.add('on');
}
function closeModal(){document.getElementById('overlay').classList.remove('on');}
function overlayClick(e){if(e.target===document.getElementById('overlay'))closeModal();}
function toast(msg,type='i'){const wrap=document.getElementById('toasts');const el=document.createElement('div');el.className=`toast ${type}`;el.textContent=msg;wrap.appendChild(el);setTimeout(()=>el.remove(),3000);}
// XSS 방지 — innerHTML 텍스트/속성값 이스케이프
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
// onclick 등 속성 안의 JS 문자열 리터럴용 (JS 이스케이프 + HTML 속성 이스케이프 결합)
function jsAttr(s){return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\r?\n/g,' ');}
</script>
