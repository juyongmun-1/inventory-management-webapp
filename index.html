<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>재고 관리</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --primary:#4F46E5;--primary-l:#EEF2FF;--primary-d:#3730A3;
  --success:#059669;--success-l:#ECFDF5;
  --warning:#D97706;--warning-l:#FFFBEB;
  --danger:#DC2626;--danger-l:#FEF2F2;
  --purple:#7C3AED;--purple-l:#F5F3FF;
  --bg:#F9FAFB;--card:#fff;
  --text:#111827;--muted:#9CA3AF;--border:#F3F4F6;--border2:#E5E7EB;
  --nav-h:60px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
/* Setup */
.setup{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,var(--primary),var(--primary-d));z-index:500;}
.setup-card{background:#fff;border-radius:20px;padding:36px 24px;width:100%;max-width:400px;}
.setup-logo{text-align:center;margin-bottom:28px;}
.setup-logo .icon{font-size:52px;}
.setup-logo h1{font-size:22px;font-weight:800;margin-top:10px;color:var(--primary);}
.setup-logo p{color:var(--muted);font-size:13px;margin-top:4px;}
/* App shell */
.app{display:none;flex-direction:column;min-height:100vh;}
.app.on{display:flex;}
/* Header */
.hdr{background:#fff;padding:14px 16px 13px;padding-top:calc(env(safe-area-inset-top,0px)+14px);border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.hdr-center{position:absolute;left:50%;transform:translateX(-50%);text-align:center;}
.hdr-title{font-size:17px;font-weight:700;}
.hdr-left,.hdr-right{display:flex;align-items:center;gap:6px;min-width:60px;}
.hdr-right{justify-content:flex-end;}
.icon-btn{width:36px;height:36px;border:none;background:transparent;border-radius:9px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--text);}
.icon-btn.primary{background:var(--primary);color:#fff;border-radius:50%;}
/* Content */
.content{flex:1;overflow-y:auto;padding-bottom:calc(var(--nav-h)+env(safe-area-inset-bottom,0px));}
/* Bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);padding-bottom:env(safe-area-inset-bottom,0px);background:#fff;border-top:1px solid var(--border2);display:flex;z-index:100;}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--muted);border:none;background:none;}
.bnav-item.active{color:var(--primary);}
.bnav-icon{font-size:22px;line-height:1;}
.bnav-label{font-size:10px;font-weight:600;}
/* Sections */
.page-pad{padding:16px;}
.section-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:20px 16px 8px;}
/* Cards */
.card{background:#fff;border-radius:14px;margin:0 16px 10px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.card-pad{padding:16px;}
/* Row list items */
.row-list{background:#fff;border-radius:14px;margin:0 16px 10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.row-item{display:flex;align-items:center;justify-content:space-between;padding:15px 16px;border-bottom:1px solid var(--border);cursor:pointer;}
.row-item:last-child{border-bottom:none;}
.row-item:active{background:var(--bg);}
.row-label{font-size:15px;color:var(--text);}
.row-value{font-size:15px;color:var(--muted);display:flex;align-items:center;gap:4px;}
.row-value.set{color:var(--text);font-weight:600;}
.row-arrow{color:var(--muted);font-size:14px;}
/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px;}
.stat-box{background:#fff;border-radius:14px;padding:14px 12px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.stat-num{font-size:26px;font-weight:900;color:var(--primary);}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px;}
/* Badges */
.badge{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block;}
.badge-primary{background:var(--primary-l);color:var(--primary);}
.badge-success{background:var(--success-l);color:var(--success);}
.badge-warning{background:var(--warning-l);color:var(--warning);}
.badge-danger{background:var(--danger-l);color:var(--danger);}
.badge-gray{background:#F3F4F6;color:#374151;}
.badge-purple{background:var(--purple-l);color:var(--purple);}
/* Product card */
.prod-card{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;}
.prod-card:last-child{border-bottom:none;}
.prod-card:active{background:var(--bg);}
.prod-thumb{width:50px;height:50px;border-radius:10px;object-fit:cover;flex-shrink:0;}
.prod-thumb-ph{width:50px;height:50px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.prod-info{flex:1;min-width:0;}
.prod-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prod-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.prod-badges{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;}
.prod-stock{text-align:right;flex-shrink:0;}
.prod-num{font-size:22px;font-weight:900;color:var(--primary);}
.prod-num.low{color:var(--danger);}
.prod-num-lbl{font-size:10px;color:var(--muted);}
/* Order card */
.order-card{padding:16px;border-bottom:1px solid var(--border);cursor:pointer;}
.order-card:last-child{border-bottom:none;}
.order-card:active{background:var(--bg);}
.order-no{font-size:15px;font-weight:700;}
.order-meta{font-size:12px;color:var(--muted);margin-top:3px;}
.order-total{font-size:16px;font-weight:800;color:var(--primary);margin-top:4px;}
/* Status tabs */
.status-tabs{display:flex;overflow-x:auto;padding:0 16px;gap:0;border-bottom:1px solid var(--border2);background:#fff;}
.status-tabs::-webkit-scrollbar{display:none;}
.stab{padding:12px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;}
.stab.active{color:var(--primary);border-bottom-color:var(--primary);}
/* Form rows (order form style) */
.form-rows{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.fr{display:flex;align-items:center;justify-content:space-between;padding:15px 16px;border-bottom:1px solid var(--border);}
.fr:last-child{border-bottom:none;}
.fr-label{font-size:15px;color:var(--text);flex-shrink:0;min-width:72px;}
.fr-right{flex:1;text-align:right;display:flex;align-items:center;justify-content:flex-end;gap:6px;}
.fr-input{border:none;outline:none;font-size:15px;color:var(--text);text-align:right;background:transparent;width:100%;}
.fr-input::placeholder{color:var(--muted);}
.fr-muted{font-size:15px;color:var(--muted);}
/* Order items */
.order-item-row{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);background:#fff;}
.oi-name{flex:1;font-size:13px;font-weight:600;min-width:0;}
.oi-sub{font-size:11px;color:var(--muted);}
.oi-qty{width:52px;}
.oi-qty input{width:100%;padding:6px 8px;border:1.5px solid var(--border2);border-radius:8px;font-size:14px;font-weight:700;text-align:center;}
.oi-price{font-size:13px;font-weight:700;color:var(--primary);text-align:right;min-width:70px;}
.oi-del{width:28px;height:28px;border:none;background:var(--danger-l);color:var(--danger);border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
/* Buttons */
.btn{display:block;width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;text-align:center;transition:opacity .15s,transform .1s;}
.btn:active{transform:scale(.98);opacity:.88;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-secondary{background:var(--border2);color:var(--text);}
.btn-success{background:var(--success);color:#fff;}
.btn-danger{background:var(--danger);color:#fff;}
.btn-outline{background:transparent;border:1.5px solid var(--primary);color:var(--primary);}
.btn-sm{padding:9px 16px;font-size:14px;border-radius:10px;width:auto;display:inline-block;}
.btn-row{display:flex;gap:10px;padding:16px;}
.btn-row .btn{margin:0;}
/* Search */
.search-wrap{padding:12px 16px;}
.search-input{width:100%;padding:11px 14px 11px 38px;background:#fff;border:1.5px solid var(--border2);border-radius:12px;font-size:15px;position:relative;}
.search-box{position:relative;}
.search-box::before{content:'🔍';position:absolute;left:28px;top:50%;transform:translateY(-50%);font-size:14px;z-index:1;pointer-events:none;}
/* Filter chips */
.chips{display:flex;gap:6px;padding:0 16px 12px;overflow-x:auto;}
.chips::-webkit-scrollbar{display:none;}
.chip{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border2);background:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;color:var(--muted);}
.chip.active{border-color:var(--primary);background:var(--primary-l);color:var(--primary);}
/* Modal/Sheet */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:flex-end;}
.overlay.on{display:flex;}
.sheet{background:#fff;border-radius:20px 20px 0 0;padding:0 0 env(safe-area-inset-bottom,20px);width:100%;max-height:94vh;overflow-y:auto;animation:slideUp .25s ease;}
.handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 0;}
.modal-hd{padding:16px 18px 14px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:17px;font-weight:700;}
.modal-close{font-size:22px;color:var(--muted);cursor:pointer;border:none;background:none;}
.modal-body{padding:16px;}
.modal-footer{padding:0 16px 16px;display:flex;gap:8px;}
.modal-footer .btn{margin:0;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
/* Toast */
.toast-wrap{position:fixed;top:56px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none;}
.toast{padding:10px 20px;border-radius:100px;font-size:13px;font-weight:700;color:#fff;animation:fadeIn .2s ease;box-shadow:0 4px 12px rgba(0,0,0,.15);}
.toast.s{background:var(--success);}
.toast.e{background:var(--danger);}
.toast.i{background:var(--primary);}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
/* Misc */
.slist{margin-top:8px;}
.sitem{padding:13px 0;border-bottom:1px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:space-between;}
.sitem:last-child{border-bottom:none;}
.sitem:active{opacity:.7;}
.sitem-name{font-size:14px;font-weight:700;}
.sitem-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.fg input,.fg select,.fg textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border2);border-radius:10px;font-size:16px;color:var(--text);background:#fff;-webkit-appearance:none;}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--primary);}
.fg textarea{resize:none;height:70px;}
.fg input:disabled{opacity:.5;background:var(--bg);}
.empty{text-align:center;padding:52px 20px;}
.empty .icon{font-size:44px;margin-bottom:10px;}
.empty p{color:var(--muted);font-size:14px;line-height:1.6;}
.divider{height:1px;background:var(--border2);margin:14px 0;}
.loc-stock-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);}
.loc-stock-row:last-child{border-bottom:none;}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.tag-item{background:var(--bg);border-radius:20px;padding:5px 10px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:5px;border:1px solid var(--border2);}
.tag-del{border:none;background:none;color:var(--muted);cursor:pointer;font-size:16px;line-height:1;padding:0;}
/* Photo upload */
.photo-upload-area{text-align:center;margin-bottom:18px;cursor:pointer;}
.photo-upload-box{width:90px;height:90px;border-radius:14px;margin:0 auto 8px;background:var(--bg);border:2px dashed var(--border2);overflow:hidden;display:flex;align-items:center;justify-content:center;}
.photo-upload-box img{width:100%;height:100%;object-fit:cover;}
.detail-hero-img{width:100%;max-height:180px;object-fit:cover;border-radius:12px;margin-bottom:14px;}
.detail-hero-ph{width:100%;height:100px;background:var(--bg);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:44px;margin-bottom:14px;}
/* TX icons */
.tx-item{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border);}
.tx-item:last-child{border-bottom:none;}
.tx-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.tx-icon.in{background:var(--success-l);}
.tx-icon.out{background:var(--danger-l);}
.tx-icon.send_consignment{background:var(--purple-l);}
.tx-icon.return_consignment{background:var(--warning-l);}
.tx-icon.consignment_sale,.tx-icon.warehouse_adj,.tx-icon.consignment_adj{background:var(--bg);}
.tx-info{flex:1;min-width:0;}
.tx-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tx-meta{font-size:11px;color:var(--muted);margin-top:1px;}
.tx-qty{font-size:14px;font-weight:800;flex-shrink:0;}
.tx-qty.in,.tx-qty.return_consignment{color:var(--success);}
.tx-qty.out,.tx-qty.consignment_sale{color:var(--danger);}
.tx-qty.send_consignment{color:var(--purple);}
.tx-qty.warehouse_adj,.tx-qty.consignment_adj{color:var(--muted);}
/* inout */
.type-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px;}
.type-btn{padding:10px 4px;border:2px solid var(--border2);border-radius:12px;background:#fff;cursor:pointer;text-align:center;}
.type-btn span{display:block;font-size:20px;margin-bottom:3px;}
.type-btn p{font-size:10px;font-weight:700;color:var(--muted);}
.type-btn.sel-in{border-color:var(--success);background:var(--success-l);}
.type-btn.sel-in p{color:var(--success);}
.type-btn.sel-out{border-color:var(--danger);background:var(--danger-l);}
.type-btn.sel-out p{color:var(--danger);}
.type-btn.sel-send{border-color:var(--purple);background:var(--purple-l);}
.type-btn.sel-send p{color:var(--purple);}
.type-btn.sel-return{border-color:var(--warning);background:var(--warning-l);}
.type-btn.sel-return p{color:var(--warning);}
.type-btn.sel-csale{border-color:var(--danger);background:var(--danger-l);}
.type-btn.sel-csale p{color:var(--danger);}
.type-btn.sel-wadj,.type-btn.sel-cadj{border-color:var(--muted);background:var(--bg);}
.type-btn.sel-wadj p,.type-btn.sel-cadj p{color:var(--muted);}
.selector-row{padding:13px 14px;border:1.5px solid var(--border2);border-radius:10px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:#fff;margin-bottom:13px;}
.selector-row.sel{border-color:var(--primary);background:var(--primary-l);}
.selector-text{font-size:15px;color:var(--muted);}
.selector-row.sel .selector-text{color:var(--text);font-weight:700;}
.infobox{background:var(--primary-l);border:1px solid #C7D2FE;border-radius:10px;padding:12px 14px;font-size:12px;color:var(--primary-d);line-height:1.6;margin-bottom:12px;}
@media(min-width:500px){
  .sheet{max-width:500px;margin:0 auto;border-radius:20px;}
  .overlay{align-items:center;justify-content:center;}
  .content,.bnav{max-width:640px;}
  .content{margin:0 auto;}
  .bnav{left:50%;transform:translateX(-50%);}
}
</style>
</head>
<body>

<div class="setup" id="setup-screen" style="display:none">
  <div class="setup-card">
    <div class="setup-logo">
      <div class="icon">📦</div>
      <h1>재고 관리</h1>
      <p>창고 + 위탁처 통합 재고 관리</p>
    </div>
    <div class="fg"><label>내 이름</label><input type="text" id="sb-name" placeholder="홍길동" maxlength="20" style="font-size:18px;font-weight:700;text-align:center;"></div>
    <button class="btn btn-primary" onclick="finishSetup()">시작하기 🚀</button>
  </div>
</div>

<div class="app" id="app">
  <div class="hdr" id="hdr">
    <div class="hdr-left" id="hdr-left"></div>
    <div class="hdr-center"><div class="hdr-title" id="hdr-title">홈</div></div>
    <div class="hdr-right" id="hdr-right"></div>
  </div>
  <div class="content" id="content"></div>
  <div class="bnav">
    <button class="bnav-item active" id="nav-dash" onclick="go('dash')"><span class="bnav-icon">🏠</span><span class="bnav-label">홈</span></button>
    <button class="bnav-item" id="nav-products" onclick="go('products')"><span class="bnav-icon">📦</span><span class="bnav-label">제품</span></button>
    <button class="bnav-item" id="nav-sales" onclick="go('sales')"><span class="bnav-icon">🧾</span><span class="bnav-label">판매서</span></button>
    <button class="bnav-item" id="nav-purchase" onclick="go('purchase')"><span class="bnav-icon">📋</span><span class="bnav-label">발주서</span></button>
    <button class="bnav-item" id="nav-more" onclick="go('more')"><span class="bnav-icon">⋯</span><span class="bnav-label">더보기</span></button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="sheet" id="sheet">
    <div class="handle"></div>
    <div class="modal-hd">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer" style="display:none;"></div>
  </div>
</div>
<div class="toast-wrap" id="toasts"></div>

<script>
const SB_URL='https://ctmbygkiqimctmouylof.supabase.co';
const SB_KEY='sb_publishable_uE-oA2O-lifSx7I9YcghdQ_v7I2wCRv';

const S={
  tab:'dash',products:[],locations:[],cstocks:[],transactions:[],
  salesOrders:[],salesOrderItems:[],purchaseOrders:[],purchaseOrderItems:[],
  cfg:null,sb:null,
  pSearch:'',pFilter:'all',
  txType:'in',txProduct:null,txLocation:null,
  histFilter:'all',histLocFilter:'all',
  salesFilter:'all',purchaseFilter:'all',
  pendingItems:[],pendingImageFile:null,
};

/* ── 카테고리/유형 ── */
function getCategories(){const s=localStorage.getItem('inv_categories');const c=s?JSON.parse(s):[];const d=[...new Set(S.products.map(p=>p.category).filter(Boolean))];return[...new Set([...c,...d])].sort();}
function saveCategories(c){localStorage.setItem('inv_categories',JSON.stringify(c));}
function getTypeLabels(){const s=localStorage.getItem('inv_type_labels');return s?JSON.parse(s):{own:'자체생산',oem:'OEM'};}
function saveTypeLabels(l){localStorage.setItem('inv_type_labels',JSON.stringify(l));}
function getTypeLabel(t){return getTypeLabels()[t]||t;}

/* ── 앱 초기화 ── */
window.addEventListener('load',()=>{
  const u=localStorage.getItem('inv_username');
  if(u){S.cfg={url:SB_URL,key:SB_KEY,username:u};connect();}
  else{document.getElementById('setup-screen').style.display='flex';}
});

async function connect(){
  try{
    S.sb=supabase.createClient(SB_URL,SB_KEY);
    await loadAll();subscribeRT();
    document.getElementById('setup-screen').style.display='none';
    document.getElementById('app').classList.add('on');
    go('dash');
  }catch(e){toast('연결 실패: '+e.message,'e');document.getElementById('setup-screen').style.display='flex';}
}

async function finishSetup(){
  const name=document.getElementById('sb-name').value.trim();
  if(!name){toast('이름을 입력하세요','e');return;}
  S.cfg={url:SB_URL,key:SB_KEY,username:name};
  localStorage.setItem('inv_username',name);
  S.sb=supabase.createClient(SB_URL,SB_KEY);
  toast('연결 중...','i');
  try{
    await loadAll();subscribeRT();
    document.getElementById('setup-screen').style.display='none';
    document.getElementById('app').classList.add('on');
    go('dash');toast('환영합니다 '+name+'님 👋','s');
  }catch(e){toast('오류: '+e.message,'e');}
}

async function loadAll(){await Promise.all([loadProducts(),loadLocations(),loadCstocks(),loadTx(),loadSalesOrders(),loadPurchaseOrders()]);}
async function loadProducts(){const{data,e}=await S.sb.from('products').select('*').order('name');if(!e)S.products=data||[];}
async function loadLocations(){const{data,e}=await S.sb.from('consignment_locations').select('*').eq('is_active',true).order('name');if(!e)S.locations=data||[];}
async function loadCstocks(){const{data,e}=await S.sb.from('consignment_stocks').select('*');if(!e)S.cstocks=data||[];}
async function loadTx(){const{data,e}=await S.sb.from('transactions').select('*').order('created_at',{ascending:false}).limit(300);if(!e)S.transactions=data||[];}

async function loadSalesOrders(){
  const{data,error}=await S.sb.from('sales_orders').select('*').order('created_at',{ascending:false}).limit(200);

  const{data:items,error:ie}=await S.sb.from('sales_order_items').select('*');

}
async function loadPurchaseOrders(){
  const{data,error}=await S.sb.from('purchase_orders').select('*').order('created_at',{ascending:false}).limit(200);
  if(!error)S.purchaseOrders=data||[];

}

function subscribeRT(){
  S.sb.channel('inv_rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'products'},()=>loadProducts().then(()=>{if(S.tab==='dash')renderDash();if(S.tab==='products')renderProducts();}))
    .on('postgres_changes',{event:'*',schema:'public',table:'consignment_stocks'},()=>loadCstocks().then(()=>{if(S.tab==='dash')renderDash();if(S.tab==='products')renderProducts();}))
    .on('postgres_changes',{event:'*',schema:'public',table:'transactions'},()=>loadTx().then(()=>{if(S.tab==='dash')renderDash();}))
    .on('postgres_changes',{event:'*',schema:'public',table:'sales_orders'},()=>loadSalesOrders().then(()=>{if(S.tab==='dash')renderDash();if(S.tab==='sales')renderSales();}))
    .on('postgres_changes',{event:'*',schema:'public',table:'purchase_orders'},()=>loadPurchaseOrders().then(()=>{if(S.tab==='purchase')renderPurchase();}))
    .subscribe();
}

/* ── 재고 헬퍼 ── */
function getCS(pid,lid){return S.cstocks.find(s=>s.product_id===pid&&s.location_id===lid);}
function getTotalStock(p){return p.current_stock+S.cstocks.filter(s=>s.product_id===p.id).reduce((a,s)=>a+s.quantity,0);}

async function recordTx(data){
  const p=S.products.find(x=>x.id===data.product_id);
  if(!p)throw new Error('제품을 찾을 수 없습니다');
  const wh0=p.current_stock;let wh1=wh0,cs0=0,cs1=0;
  if(data.location_id){const cs=getCS(p.id,data.location_id);cs0=cs?cs.quantity:0;cs1=cs0;}
  const q=data.quantity;
  switch(data.type){
    case 'in':wh1=wh0+q;break;
    case 'out':wh1=wh0-q;if(wh1<0)throw new Error(`창고 재고 부족 (현재 ${wh0}개)`);break;
    case 'send_consignment':wh1=wh0-q;if(wh1<0)throw new Error(`창고 재고 부족 (현재 ${wh0}개)`);cs1=cs0+q;break;
    case 'return_consignment':cs1=cs0-q;if(cs1<0)throw new Error(`위탁 재고 부족`);wh1=wh0+q;break;
    case 'consignment_sale':cs1=cs0-q;if(cs1<0)throw new Error(`위탁 재고 부족`);break;
    case 'warehouse_adj':wh1=q;break;
    case 'consignment_adj':cs1=q;break;
  }
  const loc=S.locations.find(l=>l.id===data.location_id);
  const{error:te}=await S.sb.from('transactions').insert({product_id:p.id,product_name:p.name,type:data.type,quantity:q,location_id:data.location_id||null,location_name:loc?loc.name:'',wh_before:wh0,wh_after:wh1,cs_before:cs0,cs_after:cs1,notes:data.notes||'',created_by:S.cfg.username,created_at:new Date().toISOString()});
  if(te)throw te;
  if(wh1!==wh0){await S.sb.from('products').update({current_stock:wh1,updated_at:new Date().toISOString()}).eq('id',p.id);p.current_stock=wh1;}
  if(data.location_id&&cs1!==cs0){
    const ex=getCS(p.id,data.location_id);
    if(ex){await S.sb.from('consignment_stocks').update({quantity:cs1,updated_at:new Date().toISOString()}).eq('id',ex.id);ex.quantity=cs1;}
    else{const{data:ins}=await S.sb.from('consignment_stocks').insert({product_id:p.id,location_id:data.location_id,quantity:cs1,updated_at:new Date().toISOString()}).select().single();if(ins)S.cstocks.push(ins);}
  }
}

/* ── 판매서 출고 완료 ── */
async function completeSalesOrder(id){
  if(!confirm('출고 완료 처리하면 재고가 차감됩니다. 진행하시겠습니까?'))return;
  const items=S.salesOrderItems.filter(i=>i.order_id===id);
  try{
    for(const item of items){
      if(item.product_id)await recordTx({product_id:item.product_id,type:'out',quantity:item.quantity,notes:`판매서 ${S.salesOrders.find(o=>o.id===id)?.order_no||''}`});
    }
    await S.sb.from('sales_orders').update({status:'completed',updated_at:new Date().toISOString()}).eq('id',id);
    await loadSalesOrders();await loadProducts();
    closeModal();toast('출고 완료 처리되었습니다','s');
    if(S.tab==='sales')renderSales();else if(S.tab==='dash')renderDash();
  }catch(e){toast('오류: '+e.message,'e');}
}

async function deleteSalesOrder(id){
  if(!confirm('판매서를 삭제하시겠습니까?'))return;
  await S.sb.from('sales_orders').delete().eq('id',id);
  await loadSalesOrders();closeModal();
  if(S.tab==='sales')renderSales();else if(S.tab==='dash')renderDash();
  toast('삭제되었습니다','s');
}

    }).join('');

window.addPendingItem=function(productId,type){
  const p=S.products.find(x=>x.id===productId);if(!p)return;
  const exists=S.pendingItems.find(i=>i.product_id===productId);
  if(exists){exists.quantity++;closeModal();if(type==='sales')showSalesOrderForm._reopen&&showSalesOrderForm._reopen();return;}
  S.pendingItems.push({product_id:p.id,product_name:p.name,product_code:p.code,quantity:1,unit_price:p.unit_price||0});
  closeModal();
  // reopen order form - rerender items
  setTimeout(()=>{
    const wrap=document.getElementById('so-items-wrap')||document.getElementById('po-items-wrap');
    if(wrap)renderPendingItems(type);
    else if(type==='sales')showSalesOrderForm(null);
    else showPurchaseOrderForm(null);
  },50);
};

async function submitSalesOrder(id,status){
  const customer=document.getElementById('so-customer')?.value.trim()||'';
  const saleDate=document.getElementById('so-date')?.value||new Date().toISOString().substring(0,10);
  const shipDate=document.getElementById('so-ship')?.value||null;
  const notes=document.getElementById('so-notes')?.value.trim()||'';
  if(S.pendingItems.length===0&&status!=='draft'){toast('제품을 추가하세요','e');return;}
  const total=S.pendingItems.reduce((a,i)=>(a+(i.unit_price||0)*(i.quantity||1)),0);
  const now=new Date().toISOString();
  try{
    let orderId=id;
    if(!id){
      const no='SO-'+String((S.salesOrders.length+1)).padStart(6,'0');
      const{data,error}=await S.sb.from('sales_orders').insert({order_no:no,customer,status,sale_date:saleDate,ship_date:shipDate||null,notes,total_amount:total,created_by:S.cfg.username,created_at:now,updated_at:now}).select().single();
      if(error)throw error;orderId=data.id;
    }else{
      const{error}=await S.sb.from('sales_orders').update({customer,status,sale_date:saleDate,ship_date:shipDate||null,notes,total_amount:total,updated_at:now}).eq('id',id);
      if(error)throw error;
      await S.sb.from('sales_order_items').delete().eq('order_id',id);
    }
    if(S.pendingItems.length>0){
      const{error}=await S.sb.from('sales_order_items').insert(S.pendingItems.map(i=>({order_id:orderId,product_id:i.product_id,product_name:i.product_name,product_code:i.product_code,quantity:i.quantity,unit_price:i.unit_price})));
      if(error)throw error;
    }
    await loadSalesOrders();closeModal();
    if(S.tab==='sales')renderSales();else if(S.tab==='dash')renderDash();
    toast(status==='draft'?'임시저장됨':'판매서 저장됨','s');
  }catch(e){toast('오류: '+e.message,'e');}
}

async function completePurchaseOrder(id){
  if(!confirm('입고 완료 처리하면 재고가 추가됩니다. 진행하시겠습니까?'))return;
  const items=S.purchaseOrderItems.filter(i=>i.order_id===id);
  try{
    for(const item of items){
      if(item.product_id)await recordTx({product_id:item.product_id,type:'in',quantity:item.quantity,notes:`발주서 ${S.purchaseOrders.find(o=>o.id===id)?.order_no||''}`});
    }
    await S.sb.from('purchase_orders').update({status:'completed',updated_at:new Date().toISOString()}).eq('id',id);
    await loadPurchaseOrders();await loadProducts();
    closeModal();toast('입고 완료 처리되었습니다','s');
    if(S.tab==='purchase')renderPurchase();else if(S.tab==='dash')renderDash();
  }catch(e){toast('오류: '+e.message,'e');}
}

async function deletePurchaseOrder(id){
  if(!confirm('발주서를 삭제하시겠습니까?'))return;
  await S.sb.from('purchase_orders').delete().eq('id',id);
  await loadPurchaseOrders();closeModal();
  if(S.tab==='purchase')renderPurchase();
  toast('삭제되었습니다','s');
}

async function submitPurchaseOrder(id,status){
  const supplier=document.getElementById('po-supplier')?.value.trim()||'';
  const orderDate=document.getElementById('po-date')?.value||new Date().toISOString().substring(0,10);
  const expectedDate=document.getElementById('po-expected')?.value||null;
  const notes=document.getElementById('po-notes')?.value.trim()||'';
  const total=S.pendingItems.reduce((a,i)=>(a+(i.unit_price||0)*(i.quantity||1)),0);
  const now=new Date().toISOString();
  try{
    let orderId=id;
    if(!id){
      const no='PO-'+String((S.purchaseOrders.length+1)).padStart(6,'0');
      const{data,error}=await S.sb.from('purchase_orders').insert({order_no:no,supplier,status,order_date:orderDate,expected_date:expectedDate||null,notes,total_amount:total,created_by:S.cfg.username,created_at:now,updated_at:now}).select().single();
      if(error)throw error;orderId=data.id;
    }else{
      const{error}=await S.sb.from('purchase_orders').update({supplier,status,order_date:orderDate,expected_date:expectedDate||null,notes,total_amount:total,updated_at:now}).eq('id',id);
      if(error)throw error;
      await S.sb.from('purchase_order_items').delete().eq('order_id',id);
    }
    if(S.pendingItems.length>0){
      const{error}=await S.sb.from('purchase_order_items').insert(S.pendingItems.map(i=>({order_id:orderId,product_id:i.product_id,product_name:i.product_name,product_code:i.product_code,quantity:i.quantity,unit_price:i.unit_price})));
      if(error)throw error;
    }
    await loadPurchaseOrders();closeModal();
    if(S.tab==='purchase')renderPurchase();else if(S.tab==='dash')renderDash();
    toast(status==='draft'?'임시저장됨':'발주서 저장됨','s');
  }catch(e){toast('오류: '+e.message,'e');}
}

  return`<div class="prod-thumb-ph" style="background:${p.type==='oem'?'var(--warning-l)':'var(--primary-l)'}">${p.type==='oem'?'🔄':'🏭'}</div>`;

function renderProducts(){
  const cats=getCategories();const labels=getTypeLabels();const filtered=filteredProducts();
  document.getElementById('content').innerHTML=`
    <div class="search-wrap"><div class="search-box"><input type="search" class="search-input" placeholder="제품명 또는 코드 검색..." value="${S.pSearch}" oninput="S.pSearch=this.value;renderProducts()"></div></div>
    <div class="chips">
      <div class="chip ${S.pFilter==='all'?'active':''}" onclick="setPF('all')">전체</div>

    <div style="height:10px;"></div>
  `;
}
function filteredProducts(){
  let arr=S.products;
  if(S.pSearch){const q=S.pSearch.toLowerCase();arr=arr.filter(p=>p.name.toLowerCase().includes(q)||p.code.toLowerCase().includes(q));}
  if(S.pFilter==='low')arr=arr.filter(p=>getTotalStock(p)<=p.min_stock&&p.min_stock>0);
  else if(S.pFilter==='own')arr=arr.filter(p=>p.type!=='oem');
  else if(S.pFilter==='oem')arr=arr.filter(p=>p.type==='oem');
  else if(S.pFilter!=='all')arr=arr.filter(p=>p.category===S.pFilter);
  return arr;
}
function setPF(f){S.pFilter=f;renderProducts();}

  const heroHtml=p.image_url?`<img class="detail-hero-img" src="${p.image_url}" onerror="this.style.display='none'">`:`<div class="detail-hero-ph">${p.type==='oem'?'🔄':'🏭'}</div>`;

    </div>
    <div class="row-list" style="margin:0 0 12px;">
      <div class="row-item"><span>🏭 본사 창고</span><span style="font-weight:700;color:var(--primary)">${p.current_stock}개</span></div>

    <div class="row-list" style="margin:0 0 14px;">
      <div class="row-item"><span class="row-label">단가</span><span class="row-value set">${p.unit_price?'₩'+Number(p.unit_price).toLocaleString():'-'}</span></div>
      <div class="row-item"><span class="row-label">원가</span><span class="row-value set">${p.cost_price?'₩'+Number(p.cost_price).toLocaleString():'-'}</span></div>

    </div>

    {label:'수정',cls:'btn-outline',fn:`closeModal();showProductForm(S.products.find(p=>p.id==='${p.id}'))`},

}

function previewProductImage(input){
  const file=input.files[0];if(!file)return;
  S.pendingImageFile=file;
  const reader=new FileReader();
  reader.onload=e=>{const box=document.getElementById('pf-img-box');if(box)box.innerHTML=`<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;">`;};
  reader.readAsDataURL(file);
}
async function uploadProductImage(file,code){
  const ext=file.name.split('.').pop().toLowerCase()||'jpg';
  const fileName=`${code.replace(/[^a-zA-Z0-9]/g,'_')}_${Date.now()}.${ext}`;
  const{error}=await S.sb.storage.from('product-images').upload(fileName,file,{upsert:true,contentType:file.type});
  if(error)throw error;
  const{data}=S.sb.storage.from('product-images').getPublicUrl(fileName);
  return data.publicUrl;
}
async function submitProduct(id){
  const name=document.getElementById('pf-name').value.trim(),code=document.getElementById('pf-code').value.trim();
  if(!name||!code){toast('제품명과 코드는 필수입니다','e');return;}
  const catVal=document.getElementById('pf-cat').value.trim();
  if(catVal){const cats=getCategories();if(!cats.includes(catVal))saveCategories([...cats,catVal]);}
  const prod={id:id||undefined,name,code,category:catVal,type:document.getElementById('pf-type').value,unit_price:parseFloat(document.getElementById('pf-up').value)||0,cost_price:parseFloat(document.getElementById('pf-cp').value)||0,current_stock:parseInt(document.getElementById('pf-stock').value)||0,min_stock:parseInt(document.getElementById('pf-min').value)||0};
  if(!id)delete prod.id;
  if(S.pendingImageFile){try{toast('사진 업로드 중...','i');prod.image_url=await uploadProductImage(S.pendingImageFile,code);}catch(e){toast('사진 업로드 실패: '+e.message,'e');}}
  try{
    const now=new Date().toISOString();
    if(id){const{id:_,created_at,...u}=prod;u.updated_at=now;const{error}=await S.sb.from('products').update(u).eq('id',id);if(error)throw error;}
    else{const{error}=await S.sb.from('products').insert({...prod,created_at:now,updated_at:now});if(error)throw error;}
    S.pendingImageFile=null;await loadProducts();closeModal();renderProducts();toast(id?'수정됨':'추가됨','s');
  }catch(e){toast('오류: '+e.message,'e');}
}
async function confirmDeleteProduct(id){
  const p=S.products.find(p=>p.id===id);
  if(!confirm(`"${p?.name}"을 삭제하시겠습니까?`))return;
  await S.sb.from('products').delete().eq('id',id);await loadProducts();closeModal();renderProducts();toast('삭제됨','s');
}

/* ── 입출고 ── */
const TX_TYPES=[{id:'in',icon:'📥',label:'입고',sel:'sel-in',group:'wh'},{id:'out',icon:'📤',label:'출고',sel:'sel-out',group:'wh'},{id:'warehouse_adj',icon:'📊',label:'창고실사',sel:'sel-wadj',group:'wh'},{id:'send_consignment',icon:'🚚',label:'위탁발송',sel:'sel-send',group:'cs'},{id:'return_consignment',icon:'🔙',label:'위탁회수',sel:'sel-return',group:'cs'},{id:'consignment_sale',icon:'🛍️',label:'위탁판매',sel:'sel-csale',group:'cs'},{id:'consignment_adj',icon:'📊',label:'위탁실사',sel:'sel-cadj',group:'cs'}];
const needsLoc=t=>['send_consignment','return_consignment','consignment_sale','consignment_adj'].includes(t);
const TX_DESC={in:'📥 <b>입고</b>: 외부에서 창고로 들어옵니다',out:'📤 <b>출고</b>: 창고에서 나갑니다',warehouse_adj:'📊 <b>창고 실사</b>: 실제 수량으로 수정합니다',send_consignment:'🚚 <b>위탁 발송</b>: 창고 → 위탁처로 이동합니다',return_consignment:'🔙 <b>위탁 회수</b>: 위탁처 → 창고로 돌아옵니다',consignment_sale:'🛍️ <b>위탁 판매</b>: 위탁처에서 판매된 수량입니다',consignment_adj:'📊 <b>위탁 실사</b>: 위탁처 실제 수량으로 수정합니다'};

function renderInOut(){
  const type=S.txType;const tt=TX_TYPES.find(t=>t.id===type);
  const whTypes=TX_TYPES.filter(t=>t.group==='wh');const csTypes=TX_TYPES.filter(t=>t.group==='cs');
  const isAdj=type==='warehouse_adj'||type==='consignment_adj';
  let locInfo='';
  if(S.txProduct&&S.txLocation&&needsLoc(type)){const cs=getCS(S.txProduct.id,S.txLocation.id);locInfo=`<div style="font-size:12px;color:var(--muted);margin-top:4px;">위탁 재고: <strong>${cs?cs.quantity:0}개</strong></div>`;}
  const btnCls=type==='in'||type==='return_consignment'?'btn-success':type==='out'||type==='consignment_sale'?'btn-danger':type==='send_consignment'?'btn-primary':'btn-secondary';
  document.getElementById('content').innerHTML=`
    <div style="padding:16px;">
      <div class="card card-pad" style="margin:0 0 12px;">
        <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;">창고 작업</div>
        <div class="type-grid">${whTypes.map(t=>`<div class="type-btn ${type===t.id?t.sel:''}" onclick="setTxType('${t.id}')"><span>${t.icon}</span><p>${t.label}</p></div>`).join('')}</div>
        <div style="font-size:11px;font-weight:700;color:var(--muted);margin:10px 0 6px;">위탁 작업</div>
        <div class="type-grid">${csTypes.map(t=>`<div class="type-btn ${type===t.id?t.sel:''}" onclick="setTxType('${t.id}')"><span>${t.icon}</span><p>${t.label}</p></div>`).join('')}</div>
      </div>
      <div class="card card-pad" style="margin:0 0 12px;">
        <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;">제품 선택</div>
        <div class="selector-row ${S.txProduct?'sel':''}" onclick="showProdSearch()"><span class="selector-text">${S.txProduct?S.txProduct.name+' ('+S.txProduct.code+')':'제품을 선택하세요'}</span><span>▼</span></div>
        ${S.txProduct?`<div style="font-size:12px;color:var(--muted);margin-top:-8px;margin-bottom:10px;">창고 재고: <strong>${S.txProduct.current_stock}개</strong></div>`:''}
        ${needsLoc(type)?`<div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;">위탁처 선택</div><div class="selector-row ${S.txLocation?'sel':''}" onclick="showLocSearch()"><span class="selector-text">${S.txLocation?S.txLocation.name:'위탁처를 선택하세요'}</span><span>▼</span></div>${locInfo}`:''}
        <div class="fg"><label>${isAdj?'실제 수량':'수량'}</label><input type="number" id="tx-qty" placeholder="0" min="0" style="font-size:24px;font-weight:800;text-align:center;"></div>
        <div class="fg" style="margin-bottom:0;"><label>메모 (선택)</label><input type="text" id="tx-notes" placeholder="납품처, 이유 등"></div>
      </div>
      <button class="btn ${btnCls}" onclick="submitTx()">${tt?.icon||''} ${tt?.label||''} 처리</button>
      <div class="infobox" style="margin-top:10px;">${TX_DESC[type]||''}</div>
    </div>
  `;
  if(S.txProduct)setTimeout(()=>document.getElementById('tx-qty')?.focus(),100);
}
function setTxType(t){S.txType=t;renderInOut();}
function selectProd(id){S.txProduct=S.products.find(p=>p.id===id);renderInOut();}

function showProdSearch(){
  showModal('제품 선택',`
    <div class="search-box" style="margin-bottom:10px;"><input type="search" class="search-input" id="ps-inp" placeholder="검색..." oninput="filterProdList(this.value)"></div>
    <div id="ps-list">${S.products.map(p=>{const total=getTotalStock(p);return`<div class="sitem" onclick="S.txProduct=S.products.find(p=>p.id==='${p.id}');closeModal();renderInOut()"><div><div class="sitem-name">${p.name}</div><div class="sitem-sub">${p.code} · ${p.current_stock}개</div></div><span class="badge badge-primary">${total}</span></div>`;}).join('')}</div>
  `);setTimeout(()=>document.getElementById('ps-inp')?.focus(),200);
}
window.filterProdList=function(q){
  const f=S.products.filter(p=>!q||p.name.toLowerCase().includes(q.toLowerCase())||p.code.toLowerCase().includes(q.toLowerCase()));
  const el=document.getElementById('ps-list');if(!el)return;
  el.innerHTML=f.map(p=>{const t=getTotalStock(p);return`<div class="sitem" onclick="S.txProduct=S.products.find(p=>p.id==='${p.id}');closeModal();renderInOut()"><div><div class="sitem-name">${p.name}</div><div class="sitem-sub">${p.code}</div></div><span class="badge badge-primary">${t}</span></div>`;}).join('');
};
function showLocSearch(){
  if(!S.locations.length){toast('위탁처를 먼저 추가하세요','e');return;}
  showModal('위탁처 선택',`<div>${S.locations.map(loc=>{const t=S.cstocks.filter(s=>s.location_id===loc.id).reduce((a,s)=>a+s.quantity,0);return`<div class="sitem" onclick="S.txLocation=S.locations.find(l=>l.id==='${loc.id}');closeModal();renderInOut()"><div><div class="sitem-name">${loc.name}</div><div class="sitem-sub">${loc.contact||'연락처 없음'} · 위탁 ${t}개</div></div><span>🚚</span></div>`;}).join('')}</div>`);
}
async function submitTx(){
  if(!S.txProduct){toast('제품을 선택하세요','e');return;}
  if(needsLoc(S.txType)&&!S.txLocation){toast('위탁처를 선택하세요','e');return;}
  const qty=parseInt(document.getElementById('tx-qty').value);
  if(isNaN(qty)||qty<0){toast('수량을 입력하세요','e');return;}
  const notes=document.getElementById('tx-notes')?.value||'';
  try{
    await recordTx({product_id:S.txProduct.id,type:S.txType,quantity:qty,location_id:S.txLocation?.id,notes});
    await loadTx();const tt=TX_TYPES.find(t=>t.id===S.txType);
    toast(`${tt?.label||''} 처리 완료!`,'s');S.txProduct=null;S.txLocation=null;renderInOut();
  }catch(e){toast('오류: '+e.message,'e');}
}

/* ── 위탁처 ── */
function renderConsign(){
  document.getElementById('content').innerHTML=S.locations.length===0
    ?`<div class="empty"><div class="icon">🚚</div><p>위탁처가 없습니다</p></div>`
    :`<div class="row-list">${S.locations.map(loc=>{const stocks=S.cstocks.filter(s=>s.location_id===loc.id);const total=stocks.reduce((a,s)=>a+s.quantity,0);return`<div class="row-item" onclick="showLocationDetail('${loc.id}')"><div><div style="font-weight:700;">${loc.name}</div><div style="font-size:12px;color:var(--muted);">${loc.contact||'연락처 없음'}</div></div><span class="row-value"><span class="badge badge-purple">위탁 ${total}개</span> ›</span></div>`;}).join('')}</div>`;
}

function showLocationDetail(id){
  const loc=S.locations.find(l=>l.id===id);if(!loc)return;
  const stocks=S.cstocks.filter(s=>s.location_id===id&&s.quantity>0);
  const totalQty=stocks.reduce((a,s)=>a+s.quantity,0);
  const stockRows=stocks.map(s=>{const p=S.products.find(p=>p.id===s.product_id);return p?`<div class="loc-stock-row"><span>${p.name}</span><span style="font-weight:700;color:var(--purple)">${s.quantity}개</span></div>`:''}).join('');
  showModal(loc.name,`
    <div style="text-align:center;margin-bottom:16px;"><div style="font-size:36px;">🚚</div><div style="font-size:36px;font-weight:900;color:var(--purple);">${totalQty}</div><div style="font-size:12px;color:var(--muted);">총 위탁 재고</div></div>
    ${loc.contact?`<div class="row-item" style="padding:10px 0;"><span class="row-label">연락처</span><span class="row-value set">${loc.contact}</span></div>`:''}
    ${stocks.length>0?`<div style="margin-top:12px;">${stockRows}</div>`:'<div style="text-align:center;color:var(--muted);padding:16px;font-size:14px;">위탁 제품이 없습니다</div>'}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px;">
      <button class="btn btn-primary" onclick="closeModal();S.txLocation=S.locations.find(l=>l.id==='${id}');go('inout');setTxType('send_consignment')">🚚 발송</button>
      <button class="btn btn-secondary" onclick="closeModal();S.txLocation=S.locations.find(l=>l.id==='${id}');go('inout');setTxType('return_consignment')">🔙 회수</button>
    </div>
  `,[{label:'수정',cls:'btn-outline',fn:`closeModal();showLocationForm(S.locations.find(l=>l.id==='${id}'))`},{label:'삭제',cls:'btn-danger',fn:`confirmDeleteLocation('${id}')`}]);
}
function showLocationForm(loc){
  const isEdit=!!loc;
  showModal(isEdit?'위탁처 수정':'위탁처 추가',`
    <div class="fg"><label>위탁처 이름 *</label><input id="lf-name" value="${loc?.name||''}" placeholder="예: 강남 편의점"></div>
    <div class="fg"><label>연락처</label><input id="lf-contact" value="${loc?.contact||''}" placeholder="010-xxxx-xxxx"></div>
    <div class="fg"><label>주소</label><input id="lf-addr" value="${loc?.address||''}" placeholder="주소"></div>
    <div class="fg"><label>메모</label><textarea id="lf-notes">${loc?.notes||''}</textarea></div>
  `,[{label:'취소',cls:'btn-secondary',fn:'closeModal()'},{label:isEdit?'저장':'추가',cls:'btn-primary',fn:`submitLocation('${loc?.id||''}')`}]);
}
async function submitLocation(id){
  const name=document.getElementById('lf-name').value.trim();if(!name){toast('이름을 입력하세요','e');return;}
  const loc={name,contact:document.getElementById('lf-contact').value.trim(),address:document.getElementById('lf-addr').value.trim(),notes:document.getElementById('lf-notes').value.trim(),is_active:true};
  try{
    if(id){await S.sb.from('consignment_locations').update(loc).eq('id',id);}
    else{await S.sb.from('consignment_locations').insert({...loc,created_at:new Date().toISOString()});}
    await loadLocations();closeModal();renderConsign();toast(id?'수정됨':'추가됨','s');
  }catch(e){toast('오류: '+e.message,'e');}
}
async function confirmDeleteLocation(id){
  const loc=S.locations.find(l=>l.id===id);
  if(!confirm(`"${loc?.name}"을 삭제하시겠습니까?`))return;
  await S.sb.from('consignment_locations').delete().eq('id',id);await loadLocations();await loadCstocks();closeModal();renderConsign();toast('삭제됨','s');
}

function txIcon(type){return{in:'📥',out:'📤',send_consignment:'🚚',return_consignment:'🔙',consignment_sale:'🛍️',warehouse_adj:'📊',consignment_adj:'📊'}[type]||'📦';}
function txQtyStr(tx){switch(tx.type){case 'in':return`+${tx.quantity}`;case 'out':case 'consignment_sale':return`-${tx.quantity}`;case 'send_consignment':return`→${tx.quantity}`;case 'return_consignment':return`←${tx.quantity}`;default:{const d=(tx.wh_after-tx.wh_before)||(tx.cs_after-tx.cs_before);return(d>=0?'+':'')+d;}}}

function renderHistory(){
  const tf=S.histFilter,lf=S.histLocFilter;
  let filtered=S.transactions;
  if(tf!=='all')filtered=filtered.filter(t=>t.type===tf);
  if(lf!=='all')filtered=filtered.filter(t=>t.location_id===lf);
  document.getElementById('content').innerHTML=`
    <div class="chips" style="padding-top:14px;">
      ${['all:전체','in:📥입고','out:📤출고','send_consignment:🚚발송','return_consignment:🔙회수','consignment_sale:🛍️판매'].map(x=>{const[v,l]=x.split(':');return`<div class="chip ${tf===v?'active':''}" onclick="S.histFilter='${v}';renderHistory()">${l}</div>`;}).join('')}
    </div>
    <div style="background:#fff;margin:0 0 80px;border-top:1px solid var(--border2);">
      ${filtered.length===0?'<div class="empty"><p>이력이 없습니다</p></div>':filtered.map(tx=>{
        const d=new Date(tx.created_at);
        const ds=`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        const meta=[ds,tx.created_by,tx.location_name,tx.notes].filter(Boolean).join(' · ');
        return`<div class="tx-item"><div class="tx-icon ${tx.type}">${txIcon(tx.type)}</div><div class="tx-info"><div class="tx-name">${tx.product_name||'-'}</div><div class="tx-meta">${meta}</div></div><div class="tx-qty ${tx.type}">${txQtyStr(tx)}</div></div>`;
      }).join('')}
    </div>
  `;
}

function copyOrderSQL(){
  const sql=`-- 판매서
CREATE TABLE IF NOT EXISTS sales_orders (id UUID DEFAULT gen_random_uuid() PRIMARY KEY, order_no TEXT NOT NULL, customer TEXT DEFAULT '', status TEXT DEFAULT 'draft', sale_date DATE, ship_date DATE, notes TEXT DEFAULT '', total_amount DECIMAL(12,2) DEFAULT 0, created_by TEXT DEFAULT '', created_at TIMESTAMPTZ DEFAULT now(), updated_at TIMESTAMPTZ DEFAULT now());
CREATE TABLE IF NOT EXISTS sales_order_items (id UUID DEFAULT gen_random_uuid() PRIMARY KEY, order_id UUID REFERENCES sales_orders(id) ON DELETE CASCADE, product_id UUID REFERENCES products(id) ON DELETE SET NULL, product_name TEXT DEFAULT '', product_code TEXT DEFAULT '', quantity INTEGER DEFAULT 1, unit_price DECIMAL(10,2) DEFAULT 0);
-- 발주서
CREATE TABLE IF NOT EXISTS purchase_orders (id UUID DEFAULT gen_random_uuid() PRIMARY KEY, order_no TEXT NOT NULL, supplier TEXT DEFAULT '', status TEXT DEFAULT 'draft', order_date DATE, expected_date DATE, notes TEXT DEFAULT '', total_amount DECIMAL(12,2) DEFAULT 0, created_by TEXT DEFAULT '', created_at TIMESTAMPTZ DEFAULT now(), updated_at TIMESTAMPTZ DEFAULT now());
CREATE TABLE IF NOT EXISTS purchase_order_items (id UUID DEFAULT gen_random_uuid() PRIMARY KEY, order_id UUID REFERENCES purchase_orders(id) ON DELETE CASCADE, product_id UUID REFERENCES products(id) ON DELETE SET NULL, product_name TEXT DEFAULT '', product_code TEXT DEFAULT '', quantity INTEGER DEFAULT 1, unit_price DECIMAL(10,2) DEFAULT 0);
-- RLS
ALTER TABLE sales_orders ENABLE ROW LEVEL SECURITY; ALTER TABLE sales_order_items ENABLE ROW LEVEL SECURITY; ALTER TABLE purchase_orders ENABLE ROW LEVEL SECURITY; ALTER TABLE purchase_order_items ENABLE ROW LEVEL SECURITY;
CREATE POLICY "Public" ON sales_orders FOR ALL USING (true) WITH CHECK (true); CREATE POLICY "Public" ON sales_order_items FOR ALL USING (true) WITH CHECK (true); CREATE POLICY "Public" ON purchase_orders FOR ALL USING (true) WITH CHECK (true); CREATE POLICY "Public" ON purchase_order_items FOR ALL USING (true) WITH CHECK (true);`;
  navigator.clipboard.writeText(sql).then(()=>toast('SQL 복사됨! Supabase SQL Editor에 붙여넣어 실행하세요','s'));
}

function fmtDate(d){if(!d)return'-';const dt=new Date(d);return`${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`;}

function showModal(title,body,btns=[]){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  const footer=document.getElementById('modal-footer');
  if(btns.length){footer.innerHTML=btns.map(b=>`<button class="btn ${b.cls}" onclick="${b.fn}">${b.label}</button>`).join('');footer.style.display='flex';}
  else{footer.innerHTML='';footer.style.display='none';}
  document.getElementById('overlay').classList.add('on');
}
function closeModal(){document.getElementById('overlay').classList.remove('on');}
function overlayClick(e){if(e.target===document.getElementById('overlay'))closeModal();}
function toast(msg,type='i'){const wrap=document.getElementById('toasts');const el=document.createElement('div');el.className=`toast ${type}`;el.textContent=msg;wrap.appendChild(el);setTimeout(()=>el.remove(),3000);}
</script>
