<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>мһ¬кі  кҙҖлҰ¬</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="мһ¬кі кҙҖлҰ¬">
<meta name="theme-color" content="#ffffff">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --primary:#4F46E5;--primary-l:#EEF2FF;--primary-d:#3730A3;
  --success:#059669;--success-l:#ECFDF5;
  --warning:#D97706;--warning-l:#FFFBEB;
  --danger:#DC2626;--danger-l:#FEF2F2;
  --purple:#7C3AED;--purple-l:#F5F3FF;
  --bg:#F9FAFB;--card:#fff;
  --text:#111827;--muted:#9CA3AF;--border:#F3F4F6;--border2:#E5E7EB;
  --nav-h:60px;
}
html{height:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100%;overflow:hidden;overscroll-behavior:none;}
/* Setup */
.setup{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,var(--primary),var(--primary-d));z-index:500;}
.setup-card{background:#fff;border-radius:20px;padding:36px 24px;width:100%;max-width:400px;}
.setup-logo{text-align:center;margin-bottom:28px;}
.setup-logo .icon{font-size:52px;}
.setup-logo h1{font-size:22px;font-weight:800;margin-top:10px;color:var(--primary);}
.setup-logo p{color:var(--muted);font-size:13px;margin-top:4px;}
/* App shell вҖ” мӢӨм ң ліҙмқҙлҠ” лҶ’мқҙм—җ л§һм¶ҳ flex м»¬лҹј (н—ӨлҚ”/мҪҳн…җмё /н•ҳлӢЁл°”) */
.app{display:none;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;}
.app.on{display:flex;}
/* Header вҖ” мқјл°ҳ flex н•ӯлӘ© (кі м • лҶ’мқҙ) */
.hdr{flex:0 0 auto;background:#fff;padding:14px 16px 14px;padding-top:calc(env(safe-area-inset-top,0px) + 12px);border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;z-index:100;}
.hdr-center{position:absolute;left:50%;transform:translateX(-50%);text-align:center;}
.hdr-title{font-size:17px;font-weight:700;}
.hdr-left,.hdr-right{display:flex;align-items:center;gap:6px;min-width:60px;height:36px;}
.hdr-right{justify-content:flex-end;}
.icon-btn{width:36px;height:36px;border:none;background:transparent;border-radius:9px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--text);}
.icon-btn.primary{background:var(--primary);color:#fff;border-radius:50%;}
/* Content вҖ” мң мқјн•ң мҠӨнҒ¬лЎӨ мҳҒм—ӯ (flexк°Җ лӮЁмқҖ кіөк°„мқ„ лӘЁл‘җ м°Ём§Җ) */
.content{flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding-bottom:24px;}
/* Bottom nav вҖ” мқјл°ҳ flex н•ӯлӘ© (кі м • лҶ’мқҙ, лҚ” мқҙмғҒ fixed м•„лӢҳ) */
.bnav{flex:0 0 auto;height:calc(var(--nav-h) + env(safe-area-inset-bottom,0px));padding-bottom:env(safe-area-inset-bottom,0px);background:#fff;border-top:1px solid var(--border2);display:flex;align-items:flex-start;padding-top:6px;z-index:100;}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--muted);border:none;background:none;}
.bnav-item.active{color:var(--primary);}
.bnav-icon{font-size:22px;line-height:1;}
.bnav-label{font-size:10px;font-weight:600;}
/* Sections */
.page-pad{padding:16px;}
.section-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:20px 16px 8px;}
/* Cards */
.card{background:#fff;border-radius:14px;margin:0 16px 10px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.card-pad{padding:16px;}
/* Row list items */
.row-list{background:#fff;border-radius:14px;margin:0 16px 10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.row-item{display:flex;align-items:center;justify-content:space-between;padding:15px 16px;border-bottom:1px solid var(--border);cursor:pointer;}
.row-item:last-child{border-bottom:none;}
.row-item:active{background:var(--bg);}
.row-label{font-size:15px;color:var(--text);}
.row-value{font-size:15px;color:var(--muted);display:flex;align-items:center;gap:4px;}
.row-value.set{color:var(--text);font-weight:600;}
.row-arrow{color:var(--muted);font-size:14px;}
/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px;}
.stat-box{background:#fff;border-radius:14px;padding:14px 12px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.stat-num{font-size:26px;font-weight:900;color:var(--primary);}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px;}
/* Badges */
.badge{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block;}
.badge-primary{background:var(--primary-l);color:var(--primary);}
.badge-success{background:var(--success-l);color:var(--success);}
.badge-warning{background:var(--warning-l);color:var(--warning);}
.badge-danger{background:var(--danger-l);color:var(--danger);}
.badge-gray{background:#F3F4F6;color:#374151;}
.badge-purple{background:var(--purple-l);color:var(--purple);}
/* Product card */
.prod-card{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;}
.prod-card:last-child{border-bottom:none;}
.prod-card:active{background:var(--bg);}
.prod-thumb{width:50px;height:50px;border-radius:10px;object-fit:cover;flex-shrink:0;}
.prod-thumb-ph{width:50px;height:50px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.prod-info{flex:1;min-width:0;}
.prod-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prod-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.prod-badges{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;}
.prod-stock{text-align:right;flex-shrink:0;}
.prod-num{font-size:22px;font-weight:900;color:var(--primary);}
.prod-num.low{color:var(--danger);}
.prod-num-lbl{font-size:10px;color:var(--muted);}
/* Order card */
.order-card{padding:16px;border-bottom:1px solid var(--border);cursor:pointer;}
.order-card:last-child{border-bottom:none;}
.order-card:active{background:var(--bg);}
.order-no{font-size:15px;font-weight:700;}
.order-meta{font-size:12px;color:var(--muted);margin-top:3px;}
.order-total{font-size:16px;font-weight:800;color:var(--primary);margin-top:4px;}
/* Status tabs */
.status-tabs{display:flex;overflow-x:auto;padding:0 12px;gap:0;border-bottom:1px solid var(--border2);background:#fff;justify-content:flex-start;}
.status-tabs::-webkit-scrollbar{display:none;}
.stab{padding:12px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;}
.stab.active{color:var(--primary);border-bottom-color:var(--primary);}
/* Form rows (order form style) */
.form-rows{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.fr{display:flex;align-items:center;justify-content:space-between;padding:15px 16px;border-bottom:1px solid var(--border);}
.fr:last-child{border-bottom:none;}
.fr-label{font-size:15px;color:var(--text);flex-shrink:0;min-width:72px;}
.fr-right{flex:1;text-align:right;display:flex;align-items:center;justify-content:flex-end;gap:6px;}
.fr-input{border:none;outline:none;font-size:15px;color:var(--text);text-align:right;background:transparent;width:100%;}
.fr-input::placeholder{color:var(--muted);}
.fr-muted{font-size:15px;color:var(--muted);}
/* Order items */
.order-item-row{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);background:#fff;}
.oi-name{flex:1;font-size:13px;font-weight:600;min-width:0;}
.oi-sub{font-size:11px;color:var(--muted);}
.oi-qty{width:52px;}
.oi-qty input{width:100%;padding:6px 8px;border:1.5px solid var(--border2);border-radius:8px;font-size:14px;font-weight:700;text-align:center;}
.oi-price{font-size:13px;font-weight:700;color:var(--primary);text-align:right;min-width:70px;}
.oi-del{width:28px;height:28px;border:none;background:var(--danger-l);color:var(--danger);border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
/* Buttons */
.btn{display:block;width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;text-align:center;transition:opacity .15s,transform .1s;}
.btn:active{transform:scale(.98);opacity:.88;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-secondary{background:var(--border2);color:var(--text);}
.btn-success{background:var(--success);color:#fff;}
.btn-danger{background:var(--danger);color:#fff;}
.btn-outline{background:transparent;border:1.5px solid var(--primary);color:var(--primary);}
.btn-sm{padding:9px 16px;font-size:14px;border-radius:10px;width:auto;display:inline-block;}
.btn-row{display:flex;gap:10px;padding:16px;}
.btn-row .btn{margin:0;}
/* Search */
.search-wrap{padding:12px 16px;}
.search-input{width:100%;padding:11px 14px 11px 36px;background:#fff;border:1.5px solid var(--border2);border-radius:12px;font-size:15px;}
.search-box{position:relative;}
.search-box::before{content:'рҹ”Қ';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;z-index:1;pointer-events:none;}
/* Filter chips */
.chips{display:flex;gap:6px;padding:0 16px 12px;overflow-x:auto;}
.chips::-webkit-scrollbar{display:none;}
.chip{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border2);background:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;color:var(--muted);}
.chip.active{border-color:var(--primary);background:var(--primary-l);color:var(--primary);}
/* Modal/Sheet */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:flex-end;}
.overlay.on{display:flex;}
.sheet{background:#fff;border-radius:20px 20px 0 0;padding:0 0 env(safe-area-inset-bottom,20px);width:100%;max-height:94vh;overflow-y:auto;animation:slideUp .25s ease;}
.handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 0;}
.modal-hd{padding:16px 18px 14px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:17px;font-weight:700;}
.modal-close{font-size:22px;color:var(--muted);cursor:pointer;border:none;background:none;}
.modal-body{padding:16px;}
.modal-footer{padding:0 16px 16px;display:flex;gap:8px;}
.modal-footer .btn{margin:0;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
/* Toast */
.toast-wrap{position:fixed;top:56px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none;}
.toast{padding:10px 20px;border-radius:100px;font-size:13px;font-weight:700;color:#fff;animation:fadeIn .2s ease;box-shadow:0 4px 12px rgba(0,0,0,.15);}
.toast.s{background:var(--success);}
.toast.e{background:var(--danger);}
.toast.i{background:var(--primary);}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
/* Misc */
.slist{margin-top:8px;}
.sitem{padding:13px 0;border-bottom:1px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:space-between;}
.sitem:last-child{border-bottom:none;}
.sitem:active{opacity:.7;}
.sitem-name{font-size:14px;font-weight:700;}
.sitem-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.fg input,.fg select,.fg textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border2);border-radius:10px;font-size:16px;color:var(--text);background:#fff;-webkit-appearance:none;}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--primary);}
.fg textarea{resize:none;height:70px;}
.fg input:disabled{opacity:.5;background:var(--bg);}
.empty{text-align:center;padding:52px 20px;}
.empty .icon{font-size:44px;margin-bottom:10px;}
.empty p{color:var(--muted);font-size:14px;line-height:1.6;}
.divider{height:1px;background:var(--border2);margin:14px 0;}
.loc-stock-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);}
.loc-stock-row:last-child{border-bottom:none;}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.tag-item{background:var(--bg);border-radius:20px;padding:5px 10px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:5px;border:1px solid var(--border2);}
.tag-del{border:none;background:none;color:var(--muted);cursor:pointer;font-size:16px;line-height:1;padding:0;}
/* Photo upload */
.photo-upload-area{text-align:center;margin-bottom:18px;cursor:pointer;}
.photo-upload-box{width:90px;height:90px;border-radius:14px;margin:0 auto 8px;background:var(--bg);border:2px dashed var(--border2);overflow:hidden;display:flex;align-items:center;justify-content:center;}
.photo-upload-box img{width:100%;height:100%;object-fit:cover;}
.detail-hero-img{width:100%;max-height:180px;object-fit:cover;border-radius:12px;margin-bottom:14px;}
.detail-hero-ph{width:100%;height:100px;background:var(--bg);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:44px;margin-bottom:14px;}
/* TX icons */
.tx-item{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border);}
.tx-item:last-child{border-bottom:none;}
.tx-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.tx-icon.in{background:var(--success-l);}
.tx-icon.out{background:var(--danger-l);}
.tx-icon.send_consignment{background:var(--purple-l);}
.tx-icon.return_consignment{background:var(--warning-l);}
.tx-icon.consignment_sale,.tx-icon.warehouse_adj,.tx-icon.consignment_adj{background:var(--bg);}
.tx-info{flex:1;min-width:0;}
.tx-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tx-meta{font-size:11px;color:var(--muted);margin-top:1px;}
.tx-qty{font-size:14px;font-weight:800;flex-shrink:0;}
.tx-qty.in,.tx-qty.return_consignment{color:var(--success);}
.tx-qty.out,.tx-qty.consignment_sale{color:var(--danger);}
.tx-qty.send_consignment{color:var(--purple);}
.tx-qty.warehouse_adj,.tx-qty.consignment_adj{color:var(--muted);}
/* inout */
.type-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px;}
.type-btn{padding:10px 4px;border:2px solid var(--border2);border-radius:12px;background:#fff;cursor:pointer;text-align:center;}
.type-btn span{display:block;font-size:20px;margin-bottom:3px;}
.type-btn p{font-size:10px;font-weight:700;color:var(--muted);}
.type-btn.sel-in{border-color:var(--success);background:var(--success-l);}
.type-btn.sel-in p{color:var(--success);}
.type-btn.sel-out{border-color:var(--danger);background:var(--danger-l);}
.type-btn.sel-out p{color:var(--danger);}
.type-btn.sel-send{border-color:var(--purple);background:var(--purple-l);}
.type-btn.sel-send p{color:var(--purple);}
.type-btn.sel-return{border-color:var(--warning);background:var(--warning-l);}
.type-btn.sel-return p{color:var(--warning);}
.type-btn.sel-csale{border-color:var(--danger);background:var(--danger-l);}
.type-btn.sel-csale p{color:var(--danger);}
.type-btn.sel-wadj,.type-btn.sel-cadj{border-color:var(--muted);background:var(--bg);}
.type-btn.sel-wadj p,.type-btn.sel-cadj p{color:var(--muted);}
.selector-row{padding:13px 14px;border:1.5px solid var(--border2);border-radius:10px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:#fff;margin-bottom:13px;}
.selector-row.sel{border-color:var(--primary);background:var(--primary-l);}
.selector-text{font-size:15px;color:var(--muted);}
.selector-row.sel .selector-text{color:var(--text);font-weight:700;}
.infobox{background:var(--primary-l);border:1px solid #C7D2FE;border-radius:10px;padding:12px 14px;font-size:12px;color:var(--primary-d);line-height:1.6;margin-bottom:12px;}
@media(min-width:500px){
  .sheet{max-width:500px;margin:0 auto;border-radius:20px;}
  .overlay{align-items:center;justify-content:center;}
  .app{max-width:640px;margin:0 auto;border-left:1px solid var(--border2);border-right:1px solid var(--border2);}
}
</style>
</head>
<body>

<div class="setup" id="setup-screen" style="display:none">
  <div class="setup-card">
    <div class="setup-logo">
      <div class="icon">рҹ“Ұ</div>
      <h1>мһ¬кі  кҙҖлҰ¬</h1>
      <p>м°Ҫкі  + мң„нғҒмІҳ нҶөн•© мһ¬кі  кҙҖлҰ¬</p>
    </div>
    <div class="fg"><label>лӮҙ мқҙлҰ„</label><input type="text" id="sb-name" placeholder="нҷҚкёёлҸҷ" maxlength="20" style="font-size:18px;font-weight:700;text-align:center;"></div>
    <button class="btn btn-primary" onclick="finishSetup()">мӢңмһ‘н•ҳкё° рҹҡҖ</button>
  </div>
</div>

<div class="app" id="app">
  <div class="hdr" id="hdr">
    <div class="hdr-left" id="hdr-left"></div>
    <div class="hdr-center"><div class="hdr-title" id="hdr-title">нҷҲ</div></div>
    <div class="hdr-right" id="hdr-right"></div>
  </div>
  <div class="content" id="content"></div>
  <div class="bnav">
    <button class="bnav-item" id="nav-products" onclick="go('products')"><span class="bnav-icon">рҹ“Ұ</span><span class="bnav-label">мһ¬кі </span></button>
    <button class="bnav-item" id="nav-sales" onclick="go('sales')"><span class="bnav-icon">рҹ§ҫ</span><span class="bnav-label">лӮ©н’Ҳм„ң</span></button>
    <button class="bnav-item active" id="nav-dash" onclick="go('dash')"><span class="bnav-icon">рҹҸ </span><span class="bnav-label">нҷҲ</span></button>
    <button class="bnav-item" id="nav-consign" onclick="go('consign')"><span class="bnav-icon">рҹҡҡ</span><span class="bnav-label">мң„нғҒмІҳ</span></button>
    <button class="bnav-item" id="nav-more" onclick="go('more')"><span class="bnav-icon">вӢҜ</span><span class="bnav-label">лҚ”ліҙкё°</span></button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="sheet" id="sheet">
    <div class="handle"></div>
    <div class="modal-hd">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">вң•</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer" style="display:none;"></div>
  </div>
</div>
<div class="toast-wrap" id="toasts"></div>

<script>
const SB_URL='https://ctmbygkiqimctmouylof.supabase.co';
const SB_KEY='sb_publishable_uE-oA2O-lifSx7I9YcghdQ_v7I2wCRv';

const S={
  tab:'dash',products:[],locations:[],cstocks:[],transactions:[],
  salesOrders:[],salesOrderItems:[],purchaseOrders:[],purchaseOrderItems:[],
  ingredients:[],recipes:[],recipeItems:[],
  warehouses:[],warehouseStocks:[],
  cfg:null,sb:null,
  stockTab:'products',
  pSearch:'',pFilter:'all',pSort:'name',
  pFilters:{stock:null,type:null,classification:null,category:null,location:null},
  txType:'in',txProduct:null,txLocation:null,txWarehouse:null,txToWarehouse:null,txItems:[],
  histFilter:'all',histLocFilter:'all',
  salesFilter:'all',purchaseFilter:'all',

/* в”Җв”Җ мӣҗмһ¬лЈҢ кҙҖлҰ¬ в”Җв”Җ */
function ingPricePerG(ing){
  if(!ing.package_qty||!ing.package_price)return 0;
  const ppu=ing.package_price/ing.package_qty; // лӢЁмң„лӢ№ к°ҖкІ© (g лҳҗлҠ” ml)
  if(ing.package_unit==='ml'&&ing.density&&ing.density>0){
    // ml лӢЁмң„: gлӢ№ к°ҖкІ© = mlлӢ№ к°ҖкІ© Г· л°ҖлҸ„(g/ml)
    // мҳҲ) вӮ©98/ml Г· 0.8g/ml = вӮ©122.5/g
    return ppu/ing.density;
  }
  return ppu; // g лӢЁмң„: к·ёлҢҖлЎң gлӢ№ к°ҖкІ©
}

window.importIngredientExcel=function(input){

  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'binary'});

      const sheetName=wb.SheetNames.find(n=>n.includes('мӣҗмһ¬лЈҢ'))||wb.SheetNames[0];
      const ws=wb.Sheets[sheetName];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
      // н—ӨлҚ” н–ү м°ҫкё° (л¶„лҘҳ, н’ҲлӘ© л“ұ нҸ¬н•Ё)
      let headerRow=-1;
      for(let i=0;i<Math.min(rows.length,10);i++){

      const headers=rows[headerRow].map(c=>String(c||'').trim());
      const colIdx={
        category: headers.findIndex(h=>h.includes('л¶„лҘҳ')),
        name: headers.findIndex(h=>h.includes('н’ҲлӘ©')||h.includes('мқҙлҰ„')||h.includes('мӣҗмһ¬лЈҢ')),
        qty: headers.findIndex(h=>h.includes('мҡ©лҹү')||h.includes('мҲҳлҹү')),
        unit: headers.findIndex(h=>h==='лӢЁмң„'||h==='g'||h==='ml'),
        price: headers.findIndex(h=>h.includes('лӢЁк°Җ')&&!h.includes('/')),
        notes: headers.findIndex(h=>h.includes('л№„кі ')||h.includes('л…ёнҠё')),
      };
      const preview=[];
      for(let i=headerRow+1;i<rows.length;i++){
        const row=rows[i];

        const name=colIdx.name>=0?String(row[colIdx.name]||'').trim():'';
        if(!name||name==='кі„'||name==='н•©кі„')continue;
        preview.push({

          name,
          package_qty:colIdx.qty>=0?parseFloat(row[colIdx.qty])||null:null,
          package_unit:colIdx.unit>=0?String(row[colIdx.unit]||'g').trim():'g',
          package_price:colIdx.price>=0?parseFloat(row[colIdx.price])||0:0,
          notes:colIdx.notes>=0?String(row[colIdx.notes]||'').trim():'',
        });
      }
      if(!preview.length){toast('к°Җм ёмҳ¬ лҚ°мқҙн„°к°Җ м—ҶмҠөлӢҲлӢӨ','e');return;}
      S._ingImportPreview=preview; // м „м—ӯ мғҒнғңм—җ м ҖмһҘ (onclick л¬ёмһҗм—ҙ м „лӢ¬ л¬ём ң нҡҢн”ј)
      const existing=S.ingredients.map(i=>i.name.toLowerCase());
      showModal(`м—‘м…Җ к°Җм ёмҳӨкё° лҜёлҰ¬ліҙкё° (${preview.length}кұҙ)`,`
        <div style="font-size:13px;color:var(--muted);margin-bottom:10px;">к°Җм ёмҳ¬ н•ӯлӘ©мқ„ м„ нғқн•ҳм„ёмҡ”. мІҙнҒ¬ н•ҙм ңн•ҳл©ҙ м ңмҷёлҗ©лӢҲлӢӨ.</div>
        <div style="display:flex;gap:8px;margin-bottom:8px;">
          <button onclick="document.querySelectorAll('.ing-imp-chk').forEach(c=>c.checked=true)" style="padding:4px 10px;border:1.5px solid var(--border2);border-radius:8px;font-size:12px;cursor:pointer;background:#fff;">м „мІҙ м„ нғқ</button>

    }catch(err){toast('нҢҢмқј нҢҢмӢұ мҳӨлҘҳ: '+err.message,'e');}

  reader.readAsBinaryString(file);

/* в”Җв”Җ м ңн’Ҳлі„ мӣҗк°Җ кө¬м„ұ н•ӯлӘ© (localStorage) в”Җв”Җ */
function getCostItems(pid){const s=localStorage.getItem('ci_'+pid);return s?JSON.parse(s):[];}
function saveCostItems(pid,items){localStorage.setItem('ci_'+pid,JSON.stringify(items));}
function getGlobalCostItems(){const s=localStorage.getItem('ci_global');return s?JSON.parse(s):[];}
function saveGlobalCostItems(items){localStorage.setItem('ci_global',JSON.stringify(items));}
// type: 'fixed'=кі м •кёҲм•Ў/к°ң, 'pct_material'=мһ¬лЈҢл№„%, 'pct_sale'=нҢҗл§Өк°Җ%, 'ingredient'=нҸ¬мһҘмһ¬/мӣҗмһ¬лЈҢ м°ёмЎ°
function costItemAmount(it,materialCost,salePrice){
  if(it.type==='fixed')return it.value;
  if(it.type==='pct_sale')return salePrice*(it.value/100);
  if(it.type==='ingredient'){
    const ing=S.ingredients.find(x=>x.id===it.ingredientId);
    if(!ing)return 0;
    const unitPrice=ing.package_qty?ing.package_price/ing.package_qty:(ing.package_price||0);
    return unitPrice*(it.qty||1);
  }
  return 0; // pct_materialмқҖ lossPctлЎң лі„лҸ„ мІҳлҰ¬
}
function calcCostItems(pid,materialCost){
  const p=S.products.find(x=>x.id===pid);
  const salePrice=p?.unit_price||0;
  const items=[...getGlobalCostItems().map(it=>({...it,_global:true})),...getCostItems(pid)];
  let extra=0,lossPct=0;
  items.forEach(it=>{
    if(it.type==='pct_material')lossPct+=it.value/100;
    else extra+=costItemAmount(it,materialCost,salePrice);
  });
  return{extra,lossPct,items,total:materialCost*(1+lossPct)+extra};
}

/* в”Җв”Җ л ҲмӢңн”ј В· мӣҗк°Җкі„мӮ° в”Җв”Җ */
function calcRecipeCost(productId){
  const recipe=S.recipes.find(r=>r.product_id===productId);if(!recipe)return null;
  const items=S.recipeItems.filter(i=>i.recipe_id===recipe.id);
  if(!items.length)return null;
  const batchWeight=recipe.batch_weight_g||1000;
  let batchCost=0;
  const breakdown=items.map(ri=>{
    const ing=S.ingredients.find(x=>x.id===ri.ingredient_id);
    const ppg=ing?ingPricePerG(ing):0;
    let amtG=ri.amount_g||0;
    if(ri.amount_unit==='ml'&&ing?.density)amtG=amtG*ing.density;
    const cost=amtG*ppg;
    batchCost+=cost;
    return{name:ri.ingredient_name,amtG,ppg,cost};
  });
  return{batchCost,batchWeight,breakdown,recipe};
}
function unitCostFromRecipe(productId,p){
  const rc=calcRecipeCost(productId);if(!rc)return null;
  const wg=p?.weight_g||0;if(!wg)return null;
  const materialCost=rc.batchCost*(wg/rc.batchWeight);
  const ci=calcCostItems(productId,materialCost);
  return ci.total;
}
// мһ¬лЈҢл№„л§Ң (мӣҗк°Җ н•ӯлӘ© м ңмҷё)
function unitMaterialCostOnly(productId,p){
  const rc=calcRecipeCost(productId);if(!rc)return null;
  const wg=p?.weight_g||0;if(!wg)return null;
  return rc.batchCost*(wg/rc.batchWeight);
}

window.triggerRecipeExcel=function(){document.getElementById('recipe-excel-input')?.click();};
window.importRecipeExcel=function(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'binary'});
      const sheetName=wb.SheetNames.find(n=>n.includes('мҡ©лҹү')||n.includes('л ҲмӢңн”ј'))||wb.SheetNames[0];
      const ws=wb.Sheets[sheetName];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
      if(rows.length<3){toast('л ҲмӢңн”ј лҚ°мқҙн„°лҘј м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ','e');return;}
      // м ңн’ҲлӘ… н–ү м°ҫкё° (м ңн’ҲлӘ…мқҙ м—¬лҹ¬ м»¬лҹјм—җ мһҲлҠ” н–ү)
      let prodRow=-1,ingStartRow=-1;
      for(let i=0;i<Math.min(rows.length,6);i++){
        const r=rows[i];const filled=r.filter(c=>c!=null&&String(c).trim()!=='').length;
        if(filled>=3){prodRow=i;ingStartRow=i+1;break;}
      }
      if(prodRow<0){toast('м ңн’ҲлӘ… н–үмқ„ м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ','e');return;}
      // м ңн’Ҳ м»¬лҹј (3лІҲм§ё м»¬лҹјл¶Җн„°)
      const prodCols=[];
      const hdr=rows[prodRow];
      for(let c=2;c<hdr.length;c++){if(hdr[c]!=null&&String(hdr[c]).trim())prodCols.push({col:c,name:String(hdr[c]).trim()});}
      if(!prodCols.length){toast('м ңн’Ҳ м»¬лҹјмқ„ м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ','e');return;}
      // мӣҗмһ¬лЈҢ н–ү нҢҢмӢұ
      const ingRows=[];
      for(let r=ingStartRow;r<rows.length;r++){
        const row=rows[r];
        const ingName=row[1]||row[2];
        if(!ingName||String(ingName).includes('кі„')||String(ingName).includes('н•©кі„'))continue;
        const name=String(ingName).replace(/\(.*?\)/g,'').trim();
        if(name)ingRows.push({row:r,name,rawName:String(ingName).trim()});
      }
      S._recipeImportData={prodCols,ingRows,rows,sheetName};
      // м ңн’Ҳ м„ нғқ лӘЁлӢ¬
      showModal('л ҲмӢңн”ј к°Җм ёмҳӨкё° вҖ” м ңн’Ҳ м„ нғқ',`
        <div style="font-size:13px;color:var(--muted);margin-bottom:12px;">к°Җм ёмҳ¬ м ңн’Ҳмқ„ м„ нғқн•ҳм„ёмҡ”. (мӢңнҠё: ${sheetName})</div>
        <div class="row-list">${prodCols.map(pc=>`<div class="row-item" onclick="previewRecipeImport(${pc.col},'${pc.name.replace(/'/g,'\\\'')}')" style="cursor:pointer;">
          <span style="font-weight:700;">${pc.name}</span><span class="row-arrow">вҖә</span>
        </div>`).join('')}</div>
      `);
      input.value='';
    }catch(err){toast('нҢҢмқј мҳӨлҘҳ: '+err.message,'e');}
  };
  reader.readAsBinaryString(file);
};
window.previewRecipeImport=function(col,excelProdName){
  const d=S._recipeImportData;if(!d)return;
  // м•ұ м ңн’Ҳкіј л§Өм№ӯ
  const matchedProd=S.products.find(p=>p.name.includes(excelProdName)||excelProdName.includes(p.name));
  const items=d.ingRows.map(ir=>{

    const matchedIng=S.ingredients.find(i=>i.name.replace(/\(.*?\)/g,'').trim()===ir.name||ir.name.includes(i.name)||i.name.includes(ir.name));
    return{...ir,amount:parseFloat(amt)||0,ingId:matchedIng?.id||null,ingName:matchedIng?.name||null};

  `,[{label:'м·ЁмҶҢ',cls:'btn-secondary',fn:'closeModal()'},{label:'к°Җм ёмҳӨкё°',cls:'btn-primary',fn:`confirmRecipeImport(${col})`}]);

window.confirmRecipeImport=async function(col){
  const d=S._recipeImportData;if(!d)return;
  const productId=document.getElementById('ri-prod-select')?.value;
  if(!productId){toast('м ңн’Ҳмқ„ м„ нғқн•ҳм„ёмҡ”','e');return;}
  const items=d.ingRows.map(ir=>{
    const amt=parseFloat(d.rows[ir.row]?.[col])||0;
    const matchedIng=S.ingredients.find(i=>i.name.replace(/\(.*?\)/g,'').trim()===ir.name||ir.name.includes(i.name)||i.name.includes(ir.name));
    return{name:ir.rawName,amount:amt,ingId:matchedIng?.id||null};
  }).filter(i=>i.amount>0);
  try{
    let recipe=S.recipes.find(r=>r.product_id===productId);
    if(!recipe){
      const{data}=await S.sb.from('recipes').insert({product_id:productId,batch_weight_g:1000,created_at:new Date().toISOString(),updated_at:new Date().toISOString()}).select().single();
      recipe=data;if(recipe)S.recipes.push(recipe);
    }else{
      await S.sb.from('recipe_items').delete().eq('recipe_id',recipe.id);
    }
    await S.sb.from('recipe_items').insert(items.map(it=>({recipe_id:recipe.id,ingredient_id:it.ingId||null,ingredient_name:it.name,amount_g:it.amount,amount_unit:'g'})));
    await loadRecipes();await autoSyncCost(productId);
    closeModal();renderRecipePage();toast(`л ҲмӢңн”ј ${items.length}к°ң н•ӯлӘ© к°Җм ёмҷ”мҠөлӢҲлӢӨ`,'s');
  }catch(err){toast('мҳӨлҘҳ: '+err.message,'e');}
};

function showRecipeEditor(productId){

      <div style="display:flex;justify-content:space-between;"><span>мһ¬лЈҢл№„</span><span>вӮ©${matCost.toFixed(0)}</span></div>
      ${ci.items.length>0?`<div style="display:flex;justify-content:space-between;"><span>м¶”к°Җ л№„мҡ© н•©кі„</span><span>вӮ©${ci.extra.toFixed(0)}${ci.lossPct>0?` (+лЎңмҠӨмңЁ ${(ci.lossPct*100).toFixed(1)}%)`:''}</span></div>`:''}

/* мӣҗк°Җ мһҗлҸҷ лҸҷкё°нҷ” (cost_mode=autoмқё м ңн’Ҳ) */
async function autoSyncCost(productId,showMsg=false){
  const p=S.products.find(x=>x.id===productId);
  if(!p){if(showMsg)toast('м ңн’Ҳмқ„ м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ','e');return;}
  if(p.cost_mode!=='auto'){if(showMsg)toast('мӣҗк°Җ мһ…л Ҙ л°©мӢқмқҙ "л ҲмӢңн”ј мһҗлҸҷкі„мӮ°"мқҙ м•„лӢҷлӢҲлӢӨ','w');return;}
  if(!p.weight_g){if(showMsg)toast('м ңн’Ҳ л¬ҙкІҢ(g)лҘј лЁјм Җ мһ…л Ҙн•ҳм„ёмҡ”','w');return;}
  const rc=calcRecipeCost(productId);
  if(!rc){if(showMsg)toast('л ҲмӢңн”ј н•ӯлӘ©мқҙ м—ҶмҠөлӢҲлӢӨ. л ҲмӢңн”јВ·мӣҗк°Җкі„мӮ°м—җм„ң мӣҗмһ¬лЈҢлҘј м¶”к°Җн•ҳм„ёмҡ”','w');return;}
  const uc=unitCostFromRecipe(productId,p);
  if(!uc){if(showMsg)toast('мӣҗк°Җ кі„мӮ° кІ°кіјк°Җ 0мһ…лӢҲлӢӨ. мӣҗмһ¬лЈҢ лӢЁк°ҖлҘј нҷ•мқён•ҳм„ёмҡ”','w');return;}
  const cost=Math.round(uc);
  await S.sb.from('products').update({cost_price:cost,updated_at:new Date().toISOString()}).eq('id',productId);
  p.cost_price=cost;
  if(showMsg)toast(`мӣҗк°Җ вӮ©${cost.toLocaleString()} мһҗлҸҷ м Ғмҡ©лҗЁ вң“`,'s');
}

window.submitRecipeItem=async function(productId){
  const ingId=document.getElementById('ri-ing')?.value;
  const amt=parseFloat(document.getElementById('ri-amt')?.value)||0;
  const unit=document.getElementById('ri-unit')?.value||'g';
  const ing=S.ingredients.find(x=>x.id===ingId);
  if(!ingId||amt<=0){toast('мӣҗмһ¬лЈҢмҷҖ мҲҳлҹүмқ„ мһ…л Ҙн•ҳм„ёмҡ”','e');return;}
  try{
    let recipe=S.recipes.find(r=>r.product_id===productId);
    if(!recipe){
      const{data}=await S.sb.from('recipes').insert({product_id:productId,batch_weight_g:1000,created_at:new Date().toISOString(),updated_at:new Date().toISOString()}).select().single();
      recipe=data;if(recipe)S.recipes.push(recipe);
    }
    await S.sb.from('recipe_items').insert({recipe_id:recipe.id,ingredient_id:ingId,ingredient_name:ing?.name||'',amount_g:amt,amount_unit:unit});
    await loadRecipes();await autoSyncCost(productId);showRecipeEditor(productId);toast('м¶”к°ҖлҗЁ В· мӣҗк°Җ мһҗлҸҷ м—…лҚ°мқҙнҠё','s');
  }catch(e){toast('мҳӨлҘҳ: '+e.message,'e');}
};

window.deleteRecipeItem=async function(itemId,productId){
  await S.sb.from('recipe_items').delete().eq('id',itemId);
  await loadRecipes();await autoSyncCost(productId);showRecipeEditor(productId);toast('мӮӯм ңлҗЁ','s');
};

window.saveBatchWeight=async function(productId){
  const w=parseInt(document.getElementById('recipe-batch')?.value)||1000;
  const recipe=S.recipes.find(r=>r.product_id===productId);
  if(recipe){await S.sb.from('recipes').update({batch_weight_g:w,updated_at:new Date().toISOString()}).eq('id',recipe.id);}
  else{await S.sb.from('recipes').insert({product_id:productId,batch_weight_g:w,created_at:new Date().toISOString(),updated_at:new Date().toISOString()});}
  await loadRecipes();await autoSyncCost(productId);showRecipeEditor(productId);toast('м ҖмһҘлҗЁ','s');
};

window.applyRecipeCost=async function(productId){
  const p=S.products.find(x=>x.id===productId);if(!p)return;
  const uc=unitCostFromRecipe(productId,p);
  if(!uc){toast(p.weight_g?'л ҲмӢңн”ј мӣҗк°Җ кі„мӮ° л¶Ҳк°Җ':'м ңн’Ҳ л¬ҙкІҢлҘј лЁјм Җ мһ…л Ҙн•ҳм„ёмҡ”','e');return;}
  await S.sb.from('products').update({cost_price:Math.round(uc),cost_mode:'auto',updated_at:new Date().toISOString()}).eq('id',productId);
  p.cost_price=Math.round(uc);p.cost_mode='auto';
  showRecipeEditor(productId);toast(`мӣҗк°Җ вӮ©${Math.round(uc)} мһҗлҸҷ м Ғмҡ©лҗЁ вң“`,'s');
};

/* в”Җв”Җ н•ңкёҖ кёҲм•Ў в”Җв”Җ */
function numToKorean(n){
  if(!n||n===0)return'мҳҒ мӣҗ';
  const u=['','мқј','мқҙ','мӮј','мӮ¬','мҳӨ','мңЎ','м№ ','нҢ”','кө¬'];
  const bu=['','л§Ң','м–ө'];
  const su=['','мӢӯ','л°ұ','мІң'];
  let num=Math.abs(Math.round(n)),res='',bi=0;
  while(num>0){
    const chunk=num%10000;
    if(chunk>0){
      let cs='';
      const p=[Math.floor(chunk/1000),Math.floor(chunk%1000/100),Math.floor(chunk%100/10),chunk%10];
      const sn=['мІң','л°ұ','мӢӯ',''];
      p.forEach((v,i)=>{if(v>0)cs+=(v>1||i===3?u[v]:'')+sn[i];});
      res=cs+bu[bi]+res;
    }
    num=Math.floor(num/10000);bi++;
  }
  return res+' мӣҗ';
}

    .on('postgres_changes',{event:'*',schema:'public',table:'warehouse_stocks'},()=>loadWarehouseStocks().then(()=>{if(S.tab==='dash')renderDash();if(S.tab==='products')renderProducts();if(S.tab==='warehouses')renderWarehouses();}))
    .on('postgres_changes',{event:'*',schema:'public',table:'transactions'},()=>loadTx().then(()=>{if(S.tab==='dash')renderDash();}))
    .on('postgres_changes',{event:'*',schema:'public',table:'sales_orders'},()=>loadSalesOrders().then(()=>{if(S.tab==='dash')renderDash();if(S.tab==='sales')renderSales();}))
    .on('postgres_changes',{event:'*',schema:'public',table:'purchase_orders'},()=>loadPurchaseOrders().then(()=>{if(S.tab==='purchase')renderPurchase();}))
    .subscribe();
}

/* в”Җв”Җ мһ¬кі  н—¬нҚј в”Җв”Җ */
function getCS(pid,lid){return S.cstocks.find(s=>s.product_id===pid&&s.location_id===lid);}
function getWS(pid,wid){return S.warehouseStocks.find(s=>s.product_id===pid&&s.warehouse_id===wid);}
function getTotalWarehouseStock(pid){return S.warehouseStocks.filter(s=>s.product_id===pid).reduce((a,s)=>a+s.quantity,0);}
function getTotalStock(p){
  const ws=S.warehouseStocks.filter(s=>s.product_id===p.id);
  const whTotal=ws.length>0?ws.reduce((a,s)=>a+s.quantity,0):p.current_stock;
  return whTotal+S.cstocks.filter(s=>s.product_id===p.id).reduce((a,s)=>a+s.quantity,0);
}
function getDefaultWarehouse(){return S.warehouses.find(w=>w.is_default)||S.warehouses[0]||null;}

async function upsertWS(pid,wid,qty){
  const ex=getWS(pid,wid);const now=new Date().toISOString();
  if(ex){await S.sb.from('warehouse_stocks').update({quantity:qty,updated_at:now}).eq('id',ex.id);ex.quantity=qty;}
  else{const{data:ins}=await S.sb.from('warehouse_stocks').insert({product_id:pid,warehouse_id:wid,quantity:qty,updated_at:now}).select().single();if(ins)S.warehouseStocks.push(ins);}
  // sync current_stock = sum of all warehouse_stocks
  const total=getTotalWarehouseStock(pid);
  await S.sb.from('products').update({current_stock:total,updated_at:now}).eq('id',pid);
  const p=S.products.find(x=>x.id===pid);if(p)p.current_stock=total;
}

async function recordTx(data){
  const p=S.products.find(x=>x.id===data.product_id);
  if(!p)throw new Error('м ңн’Ҳмқ„ м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ');
  const q=data.quantity;
  const now=new Date().toISOString();

  // warehouse stock before
  const wid=data.warehouse_id;
  const ws=wid?getWS(p.id,wid):null;
  // warehouse_stocks н•ӯлӘ©мқҙ м—Ҷмңјл©ҙ current_stock мӮ¬мҡ© (м°Ҫкі  лҜём„Өм • м ңн’Ҳ нҳёнҷҳ)
  const ws0=ws!=null?ws.quantity:p.current_stock;

  // for move type
  if(data.type==='move'){
    const fwid=data.from_warehouse_id,twid=data.to_warehouse_id;
    if(!fwid||!twid)throw new Error('м¶ңл°ң/лҸ„м°© м°Ҫкі лҘј м„ нғқн•ҳм„ёмҡ”');
    const fw=getWS(p.id,fwid);const fw0=fw?fw.quantity:0;
    if(fw0<q)throw new Error(`м¶ңл°ң м°Ҫкі  мһ¬кі  л¶ҖмЎұ (нҳ„мһ¬ ${fw0}к°ң)`);
    const tw=getWS(p.id,twid);const tw0=tw?tw.quantity:0;
    const fwName=S.warehouses.find(w=>w.id===fwid)?.name||'';
    const twName=S.warehouses.find(w=>w.id===twid)?.name||'';
    const{error:te}=await S.sb.from('transactions').insert({product_id:p.id,product_name:p.name,type:'move',quantity:q,warehouse_id:fwid,warehouse_name:fwName,to_warehouse_id:twid,to_warehouse_name:twName,wh_before:fw0,wh_after:fw0-q,notes:data.notes||'',created_by:S.cfg.username,created_at:now});
    if(te)throw te;
    await upsertWS(p.id,fwid,fw0-q);await upsertWS(p.id,twid,tw0+q);
    return;
  }

  let wh0=ws0,wh1=ws0,cs0=0,cs1=0;
  if(data.location_id){const cs=getCS(p.id,data.location_id);cs0=cs?cs.quantity:0;cs1=cs0;}
  switch(data.type){
    case 'in':wh1=wh0+q;break;
    case 'out':wh1=wh0-q;if(wh1<0)throw new Error(`м°Ҫкі  мһ¬кі  л¶ҖмЎұ (нҳ„мһ¬ ${wh0}к°ң)`);break;
    case 'send_consignment':wh1=wh0-q;if(wh1<0)throw new Error(`м°Ҫкі  мһ¬кі  л¶ҖмЎұ (нҳ„мһ¬ ${wh0}к°ң)`);cs1=cs0+q;break;
    case 'return_consignment':cs1=cs0-q;if(cs1<0)throw new Error(`мң„нғҒ мһ¬кі  л¶ҖмЎұ`);wh1=wh0+q;break;
    case 'consignment_sale':cs1=cs0-q;if(cs1<0)throw new Error(`мң„нғҒ мһ¬кі  л¶ҖмЎұ`);break;
    case 'warehouse_adj':wh1=q;break;
    case 'consignment_adj':cs1=q;break;
  }
  const loc=S.locations.find(l=>l.id===data.location_id);
  const whName=wid?S.warehouses.find(w=>w.id===wid)?.name||'':'';
  const{error:te}=await S.sb.from('transactions').insert({product_id:p.id,product_name:p.name,type:data.type,quantity:q,warehouse_id:wid||null,warehouse_name:whName,location_id:data.location_id||null,location_name:loc?loc.name:'',wh_before:wh0,wh_after:wh1,cs_before:cs0,cs_after:cs1,notes:data.notes||'',created_by:S.cfg.username,created_at:now});
  if(te)throw te;
  if(wid&&wh1!==wh0)await upsertWS(p.id,wid,wh1);
  else if(!wid&&wh1!==wh0){await S.sb.from('products').update({current_stock:wh1,updated_at:now}).eq('id',p.id);p.current_stock=wh1;}
  if(data.location_id&&cs1!==cs0){
    const ex=getCS(p.id,data.location_id);
    if(ex){await S.sb.from('consignment_stocks').update({quantity:cs1,updated_at:now}).eq('id',ex.id);ex.quantity=cs1;}
    else{const{data:ins}=await S.sb.from('consignment_stocks').insert({product_id:p.id,location_id:data.location_id,quantity:cs1,updated_at:now}).select().single();if(ins)S.cstocks.push(ins);}
  }
}

function soTypeLabel(t){return t==='consignment'?'рҹҡҡ мң„нғҒ':'рҹӣ’ нҢҗл§Ө';}

/* в”Җв”Җ лӮ©н’Ҳм„ң м¶ңкі  мҷ„лЈҢ в”Җв”Җ */
async function completeSalesOrder(id){
  const o=S.salesOrders.find(x=>x.id===id);if(!o)return;
  const isCS=o.order_type==='consignment';
  if(isCS&&!o.location_id){toast('мң„нғҒмІҳк°Җ м§Җм •лҗҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ','e');return;}
  const msg=isCS?'мң„нғҒмІҳлЎң мһ¬кі к°Җ мқҙлҸҷлҗ©лӢҲлӢӨ. м§„н–үн•ҳмӢңкІ мҠөлӢҲк№Ң?':'мһ¬кі к°Җ м°Ёк°җлҗ©лӢҲлӢӨ. м§„н–үн•ҳмӢңкІ мҠөлӢҲк№Ң?';
  if(!confirm(msg))return;
  const items=S.salesOrderItems.filter(i=>i.order_id===id);
  try{
    for(const item of items){
      if(!item.product_id)continue;
      const whId=o.warehouse_id||getDefaultWarehouse()?.id;
      if(isCS){
        await recordTx({product_id:item.product_id,type:'send_consignment',quantity:item.quantity,warehouse_id:whId,location_id:o.location_id,notes:`лӮ©н’Ҳм„ң ${o.order_no}`});
      }else{
        await recordTx({product_id:item.product_id,type:'out',quantity:item.quantity,warehouse_id:whId,notes:`лӮ©н’Ҳм„ң ${o.order_no}`});
      }
    }
    await S.sb.from('sales_orders').update({status:'completed',updated_at:new Date().toISOString()}).eq('id',id);
    await loadSalesOrders();await loadProducts();await loadCstocks();await loadWarehouseStocks();
    closeModal();toast('м¶ңкі  мҷ„лЈҢ мІҳлҰ¬лҗҳм—ҲмҠөлӢҲлӢӨ','s');
    if(S.tab==='sales')renderSales();else if(S.tab==='dash')renderDash();
  }catch(e){toast('мҳӨлҘҳ: '+e.message,'e');}
}

async function confirmQuote(id){
  await S.sb.from('sales_orders').update({status:'quote_confirmed',updated_at:new Date().toISOString()}).eq('id',id);
  await loadSalesOrders();closeModal();if(S.tab==='sales')renderSales();toast('кІ¬м Ғмқҙ нҷ•м •лҗҳм—ҲмҠөлӢҲлӢӨ','s');
}
async function convertToDelivery(id){
  if(!confirm('лӮ©н’Ҳм„ңлЎң м „нҷҳн•ҳл©ҙ м¶ңкі лҢҖкё° мғҒнғңк°Җ лҗ©лӢҲлӢӨ. м§„н–үн•ҳмӢңкІ мҠөлӢҲк№Ң?'))return;
  await S.sb.from('sales_orders').update({status:'pending',updated_at:new Date().toISOString()}).eq('id',id);
  await loadSalesOrders();closeModal();if(S.tab==='sales')renderSales();toast('лӮ©н’Ҳм„ңлЎң м „нҷҳлҗҳм—ҲмҠөлӢҲлӢӨ','s');
}
async function deleteSalesOrder(id){
  if(!confirm('нҢҗл§Өм„ңлҘј мӮӯм ңн•ҳмӢңкІ мҠөлӢҲк№Ң?'))return;
  await S.sb.from('sales_orders').delete().eq('id',id);
  await loadSalesOrders();closeModal();
  if(S.tab==='sales')renderSales();else if(S.tab==='dash')renderDash();
  toast('мӮӯм ңлҗҳм—ҲмҠөлӢҲлӢӨ','s');
}

window.showSoWhPicker=function(){

  showModal('м¶ңкі  м°Ҫкі  м„ нғқ',`<div>${S.warehouses.map(w=>`<div class="sitem" onclick="S._soWarehouseId='${w.id}';showSalesOrderForm(S.soEditOrder,true)"><div class="sitem-name">${w.name}${w.is_default?' вӯҗ':''}</div></div>`).join('')}</div>`);
};
function calcDiscAmt(dType,dVal,subtotal){
  if(dType==='percent')return subtotal*dVal/100;
  if(dType==='amount_each'){
    return S.pendingItems.reduce((a,i)=>a+Math.min(dVal,i.unit_price||0)*(i.quantity||1),0);
  }
  return dVal; // amount (total)
}
function recalcSo(){
  const subtotal=S.pendingItems.reduce((a,i)=>a+(i.unit_price||0)*(i.quantity||1),0);
  const dType=document.getElementById('so-disc-type')?.value||S._soDiscType||'amount';
  const dVal=parseFloat(document.getElementById('so-disc-val')?.value)||0;
  const discAmt=calcDiscAmt(dType,dVal,subtotal);
  const total=Math.max(0,subtotal-discAmt);
  const costTotal=S.pendingItems.reduce((a,i)=>a+(i.cost_price||0)*(i.quantity||1),0);
  const margin=total-costTotal;
  const mpct=total>0?(margin/total*100).toFixed(1):0;
  const el=id=>document.getElementById(id);
  if(el('so-subtotal-disp'))el('so-subtotal-disp').textContent='вӮ©'+subtotal.toLocaleString();
  if(el('so-disc-disp'))el('so-disc-disp').textContent='-вӮ©'+Math.round(discAmt).toLocaleString();
  if(el('so-total-display'))el('so-total-display').textContent='вӮ©'+Math.round(total).toLocaleString();
  if(el('so-margin-disp'))el('so-margin-disp').textContent='вӮ©'+Math.round(margin).toLocaleString()+` (${mpct}%)`;
}

function renderPendingItems(type){
  const wrap=document.getElementById(`${type==='sales'?'so':'po'}-items-wrap`);
  if(!wrap)return;
  wrap.innerHTML=S.pendingItems.length===0
    ?'<div style="text-align:center;color:var(--muted);padding:16px;font-size:14px;">м ңн’Ҳмқ„ м¶”к°Җн•ҳм„ёмҡ”</div>'
    :S.pendingItems.map((item,i)=>{
      const sub=(item.unit_price||0)*(item.quantity||1);
      const margin=type==='sales'?((item.unit_price||0)-(item.cost_price||0))*(item.quantity||1):null;
      return`<div class="order-item-row" style="margin-bottom:2px;">
        <div class="oi-name">
          <div>${item.product_name}</div>
          <div class="oi-sub">вӮ©${Number(item.unit_price||0).toLocaleString()}${margin!==null?` В· л§Ҳм§„ вӮ©${Number(margin).toLocaleString()}`:''}</div>
        </div>
        <div class="oi-qty"><input type="number" value="${item.quantity||1}" min="1" onchange="updatePendingItem(${i},'quantity',parseInt(this.value)||1,'${type}')"></div>
        <div class="oi-price">вӮ©${Number(sub).toLocaleString()}</div>
        <button class="oi-del" onclick="removePendingItem(${i},'${type}')">Г—</button>
      </div>`;
    }).join('');
  if(type==='sales')recalcSo();
  else{
    const total=S.pendingItems.reduce((a,i)=>a+(i.unit_price||0)*(i.quantity||1),0);
    const el=document.getElementById('po-total-display');
    if(el)el.textContent='вӮ©'+total.toLocaleString();
  }
}

window.updatePendingItem=function(i,field,val,type){S.pendingItems[i][field]=val;renderPendingItems(type);};

function getItemProducts(type){
  // лӮ©н’Ҳм„ң вҶ’ м ңн’Ҳ н…Ңмқҙлё” м „мІҙ, л°ңмЈјм„ң вҶ’ мӣҗмһ¬лЈҢ(ingredients) н…Ңмқҙлё”
  if(type==='purchase')return S.ingredients.map(i=>({id:i.id,name:i.name,code:'',unit_price:i.package_price||0,cost_price:0,current_stock:i.current_stock||0,_isIngredient:true,category:i.category}));

}
function itemRow(p,type){
  const t=p._isIngredient?(p.current_stock||0):getTotalStock(p);
  return`<div class="sitem" onclick="addPendingItem('${p.id}','${type}','${p._isIngredient?'ing':'prod'}')"><div><div class="sitem-name">${p.name}</div><div class="sitem-sub">${p.code||p.category||''} В· мһ¬кі  ${t}${p._isIngredient?'к°ң':'к°ң'} В· вӮ©${Number(p.unit_price||0).toLocaleString()}</div></div><span class="badge badge-primary">${t}</span></div>`;

function openAddItemModal(type){
  const pool=getItemProducts(type);
  const label=type==='sales'?'мҷ„м ңн’Ҳ':'мӣҗмһ¬лЈҢ/л°ҳм ңн’Ҳ л“ұ';
  const empty=pool.length===0?`<div style="color:var(--muted);padding:20px;text-align:center;font-size:13px;">л¶„лҘҳк°Җ '${label}'мқё м ңн’Ҳмқҙ м—ҶмҠөлӢҲлӢӨ.<br>м ңн’Ҳ кҙҖлҰ¬м—җм„ң л¶„лҘҳлҘј м„Өм •н•ҳм„ёмҡ”.</div>`:'';

}

window.filterItemList=function(q,type){
  const el=document.getElementById('item-list');if(!el)return;
  const pool=getItemProducts(type);
  const f=pool.filter(p=>!q||p.name.toLowerCase().includes(q.toLowerCase())||p.code.toLowerCase().includes(q.toLowerCase()));
  el.innerHTML=f.length===0?`<div style="color:var(--muted);padding:20px;text-align:center;font-size:13px;">кІҖмғү кІ°кіј м—ҶмқҢ</div>`:f.map(p=>itemRow(p,type)).join('');
};

window.addPendingItem=function(productId,type,src){
  const p=src==='ing'?S.ingredients.find(x=>x.id===productId):S.products.find(x=>x.id===productId);if(!p)return;
  const exists=S.pendingItems.find(i=>i.product_id===productId);
  if(exists){exists.quantity++;}
  else{S.pendingItems.push({product_id:p.id,product_name:p.name,product_code:p.code,quantity:1,unit_price:p.unit_price||0,cost_price:p.cost_price||0});}
  if(type==='sales')showSalesOrderForm(S.soEditOrder,true);
  else showPurchaseOrderForm(S.poEditOrder,true);
};

async function submitSalesOrder(id,status){
  const oType=S._soType||'sale';
  const custSel=document.getElementById('so-customer')?.value.trim()||'';
  const custTxt=document.getElementById('so-customer-txt')?.value.trim()||'';
  const customer=oType==='sale'?(custSel&&custSel!==''?custSel:custTxt||S._soCustomer||''):'';
  const locId=oType==='consignment'?S._soLocId:null;
  const locName=locId?S.locations.find(l=>l.id===locId)?.name||'':'';
  if(oType==='consignment'&&!locId&&status!=='draft'){toast('мң„нғҒмІҳлҘј м„ нғқн•ҳм„ёмҡ”','e');return;}
  const saleDate=document.getElementById('so-date')?.value||new Date().toISOString().substring(0,10);
  const shipDate=document.getElementById('so-ship')?.value||null;
  const notes=document.getElementById('so-notes')?.value.trim()||'';
  const discType=document.getElementById('so-disc-type')?.value||S._soDiscType||'amount';
  const discVal=parseFloat(document.getElementById('so-disc-val')?.value)||0;
  const warehouseId=S._soWarehouseId||getDefaultWarehouse()?.id||null;
  const warehouseName=S.warehouses.find(w=>w.id===warehouseId)?.name||'';
  if(S.pendingItems.length===0&&status!=='draft'){toast('м ңн’Ҳмқ„ м¶”к°Җн•ҳм„ёмҡ”','e');return;}
  const subtotal=S.pendingItems.reduce((a,i)=>(a+(i.unit_price||0)*(i.quantity||1)),0);
  const discAmt=calcDiscAmt(discType,discVal,subtotal);
  const total=Math.max(0,subtotal-discAmt);
  const now=new Date().toISOString();
  try{
    let orderId=id;
    const payload={customer,status,order_type:oType,location_id:locId||null,location_name:locName,warehouse_id:warehouseId,warehouse_name:warehouseName,sale_date:saleDate,ship_date:shipDate||null,notes,discount_type:discType,discount_value:discVal,total_amount:total,updated_at:now};
    if(!id){
      const no='SO-'+String((S.salesOrders.length+1)).padStart(6,'0');
      const{data,error}=await S.sb.from('sales_orders').insert({...payload,order_no:no,created_by:S.cfg.username,created_at:now}).select().single();
      if(error)throw error;orderId=data.id;
    }else{
      const{error}=await S.sb.from('sales_orders').update(payload).eq('id',id);
      if(error)throw error;
      await S.sb.from('sales_order_items').delete().eq('order_id',id);
    }
    if(S.pendingItems.length>0){
      const{error}=await S.sb.from('sales_order_items').insert(S.pendingItems.map(i=>({order_id:orderId,product_id:i.product_id,product_name:i.product_name,product_code:i.product_code,quantity:i.quantity,unit_price:i.unit_price})));
      if(error)throw error;
    }
    await loadSalesOrders();closeModal();
    if(S.tab==='sales')renderSales();else if(S.tab==='dash')renderDash();
    toast(status==='draft'?'мһ„мӢңм ҖмһҘлҗЁ':'лӮ©н’Ҳм„ң м ҖмһҘлҗЁ','s');
  }catch(e){toast('мҳӨлҘҳ: '+e.message,'e');}
}

    ${o.status==='draft'?`<button class="btn btn-primary" style="margin-bottom:8px;" onclick="closeModal();showPurchaseOrderForm(S.purchaseOrders.find(x=>x.id==='${id}'))">вңҸпёҸ мҲҳм •</button>`:''}
    <button class="btn btn-danger" onclick="deletePurchaseOrder('${id}')">мӮӯм ң</button>
  `);
}

async function completePurchaseOrder(id){
  if(!confirm('мһ…кі  мҷ„лЈҢ мІҳлҰ¬н•ҳл©ҙ мһ¬кі к°Җ м¶”к°Җлҗ©лӢҲлӢӨ. м§„н–үн•ҳмӢңкІ мҠөлӢҲк№Ң?'))return;
  const items=S.purchaseOrderItems.filter(i=>i.order_id===id);
  try{
    for(const item of items){
      if(item.product_id)await recordTx({product_id:item.product_id,type:'in',quantity:item.quantity,notes:`л°ңмЈјм„ң ${S.purchaseOrders.find(o=>o.id===id)?.order_no||''}`});
    }
    await S.sb.from('purchase_orders').update({status:'completed',updated_at:new Date().toISOString()}).eq('id',id);
    await loadPurchaseOrders();await loadProducts();
    closeModal();toast('мһ…кі  мҷ„лЈҢ мІҳлҰ¬лҗҳм—ҲмҠөлӢҲлӢӨ','s');
    if(S.tab==='purchase')renderPurchase();else if(S.tab==='dash')renderDash();
  }catch(e){toast('мҳӨлҘҳ: '+e.message,'e');}
}

async function deletePurchaseOrder(id){
  if(!confirm('л°ңмЈјм„ңлҘј мӮӯм ңн•ҳмӢңкІ мҠөлӢҲк№Ң?'))return;
  await S.sb.from('purchase_orders').delete().eq('id',id);
  await loadPurchaseOrders();closeModal();
  if(S.tab==='purchase')renderPurchase();
  toast('мӮӯм ңлҗҳм—ҲмҠөлӢҲлӢӨ','s');
}

function showPurchaseOrderForm(order,keepItems=false){
  if(!keepItems)S.pendingItems=order?S.purchaseOrderItems.filter(i=>i.order_id===order.id).map(i=>({...i})):[];
  S.poEditOrder=order??null;
  const isEdit=!!order;

async function submitPurchaseOrder(id,status){
  const suppSel=document.getElementById('po-supplier')?.value.trim()||'';
  const suppTxt=document.getElementById('po-supplier-txt')?.value.trim()||'';
  const supplier=suppSel&&suppSel!==''?suppSel:suppTxt;
  const orderDate=document.getElementById('po-date')?.value||new Date().toISOString().substring(0,10);
  const expectedDate=document.getElementById('po-expected')?.value||null;
  const notes=document.getElementById('po-notes')?.value.trim()||'';
  const total=S.pendingItems.reduce((a,i)=>(a+(i.unit_price||0)*(i.quantity||1)),0);
  const now=new Date().toISOString();
  try{
    let orderId=id;
    if(!id){
      const no='PO-'+String((S.purchaseOrders.length+1)).padStart(6,'0');
      const{data,error}=await S.sb.from('purchase_orders').insert({order_no:no,supplier,status,order_date:orderDate,expected_date:expectedDate||null,notes,total_amount:total,created_by:S.cfg.username,created_at:now,updated_at:now}).select().single();
      if(error)throw error;orderId=data.id;
    }else{
      const{error}=await S.sb.from('purchase_orders').update({supplier,status,order_date:orderDate,expected_date:expectedDate||null,notes,total_amount:total,updated_at:now}).eq('id',id);
      if(error)throw error;
      await S.sb.from('purchase_order_items').delete().eq('order_id',id);
    }
    if(S.pendingItems.length>0){
      const{error}=await S.sb.from('purchase_order_items').insert(S.pendingItems.map(i=>({order_id:orderId,product_id:i.product_id,product_name:i.product_name,product_code:i.product_code,quantity:i.quantity,unit_price:i.unit_price})));
      if(error)throw error;
    }
    await loadPurchaseOrders();closeModal();
    if(S.tab==='purchase')renderPurchase();else if(S.tab==='dash')renderDash();
    toast(status==='draft'?'мһ„мӢңм ҖмһҘлҗЁ':'л°ңмЈјм„ң м ҖмһҘлҗЁ','s');
  }catch(e){toast('мҳӨлҘҳ: '+e.message,'e');}
}

function filteredProducts(){
  const f=S.pFilters||{};let arr=[...S.products];
  if(S.pSearch){const q=S.pSearch.toLowerCase();arr=arr.filter(p=>p.name.toLowerCase().includes(q)||p.code.toLowerCase().includes(q));}
  if(f.stock==='low')arr=arr.filter(p=>getTotalStock(p)<=p.min_stock&&p.min_stock>0);
  if(f.type)arr=arr.filter(p=>f.type==='own'?p.type!=='oem':p.type==='oem');
  if(f.classification)arr=arr.filter(p=>p.classification===f.classification);
  if(f.category)arr=arr.filter(p=>p.category===f.category);
  if(f.location==='has')arr=arr.filter(p=>S.cstocks.some(s=>s.product_id===p.id&&s.quantity>0));
  if(f.locName)arr=arr.filter(p=>{const loc=S.locations.find(l=>l.name===f.locName);return loc&&S.cstocks.some(s=>s.product_id===p.id&&s.location_id===loc.id&&s.quantity>0);});
  const sort=S.pSort||'name';
  if(sort==='name')arr.sort((a,b)=>a.name.localeCompare(b.name,'ko'));
  else if(sort==='name_desc')arr.sort((a,b)=>b.name.localeCompare(a.name,'ko'));
  else if(sort==='sku')arr.sort((a,b)=>(a.code||'').localeCompare(b.code||''));
  else if(sort==='sku_desc')arr.sort((a,b)=>(b.code||'').localeCompare(a.code||''));
  else if(sort==='stock')arr.sort((a,b)=>getTotalStock(b)-getTotalStock(a));
  else if(sort==='stock_asc')arr.sort((a,b)=>getTotalStock(a)-getTotalStock(b));
  else if(sort==='created')arr.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  return arr;
}

  if(key==='location'&&S.pFilters.location)S.pFilters.locName=null;

}

window.toggleCostMode=function(val){const el=document.getElementById('pf-auto-info');if(el)el.style.display=val==='auto'?'':'none';};
window.recalcProductCode=function(){
  const t=document.getElementById('pc-type')?.value||'1';
  const c=document.getElementById('pc-cat')?.value||'C';
  const s=document.getElementById('pc-size')?.value||'D';
  const seq=String(parseInt(document.getElementById('pc-seq')?.value)||1).padStart(3,'0');
  const code=`${t}${c}-${s}${seq}`;
  const el=document.getElementById('pc-preview');if(el)el.textContent=code;
};
window.applyGeneratedCode=function(){
  const code=document.getElementById('pc-preview')?.textContent;
  const el=document.getElementById('pf-code');if(el&&code)el.value=code;
};
function previewProductImage(input){
  const file=input.files[0];if(!file)return;
  S.pendingImageFile=file;
  const reader=new FileReader();
  reader.onload=e=>{const box=document.getElementById('pf-img-box');if(box)box.innerHTML=`<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;">`;};
  reader.readAsDataURL(file);
}
async function uploadProductImage(file,code){
  const ext=file.name.split('.').pop().toLowerCase()||'jpg';
  const fileName=`${code.replace(/[^a-zA-Z0-9]/g,'_')}_${Date.now()}.${ext}`;
  const{error}=await S.sb.storage.from('product-images').upload(fileName,file,{upsert:true,contentType:file.type});
  if(error)throw error;
  const{data}=S.sb.storage.from('product-images').getPublicUrl(fileName);
  return data.publicUrl;
}
async function submitProduct(id){
  const name=document.getElementById('pf-name').value.trim(),code=document.getElementById('pf-code').value.trim();
  if(!name){toast('м ңн’ҲлӘ…мқҖ н•„мҲҳмһ…лӢҲлӢӨ','e');return;}
  if(code){const dup=S.products.find(p=>p.code===code&&p.id!==id);if(dup){toast(`мқҙлҜё мӮ¬мҡ© мӨ‘мқё SKUмһ…лӢҲлӢӨ (${dup.name})`,'e');return;}}
  const catVal=document.getElementById('pf-cat').value;
  const clsVal='';
  const cmode=document.getElementById('pf-cmode')?.value||'manual';
  const prod={id:id||undefined,name,code,category:catVal,classification:clsVal,type:document.getElementById('pf-type').value,unit_price:parseFloat(document.getElementById('pf-up').value)||0,cost_price:cmode==='manual'?(parseFloat(document.getElementById('pf-cp').value)||0):(parseFloat(document.getElementById('pf-cp').value)||0),current_stock:parseInt(document.getElementById('pf-stock').value)||0,min_stock:parseInt(document.getElementById('pf-min').value)||0,weight_g:parseFloat(document.getElementById('pf-weight')?.value)||null,weight_unit:document.getElementById('pf-wunit')?.value||'g',cost_mode:cmode};
  if(!id)delete prod.id;
  if(S.pendingImageFile){try{toast('мӮ¬м§„ м—…лЎңл“ң мӨ‘...','i');prod.image_url=await uploadProductImage(S.pendingImageFile,code);}catch(e){toast('мӮ¬м§„ м—…лЎңл“ң мӢӨнҢЁ: '+e.message,'e');}}
  try{
    const now=new Date().toISOString();
    if(id){const{id:_,created_at,...u}=prod;u.updated_at=now;const{error}=await S.sb.from('products').update(u).eq('id',id);if(error)throw error;}
    else{const{error}=await S.sb.from('products').insert({...prod,created_at:now,updated_at:now});if(error)throw error;}
    S.pendingImageFile=null;await loadProducts();
    // cost_mode=autoмқҙл©ҙ л ҲмӢңн”јм—җм„ң мҰүмӢң мӣҗк°Җ мһ¬кі„мӮ°
    const savedId=id||(S.products.find(p=>p.code===prod.code&&p.name===prod.name)?.id);
    if(prod.cost_mode==='auto'&&savedId)await autoSyncCost(savedId,true);
    closeModal();renderProducts();toast(id?'мҲҳм •лҗЁ':'м¶”к°ҖлҗЁ','s');
  }catch(e){toast('мҳӨлҘҳ: '+e.message,'e');}
}
async function confirmDeleteProduct(id){
  const p=S.products.find(p=>p.id===id);
  if(!confirm(`"${p?.name}"мқ„ мӮӯм ңн•ҳмӢңкІ мҠөлӢҲк№Ң?`))return;
  await S.sb.from('products').delete().eq('id',id);await loadProducts();closeModal();renderProducts();toast('мӮӯм ңлҗЁ','s');
}

async function recordIngTx(data){
  const ing=S.ingredients.find(x=>x.id===data.ingredient_id);if(!ing)throw new Error('мӣҗмһ¬лЈҢлҘј м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ');
  const cur=ing.current_stock||0;let next=cur;
  if(data.type==='in')next=cur+data.quantity;
  else if(data.type==='out'){next=cur-data.quantity;if(next<0)throw new Error(`мһ¬кі  л¶ҖмЎұ (нҳ„мһ¬ ${cur}к°ң)`);}
  await S.sb.from('ingredients').update({current_stock:next,updated_at:new Date().toISOString()}).eq('id',data.ingredient_id);
  ing.current_stock=next;
}

          ${S.txWarehouse&&S.txProduct?`<div style="font-size:12px;color:var(--muted);margin-top:4px;margin-bottom:6px;">м¶ңл°ң м°Ҫкі  мһ¬кі : <strong>${whStockInfo(S.txProduct.id,S.txWarehouse.id)}к°ң</strong></div>`:''}
          ${whSelector('лҸ„м°© м°Ҫкі ',S.txToWarehouse,"showWhSearch('to')")}
        `:`
          ${needsWH(type)?whSelector('м°Ҫкі  м„ нғқ',S.txWarehouse,"showWhSearch('single')"):''}
          ${whInfo}
          ${needsLoc(type)?`<div style="font-size:11px;font-weight:700;color:var(--muted);margin-top:8px;margin-bottom:6px;">мң„нғҒмІҳ м„ нғқ</div><div class="selector-row ${S.txLocation?'sel':''}" onclick="showLocSearch()"><span class="selector-text">${S.txLocation?S.txLocation.name:'мң„нғҒмІҳлҘј м„ нғқн•ҳм„ёмҡ”'}</span><span>в–ј</span></div>${locInfo}`:''}

function showStockSearch(){
  const isBatch=S.txType==='in'||S.txType==='out';
  const searchTab=S._stockSearchTab||'product';
  const allItems={
    product:S.products.map(p=>({id:p.id,name:p.name,code:p.code||'',stock:getTotalStock(p),itemType:'product'})),
    ingredient:S.ingredients.filter(i=>!PKG_CATS.includes(i.category||'')).map(i=>({id:i.id,name:i.name,code:i.category||'',stock:i.current_stock||0,itemType:'ingredient'})),
    packaging:S.ingredients.filter(i=>PKG_CATS.includes(i.category||'')).map(i=>({id:i.id,name:i.name,code:i.category||'',stock:i.current_stock||0,itemType:'ingredient'})),
  };
  const items=allItems[searchTab]||[];
  const tabs=[['product','рҹ“Ұ м ңн’Ҳ'],['ingredient','рҹ§Ә мӣҗмһ¬лЈҢ'],['packaging','рҹ“Ұ нҸ¬мһҘмһ¬']];
  const tabBar=tabs.map(([v,l])=>`<button onclick="S._stockSearchTab='${v}';showStockSearch()" style="flex:1;padding:8px 4px;border:none;background:none;font-size:12px;font-weight:700;cursor:pointer;border-bottom:2px solid ${searchTab===v?'var(--primary)':'transparent'};color:${searchTab===v?'var(--primary)':'var(--muted)'};">${l}</button>`).join('');
  const onSelect=isBatch
    ?`S.txItems.push({...S.ingredients.find(x=>x.id==='ID')||S.products.find(x=>x.id==='ID'),id:'ID',name:'NAME',code:'CODE',stock:STOCK,itemType:'ITYPE',qty:1});closeModal();renderInOut()`
    :`S.txProduct={id:'ID',name:'NAME',code:'CODE',_itemType:'ITYPE'};if(!S.txWarehouse)S.txWarehouse=getDefaultWarehouse();closeModal();renderInOut()`;
  const rows=items.map(it=>{
    const fn=isBatch
      ?`S.txItems.push({id:'${it.id}',name:'${it.name.replace(/'/g,"\\'")}',code:'${it.code}',stock:${it.stock},itemType:'${it.itemType}',qty:1});closeModal();renderInOut()`
      :`S.txProduct={id:'${it.id}',name:'${it.name.replace(/'/g,"\\'")}',code:'${it.code}',_itemType:'${it.itemType}'};if(!S.txWarehouse)S.txWarehouse=getDefaultWarehouse();closeModal();renderInOut()`;
    return`<div class="sitem" onclick="${fn}"><div><div class="sitem-name">${it.name}</div><div class="sitem-sub">${it.code} В· мһ¬кі  ${it.stock}к°ң</div></div><span class="badge badge-primary">${it.stock}</span></div>`;
  }).join('');
  showModal('мһ¬кі  м„ нғқ',`
    <div style="display:flex;border-bottom:1px solid var(--border2);margin-bottom:8px;">${tabBar}</div>
    <div class="search-box" style="margin-bottom:8px;"><input type="search" class="search-input" id="ss-inp" placeholder="кІҖмғү..." oninput="filterStockList(this.value,'${searchTab}')"></div>
    <div id="ss-list">${rows||'<div style="color:var(--muted);text-align:center;padding:20px;">н•ӯлӘ© м—ҶмқҢ</div>'}</div>
  `);
  setTimeout(()=>document.getElementById('ss-inp')?.focus(),200);
}
window.filterStockList=function(q,tab){
  const allItems={
    product:S.products,ingredient:S.ingredients.filter(i=>!PKG_CATS.includes(i.category||'')),packaging:S.ingredients.filter(i=>PKG_CATS.includes(i.category||''))
  };
  const isBatch=S.txType==='in'||S.txType==='out';
  const items=(allItems[tab]||[]).filter(i=>!q||i.name.toLowerCase().includes(q.toLowerCase()));
  const el=document.getElementById('ss-list');if(!el)return;
  const isIng=tab!=='product';
  el.innerHTML=items.map(it=>{
    const stock=isIng?(it.current_stock||0):getTotalStock(it);
    const itype=isIng?'ingredient':'product';
    const fn=isBatch
      ?`S.txItems.push({id:'${it.id}',name:'${it.name.replace(/'/g,"\\'")}',code:'${it.code||it.category||''}',stock:${stock},itemType:'${itype}',qty:1});closeModal();renderInOut()`
      :`S.txProduct={id:'${it.id}',name:'${it.name.replace(/'/g,"\\'")}',code:'${it.code||''}',_itemType:'${itype}'};if(!S.txWarehouse)S.txWarehouse=getDefaultWarehouse();closeModal();renderInOut()`;
    return`<div class="sitem" onclick="${fn}"><div><div class="sitem-name">${it.name}</div><div class="sitem-sub">${it.code||it.category||''} В· мһ¬кі  ${stock}к°ң</div></div><span class="badge badge-primary">${stock}</span></div>`;
  }).join('')||'<div style="color:var(--muted);text-align:center;padding:20px;">кІҖмғү кІ°кіј м—ҶмқҢ</div>';
};

/* лӢӨмӨ‘ мһ…м¶ңкі  мқјкҙ„ мІҳлҰ¬ */
async function submitBatchTx(){
  if(!S.txItems.length){toast('мһ¬кі лҘј м¶”к°Җн•ҳм„ёмҡ”','e');return;}
  const notes=document.getElementById('tx-notes')?.value||'';
  const errors=[];let success=0;
  for(const it of S.txItems){
    try{
      if(it.itemType==='ingredient'){
        await recordIngTx({ingredient_id:it.id,type:S.txType,quantity:it.qty||1});
      }else{
        await recordTx({product_id:it.id,type:S.txType,quantity:it.qty||1,warehouse_id:S.txWarehouse?.id,notes});
      }
      success++;
    }catch(e){errors.push(`${it.name}: ${e.message}`);}
  }
  await loadIngredients();await loadProducts();await loadWarehouseStocks();await loadTx();
  S.txItems=[];renderInOut();
  if(errors.length)toast(`${success}к°ң мҷ„лЈҢ, ${errors.length}к°ң мӢӨнҢЁ: ${errors[0]}`,'e');
  else toast(`${success}к°ң н•ӯлӘ© ${S.txType==='in'?'мһ…кі ':'м¶ңкі '} мҷ„лЈҢ`,'s');
}

async function submitTx(){
  if(!S.txProduct){toast('м ңн’Ҳмқ„ м„ нғқн•ҳм„ёмҡ”','e');return;}
  if(S.txType==='move'){
    if(!S.txWarehouse||!S.txToWarehouse){toast('м¶ңл°ң/лҸ„м°© м°Ҫкі лҘј м„ нғқн•ҳм„ёмҡ”','e');return;}
    if(S.txWarehouse.id===S.txToWarehouse.id){toast('м¶ңл°ңкіј лҸ„м°© м°Ҫкі к°Җ к°ҷмҠөлӢҲлӢӨ','e');return;}
  }
  if(needsLoc(S.txType)&&!S.txLocation){toast('мң„нғҒмІҳлҘј м„ нғқн•ҳм„ёмҡ”','e');return;}
  const qty=parseInt(document.getElementById('tx-qty').value);
  if(isNaN(qty)||qty<=0){toast('мҲҳлҹүмқ„ мһ…л Ҙн•ҳм„ёмҡ”','e');return;}
  const notes=document.getElementById('tx-notes')?.value||'';
  try{
    if(S.txType==='move'){
      await recordTx({product_id:S.txProduct.id,type:'move',quantity:qty,from_warehouse_id:S.txWarehouse.id,to_warehouse_id:S.txToWarehouse.id,notes});
    }else{
      await recordTx({product_id:S.txProduct.id,type:S.txType,quantity:qty,warehouse_id:S.txWarehouse?.id,location_id:S.txLocation?.id,notes});
    }
    await loadTx();await loadWarehouseStocks();
    const tt=TX_TYPES.find(t=>t.id===S.txType);
    toast(`${tt?.label||''} мІҳлҰ¬ мҷ„лЈҢ!`,'s');
    S.txProduct=null;S.txLocation=null;S.txToWarehouse=null;
    renderInOut();
  }catch(e){toast('мҳӨлҘҳ: '+e.message,'e');}
}

/* в”Җв”Җ м°Ҫкі  кҙҖлҰ¬ в”Җв”Җ */
function renderWarehouses(){

/* в”Җв”Җ л§Өм¶ң нҳ„нҷ© кіөнҶө н—¬нҚј в”Җв”Җ */
function getYearOrders(year){
  return S.salesOrders.filter(o=>{
    if(o.status!=='completed')return false;
    return new Date(o.created_at).getFullYear()===year;
  });
}
function getOrderItems(orders){
  return orders.flatMap(o=>S.salesOrderItems.filter(i=>i.order_id===o.id).map(i=>{
    const p=S.products.find(x=>x.id===i.product_id);
    return{...i,cost_price:p?.cost_price||0};
  }));
}
function calcOrderCommission(o){
  if(o.order_type!=='consignment'||!o.location_id)return 0;
  const loc=S.locations.find(l=>l.id===o.location_id);
  if(!loc||!loc.commission_rate)return 0;
  return Number(o.total_amount||0)*(loc.commission_rate/100);
}
function calcTax(income){
  if(income<=0)return 0;
  const b=[
    [14000000,0.06,0],[50000000,0.15,1260000],[88000000,0.24,5760000],
    [150000000,0.35,15440000],[300000000,0.38,19940000],[500000000,0.40,25940000],
    [1000000000,0.42,35940000],[Infinity,0.45,65940000]
  ];
  const [,r,d]=b.find(([l])=>income<=l);
  return Math.max(0,Math.round(income*r-d));
}

function revenueBarChart(orders,year){
  const monthly=Array.from({length:12},(_,m)=>{
    return orders.filter(o=>new Date(o.created_at).getMonth()===m)
      .reduce((a,o)=>a+Number(o.total_amount||0),0);
  });
  const maxV=Math.max(...monthly,1);
  const W=36,G=4,H=100,PL=8;
  const svgW=(W+G)*12+PL*2;
  const bars=monthly.map((v,i)=>{
    const h=Math.max(2,Math.round(v/maxV*H));
    const x=PL+i*(W+G);const y=H-h;
    const lbl=v>=10000?`${Math.round(v/10000)}л§Ң`:'';
    return`<rect x="${x}" y="${y}" width="${W}" height="${h}" fill="#4F46E5" rx="3" opacity="${v>0?'0.85':'0.15'}"/>
<text x="${x+W/2}" y="${H+14}" text-anchor="middle" font-size="9" fill="#888">${i+1}мӣ”</text>
${lbl?`<text x="${x+W/2}" y="${y-3}" text-anchor="middle" font-size="8" fill="#4F46E5">${lbl}</text>`:''}`;
  }).join('');
  return`<svg viewBox="0 0 ${svgW} ${H+24}" style="width:100%;height:140px;">${bars}</svg>`;
}

/* в”Җв”Җ н’ҲлӘ©лі„ л§Өм¶ң в”Җв”Җ */
function renderAnalyticsProducts(){

    byProd[i.product_name].qty+=i.quantity;

/* в”Җв”Җ лӮ©н’Ҳм„ң нҳ„нҷ© в”Җв”Җ */
function renderAnalyticsOrders(){
  const year=S.analyticsYear||new Date().getFullYear();

        <button onclick="calcVat()" style="padding:14px;background:#fff;border:none;border-radius:10px;color:#1a3a8f;font-size:15px;font-weight:700;cursor:pointer;">нҷ•мқё</button>
      </div>

          <div id="vat-supply" style="flex:1;padding:16px;background:rgba(255,255,255,0.15);border-radius:10px;font-size:18px;font-weight:700;text-align:right;color:rgba(255,255,255,0.5);min-height:54px;">00,000,000</div>

window.calcVat=function(){
  const val=parseFloat(document.getElementById('vat-input')?.value)||0;
  const supply=Math.round(val/1.1);
  const tax=val-supply;
  const fmt=n=>n>0?Number(n).toLocaleString():'00,000,000';
  const col=n=>n>0?'#fff':'rgba(255,255,255,0.4)';
  const s=document.getElementById('vat-supply');const t=document.getElementById('vat-tax');
  if(s){s.textContent=fmt(supply);s.style.color=col(supply);}
  if(t){t.textContent=fmt(tax);t.style.color=col(tax);}
};
window.resetVat=function(){
  const inp=document.getElementById('vat-input');
  if(inp)inp.value='';
  const s=document.getElementById('vat-supply');const t=document.getElementById('vat-tax');
  if(s){s.textContent='00,000,000';s.style.color='rgba(255,255,255,0.4)';}
  if(t){t.textContent='00,000,000';t.style.color='rgba(255,255,255,0.4)';}
  inp?.focus();
};

function copyOrderSQL(){
  const sql=`-- м ңн’Ҳ л¶„лҘҳ м»¬лҹј
ALTER TABLE products ADD COLUMN IF NOT EXISTS classification TEXT DEFAULT '';
-- лӮ©н’Ҳм„ң мӢ к·ң м»¬лҹј
ALTER TABLE sales_orders ADD COLUMN IF NOT EXISTS order_type TEXT DEFAULT 'sale';
ALTER TABLE sales_orders ADD COLUMN IF NOT EXISTS location_id UUID;
ALTER TABLE sales_orders ADD COLUMN IF NOT EXISTS location_name TEXT DEFAULT '';
ALTER TABLE sales_orders ADD COLUMN IF NOT EXISTS discount_type TEXT DEFAULT 'amount';
ALTER TABLE sales_orders ADD COLUMN IF NOT EXISTS discount_value DECIMAL(10,2) DEFAULT 0;
ALTER TABLE sales_orders ADD COLUMN IF NOT EXISTS warehouse_id UUID;
ALTER TABLE sales_orders ADD COLUMN IF NOT EXISTS warehouse_name TEXT DEFAULT '';
-- мӣҗмһ¬лЈҢ В· л ҲмӢңн”ј
CREATE TABLE IF NOT EXISTS ingredients (id UUID DEFAULT gen_random_uuid() PRIMARY KEY, name TEXT NOT NULL, category TEXT DEFAULT 'мӣҗлЈҢ', package_qty DECIMAL(10,3), package_unit TEXT DEFAULT 'g', package_price DECIMAL(10,2) DEFAULT 0, density DECIMAL(8,4), notes TEXT DEFAULT '', created_at TIMESTAMPTZ DEFAULT now(), updated_at TIMESTAMPTZ DEFAULT now());
CREATE TABLE IF NOT EXISTS recipes (id UUID DEFAULT gen_random_uuid() PRIMARY KEY, product_id UUID REFERENCES products(id) ON DELETE CASCADE, batch_weight_g INTEGER DEFAULT 1000, notes TEXT DEFAULT '', created_at TIMESTAMPTZ DEFAULT now(), updated_at TIMESTAMPTZ DEFAULT now());
CREATE TABLE IF NOT EXISTS recipe_items (id UUID DEFAULT gen_random_uuid() PRIMARY KEY, recipe_id UUID REFERENCES recipes(id) ON DELETE CASCADE, ingredient_id UUID REFERENCES ingredients(id) ON DELETE SET NULL, ingredient_name TEXT DEFAULT '', amount_g DECIMAL(10,3) DEFAULT 0, amount_unit TEXT DEFAULT 'g');
ALTER TABLE ingredients ADD COLUMN IF NOT EXISTS current_stock INTEGER DEFAULT 0;
ALTER TABLE consignment_locations ADD COLUMN IF NOT EXISTS commission_rate DECIMAL(5,2) DEFAULT 0;
ALTER TABLE ingredients ENABLE ROW LEVEL SECURITY; ALTER TABLE recipes ENABLE ROW LEVEL SECURITY; ALTER TABLE recipe_items ENABLE ROW LEVEL SECURITY;
CREATE POLICY "Public" ON ingredients FOR ALL USING (true) WITH CHECK (true); CREATE POLICY "Public" ON recipes FOR ALL USING (true) WITH CHECK (true); CREATE POLICY "Public" ON recipe_items FOR ALL USING (true) WITH CHECK (true);
ALTER TABLE products ADD COLUMN IF NOT EXISTS weight_g DECIMAL(10,2); ALTER TABLE products ADD COLUMN IF NOT EXISTS weight_unit TEXT DEFAULT 'g'; ALTER TABLE products ADD COLUMN IF NOT EXISTS cost_mode TEXT DEFAULT 'manual';
-- м°Ҫкі  н…Ңмқҙлё”
CREATE TABLE IF NOT EXISTS warehouses (id UUID DEFAULT gen_random_uuid() PRIMARY KEY, name TEXT NOT NULL, is_default BOOLEAN DEFAULT false, notes TEXT DEFAULT '', is_active BOOLEAN DEFAULT true, created_at TIMESTAMPTZ DEFAULT now(), updated_at TIMESTAMPTZ DEFAULT now());
CREATE TABLE IF NOT EXISTS warehouse_stocks (id UUID DEFAULT gen_random_uuid() PRIMARY KEY, product_id UUID REFERENCES products(id) ON DELETE CASCADE, warehouse_id UUID REFERENCES warehouses(id) ON DELETE CASCADE, quantity INTEGER DEFAULT 0, updated_at TIMESTAMPTZ DEFAULT now(), UNIQUE(product_id, warehouse_id));
ALTER TABLE warehouses ENABLE ROW LEVEL SECURITY; ALTER TABLE warehouse_stocks ENABLE ROW LEVEL SECURITY;
CREATE POLICY "Public" ON warehouses FOR ALL USING (true) WITH CHECK (true); CREATE POLICY "Public" ON warehouse_stocks FOR ALL USING (true) WITH CHECK (true);
-- transactions м»¬лҹј м¶”к°Җ
ALTER TABLE transactions ADD COLUMN IF NOT EXISTS warehouse_id UUID; ALTER TABLE transactions ADD COLUMN IF NOT EXISTS warehouse_name TEXT DEFAULT ''; ALTER TABLE transactions ADD COLUMN IF NOT EXISTS to_warehouse_id UUID; ALTER TABLE transactions ADD COLUMN IF NOT EXISTS to_warehouse_name TEXT DEFAULT '';
-- нҢҗл§Өм„ң
CREATE TABLE IF NOT EXISTS sales_orders (id UUID DEFAULT gen_random_uuid() PRIMARY KEY, order_no TEXT NOT NULL, customer TEXT DEFAULT '', status TEXT DEFAULT 'draft', sale_date DATE, ship_date DATE, notes TEXT DEFAULT '', total_amount DECIMAL(12,2) DEFAULT 0, created_by TEXT DEFAULT '', created_at TIMESTAMPTZ DEFAULT now(), updated_at TIMESTAMPTZ DEFAULT now());
CREATE TABLE IF NOT EXISTS sales_order_items (id UUID DEFAULT gen_random_uuid() PRIMARY KEY, order_id UUID REFERENCES sales_orders(id) ON DELETE CASCADE, product_id UUID REFERENCES products(id) ON DELETE SET NULL, product_name TEXT DEFAULT '', product_code TEXT DEFAULT '', quantity INTEGER DEFAULT 1, unit_price DECIMAL(10,2) DEFAULT 0);
-- л°ңмЈјм„ң
CREATE TABLE IF NOT EXISTS purchase_orders (id UUID DEFAULT gen_random_uuid() PRIMARY KEY, order_no TEXT NOT NULL, supplier TEXT DEFAULT '', status TEXT DEFAULT 'draft', order_date DATE, expected_date DATE, notes TEXT DEFAULT '', total_amount DECIMAL(12,2) DEFAULT 0, created_by TEXT DEFAULT '', created_at TIMESTAMPTZ DEFAULT now(), updated_at TIMESTAMPTZ DEFAULT now());
CREATE TABLE IF NOT EXISTS purchase_order_items (id UUID DEFAULT gen_random_uuid() PRIMARY KEY, order_id UUID REFERENCES purchase_orders(id) ON DELETE CASCADE, product_id UUID REFERENCES products(id) ON DELETE SET NULL, product_name TEXT DEFAULT '', product_code TEXT DEFAULT '', quantity INTEGER DEFAULT 1, unit_price DECIMAL(10,2) DEFAULT 0);
-- RLS
ALTER TABLE sales_orders ENABLE ROW LEVEL SECURITY; ALTER TABLE sales_order_items ENABLE ROW LEVEL SECURITY; ALTER TABLE purchase_orders ENABLE ROW LEVEL SECURITY; ALTER TABLE purchase_order_items ENABLE ROW LEVEL SECURITY;
CREATE POLICY "Public" ON sales_orders FOR ALL USING (true) WITH CHECK (true); CREATE POLICY "Public" ON sales_order_items FOR ALL USING (true) WITH CHECK (true); CREATE POLICY "Public" ON purchase_orders FOR ALL USING (true) WITH CHECK (true); CREATE POLICY "Public" ON purchase_order_items FOR ALL USING (true) WITH CHECK (true);`;
  navigator.clipboard.writeText(sql).then(()=>toast('SQL ліөмӮ¬лҗЁ! Supabase SQL Editorм—җ л¶ҷм—¬л„Јм–ҙ мӢӨн–үн•ҳм„ёмҡ”','s'));
}

window.addCategorySetting=function(){const input=document.getElementById('new-cat-input');const val=input?.value.trim();if(!val){toast('мһ…л Ҙн•ҳм„ёмҡ”','e');return;}const cats=getCategories();if(cats.includes(val)){toast('мқҙлҜё мһҲмҠөлӢҲлӢӨ','e');return;}saveCategories([...cats,val]);input.value='';refreshCategoryTagList();};
window.deleteCategorySetting=function(name){saveCategories(getCategories().filter(c=>c!==name));refreshCategoryTagList();};
function refreshCategoryTagList(){const cats=getCategories();const el=document.getElementById('cat-tag-list');if(!el)return;el.innerHTML=cats.length===0?'<span style="color:var(--muted);font-size:13px;">м—ҶмқҢ</span>':cats.map(c=>`<div class="tag-item">${c}<button class="tag-del" onclick="deleteCategorySetting('${c}')">Г—</button></div>`).join('');}
window.addClassificationSetting=function(){const input=document.getElementById('new-cls-input');const val=input?.value.trim();if(!val){toast('мһ…л Ҙн•ҳм„ёмҡ”','e');return;}const cls=getClassifications();if(cls.includes(val)){toast('мқҙлҜё мһҲмҠөлӢҲлӢӨ','e');return;}saveClassifications([...cls,val]);input.value='';refreshClassificationTagList();};
window.deleteClassificationSetting=function(name){saveClassifications(getClassifications().filter(c=>c!==name));refreshClassificationTagList();};
function refreshClassificationTagList(){const cls=getClassifications();const el=document.getElementById('cls-tag-list');if(!el)return;el.innerHTML=cls.length===0?'<span style="color:var(--muted);font-size:13px;">м—ҶмқҢ</span>':cls.map(c=>`<div class="tag-item">${c}<button class="tag-del" onclick="deleteClassificationSetting('${c}')">Г—</button></div>`).join('');}
window.saveTypeLabelChanges=function(){const own=document.getElementById('type-own-input')?.value.trim()||'мһҗмІҙмғқмӮ°';const oem=document.getElementById('type-oem-input')?.value.trim()||'OEM';saveTypeLabels({own,oem});toast('м ҖмһҘлҗЁ','s');};
function changeName(){const n=document.getElementById('new-name').value.trim();if(!n)return;S.cfg.username=n;localStorage.setItem('inv_username',n);closeModal();toast('мқҙлҰ„ ліҖкІҪлҗЁ','s');}
window.saveCompanyInfoForm=function(){saveCompanyInfo({name:document.getElementById('co-name')?.value.trim(),bizNo:document.getElementById('co-bizno')?.value.trim(),addr:document.getElementById('co-addr')?.value.trim(),bizType:document.getElementById('co-biztype')?.value.trim(),industry:document.getElementById('co-industry')?.value.trim(),manager:document.getElementById('co-manager')?.value.trim(),email:document.getElementById('co-email')?.value.trim(),bank:document.getElementById('co-bank')?.value.trim()});toast('нҡҢмӮ¬м •ліҙ м ҖмһҘлҗЁ','s');};
async function refreshAll(){toast('мғҲлЎңкі м№Ё мӨ‘...','i');await loadAll();closeModal();go(S.tab);toast('мҷ„лЈҢ','s');}
function resetApp(){if(!confirm('лЎңк·ём•„мӣғн•ҳмӢңкІ мҠөлӢҲк№Ң?'))return;localStorage.removeItem('inv_username');location.reload();}

/* в”Җв”Җ мң нӢё в”Җв”Җ */
function fmtDate(d){if(!d)return'-';const dt=new Date(d);return`${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`;}

function showModal(title,body,btns=[]){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  const footer=document.getElementById('modal-footer');
  if(btns.length){footer.innerHTML=btns.map(b=>`<button class="btn ${b.cls}" onclick="${b.fn}">${b.label}</button>`).join('');footer.style.display='flex';}
  else{footer.innerHTML='';footer.style.display='none';}
  document.getElementById('overlay').classList.add('on');
}
function closeModal(){document.getElementById('overlay').classList.remove('on');}
function overlayClick(e){if(e.target===document.getElementById('overlay'))closeModal();}
function toast(msg,type='i'){const wrap=document.getElementById('toasts');const el=document.createElement('div');el.className=`toast ${type}`;el.textContent=msg;wrap.appendChild(el);setTimeout(()=>el.remove(),3000);}
</script>
