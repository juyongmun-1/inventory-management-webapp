<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>재고 관리</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="재고관리">
<meta name="theme-color" content="#ffffff">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.1" integrity="sha384-fx4y4cDx8NYfissnVzdGJY3yVXWY3rn5ab5HTUjpvgT35oDiyAbjjqnLhnRmESNE" crossorigin="anonymous"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js" integrity="sha384-EnyY0/GSHQGSxSgMwaIPzSESbqoOLSexfnSMN2AP+39Ckmn92stwABZynq1JyzdT" crossorigin="anonymous"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --primary:#4F46E5;--primary-l:#EEF2FF;--primary-d:#3730A3;
  --success:#059669;--success-l:#ECFDF5;
  --warning:#D97706;--warning-l:#FFFBEB;
  --danger:#DC2626;--danger-l:#FEF2F2;
  --purple:#7C3AED;--purple-l:#F5F3FF;
  --bg:#F9FAFB;--card:#fff;
  --text:#111827;--muted:#9CA3AF;--border:#F3F4F6;--border2:#E5E7EB;
  --nav-h:60px;
}
html{height:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100%;overflow:hidden;overscroll-behavior:none;}
/* Setup */
.setup{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,var(--primary),var(--primary-d));z-index:500;}
.setup-card{background:#fff;border-radius:20px;padding:36px 24px;width:100%;max-width:400px;}
.setup-logo{text-align:center;margin-bottom:28px;}
.setup-logo .icon{font-size:52px;}
.setup-logo h1{font-size:22px;font-weight:800;margin-top:10px;color:var(--primary);}
.setup-logo p{color:var(--muted);font-size:13px;margin-top:4px;}
/* App shell — 실제 보이는 높이에 맞춘 flex 컬럼 (헤더/콘텐츠/하단바) */
.app{display:none;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;}
.app.on{display:flex;}
/* Header — 일반 flex 항목 (고정 높이) */
.hdr{flex:0 0 auto;background:#fff;padding:14px 16px 14px;padding-top:calc(env(safe-area-inset-top,0px) + 12px);border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;z-index:100;}
.hdr-center{position:absolute;left:50%;transform:translateX(-50%);text-align:center;}
.hdr-title{font-size:17px;font-weight:700;}
.hdr-left,.hdr-right{display:flex;align-items:center;gap:6px;min-width:60px;height:36px;}
.hdr-right{justify-content:flex-end;}
.icon-btn{width:36px;height:36px;border:none;background:transparent;border-radius:9px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--text);}
.icon-btn.primary{background:var(--primary);color:#fff;border-radius:50%;}
/* Content — 유일한 스크롤 영역 (flex가 남은 공간을 모두 차지) */
.content{flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding-bottom:24px;}
/* Bottom nav — 일반 flex 항목 (고정 높이, 더 이상 fixed 아님) */
.bnav{flex:0 0 auto;height:calc(var(--nav-h) + env(safe-area-inset-bottom,0px));padding-bottom:env(safe-area-inset-bottom,0px);background:#fff;border-top:1px solid var(--border2);display:flex;align-items:flex-start;padding-top:6px;z-index:100;}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--muted);border:none;background:none;}
.bnav-item.active{color:var(--primary);}
.bnav-icon{font-size:22px;line-height:1;}
.bnav-label{font-size:10px;font-weight:600;}
/* Sections */
.page-pad{padding:16px;}
.section-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:20px 16px 8px;}
/* Cards */
.card{background:#fff;border-radius:14px;margin:0 16px 10px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.card-pad{padding:16px;}
/* Row list items */
.row-list{background:#fff;border-radius:14px;margin:0 16px 10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.row-item{display:flex;align-items:center;justify-content:space-between;padding:15px 16px;border-bottom:1px solid var(--border);cursor:pointer;}
.row-item:last-child{border-bottom:none;}
.row-item:active{background:var(--bg);}
.row-label{font-size:15px;color:var(--text);}
.row-value{font-size:15px;color:var(--muted);display:flex;align-items:center;gap:4px;}
.row-value.set{color:var(--text);font-weight:600;}
.row-arrow{color:var(--muted);font-size:14px;}
/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px;}
.stat-box{background:#fff;border-radius:14px;padding:14px 12px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.stat-num{font-size:26px;font-weight:900;color:var(--primary);}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px;}
/* Badges */
.badge{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block;}
.badge-primary{background:var(--primary-l);color:var(--primary);}
.badge-success{background:var(--success-l);color:var(--success);}
.badge-warning{background:var(--warning-l);color:var(--warning);}
.badge-danger{background:var(--danger-l);color:var(--danger);}
.badge-gray{background:#F3F4F6;color:#374151;}
.badge-purple{background:var(--purple-l);color:var(--purple);}
/* Product card */
.prod-card{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;}
.prod-card:last-child{border-bottom:none;}
.prod-card:active{background:var(--bg);}
.prod-thumb{width:50px;height:50px;border-radius:10px;object-fit:cover;flex-shrink:0;}
.prod-thumb-ph{width:50px;height:50px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.prod-info{flex:1;min-width:0;}
.prod-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prod-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.prod-badges{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;}
.prod-stock{text-align:right;flex-shrink:0;}
.prod-num{font-size:22px;font-weight:900;color:var(--primary);}
.prod-num.low{color:var(--danger);}
.prod-num-lbl{font-size:10px;color:var(--muted);}
/* Order card */
.order-card{padding:16px;border-bottom:1px solid var(--border);cursor:pointer;}
.order-card:last-child{border-bottom:none;}
.order-card:active{background:var(--bg);}
.order-no{font-size:15px;font-weight:700;}
.order-meta{font-size:12px;color:var(--muted);margin-top:3px;}
.order-total{font-size:16px;font-weight:800;color:var(--primary);margin-top:4px;}
/* Status tabs */
.status-tabs{display:flex;overflow-x:auto;padding:0 12px;gap:0;border-bottom:1px solid var(--border2);background:#fff;justify-content:flex-start;}
.status-tabs::-webkit-scrollbar{display:none;}
.stab{padding:12px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;}
.stab.active{color:var(--primary);border-bottom-color:var(--primary);}
/* Form rows (order form style) */
.form-rows{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.fr{display:flex;align-items:center;justify-content:space-between;padding:15px 16px;border-bottom:1px solid var(--border);}
.fr:last-child{border-bottom:none;}
.fr-label{font-size:15px;color:var(--text);flex-shrink:0;min-width:72px;}
.fr-right{flex:1;text-align:right;display:flex;align-items:center;justify-content:flex-end;gap:6px;}
.fr-input{border:none;outline:none;font-size:15px;color:var(--text);text-align:right;background:transparent;width:100%;}
.fr-input::placeholder{color:var(--muted);}
.fr-muted{font-size:15px;color:var(--muted);}
/* Order items */
.order-item-row{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);background:#fff;}
.oi-name{flex:1;font-size:13px;font-weight:600;min-width:0;}
.oi-sub{font-size:11px;color:var(--muted);}
.oi-qty{width:52px;}
.oi-qty input{width:100%;padding:6px 8px;border:1.5px solid var(--border2);border-radius:8px;font-size:14px;font-weight:700;text-align:center;}
.oi-price{font-size:13px;font-weight:700;color:var(--primary);text-align:right;min-width:70px;}
.oi-del{width:28px;height:28px;border:none;background:var(--danger-l);color:var(--danger);border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
/* Buttons */
.btn{display:block;width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;text-align:center;transition:opacity .15s,transform .1s;}
.btn:active{transform:scale(.98);opacity:.88;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-secondary{background:var(--border2);color:var(--text);}
.btn-success{background:var(--success);color:#fff;}
.btn-danger{background:var(--danger);color:#fff;}
.btn-outline{background:transparent;border:1.5px solid var(--primary);color:var(--primary);}
.btn-sm{padding:9px 16px;font-size:14px;border-radius:10px;width:auto;display:inline-block;}
.btn-row{display:flex;gap:10px;padding:16px;}
.btn-row .btn{margin:0;}
/* Search */
.search-wrap{padding:12px 16px;}
.search-input{width:100%;padding:11px 14px 11px 36px;background:#fff;border:1.5px solid var(--border2);border-radius:12px;font-size:15px;}
.search-box{position:relative;}
.search-box::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;z-index:1;pointer-events:none;}
/* Filter chips */
.chips{display:flex;gap:6px;padding:0 16px 12px;overflow-x:auto;}
.chips::-webkit-scrollbar{display:none;}
.chip{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border2);background:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;color:var(--muted);}
.chip.active{border-color:var(--primary);background:var(--primary-l);color:var(--primary);}
/* Modal/Sheet */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:flex-end;}
.overlay.on{display:flex;}
.sheet{background:#fff;border-radius:20px 20px 0 0;padding:0 0 env(safe-area-inset-bottom,20px);width:100%;max-height:94vh;overflow-y:auto;animation:slideUp .25s ease;}
.handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 0;}
.modal-hd{padding:16px 18px 14px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:17px;font-weight:700;}
.modal-close{font-size:22px;color:var(--muted);cursor:pointer;border:none;background:none;}
.modal-body{padding:16px;}
.modal-footer{padding:0 16px 16px;display:flex;flex-wrap:wrap;gap:8px;}
.btn-fullrow{flex-basis:100%;order:9;}
.modal-footer .btn{margin:0;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
/* Toast */
.toast-wrap{position:fixed;top:56px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none;}
.toast{padding:10px 20px;border-radius:100px;font-size:13px;font-weight:700;color:#fff;animation:fadeIn .2s ease;box-shadow:0 4px 12px rgba(0,0,0,.15);}
.toast.s{background:var(--success);}
.toast.e{background:var(--danger);}
.toast.i{background:var(--primary);}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
/* Misc */
.slist{margin-top:8px;}
.sitem{padding:13px 0;border-bottom:1px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:space-between;}
.sitem:last-child{border-bottom:none;}
.sitem:active{opacity:.7;}
.sitem-name{font-size:14px;font-weight:700;}
.sitem-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.fg input,.fg select,.fg textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border2);border-radius:10px;font-size:16px;color:var(--text);background:#fff;-webkit-appearance:none;}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--primary);}
.fg textarea{resize:none;height:70px;}
.fg input:disabled{opacity:.5;background:var(--bg);}
.empty{text-align:center;padding:52px 20px;}
.empty .icon{font-size:44px;margin-bottom:10px;}
.empty p{color:var(--muted);font-size:14px;line-height:1.6;}
.divider{height:1px;background:var(--border2);margin:14px 0;}
.loc-stock-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);}
.loc-stock-row:last-child{border-bottom:none;}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.tag-item{background:var(--bg);border-radius:20px;padding:5px 10px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:5px;border:1px solid var(--border2);}
.tag-del{border:none;background:none;color:var(--muted);cursor:pointer;font-size:16px;line-height:1;padding:0;}
/* Photo upload */
.photo-upload-area{text-align:center;margin-bottom:18px;cursor:pointer;}
.photo-upload-box{width:90px;height:90px;border-radius:14px;margin:0 auto 8px;background:var(--bg);border:2px dashed var(--border2);overflow:hidden;display:flex;align-items:center;justify-content:center;}
.photo-upload-box img{width:100%;height:100%;object-fit:cover;}
.detail-hero-img{width:100%;max-height:180px;object-fit:cover;border-radius:12px;margin-bottom:14px;}
.detail-hero-ph{width:100%;height:100px;background:var(--bg);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:44px;margin-bottom:14px;}
/* TX icons */
.tx-item{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border);}
.tx-item:last-child{border-bottom:none;}
.tx-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.tx-icon.in{background:var(--success-l);}
.tx-icon.out{background:var(--danger-l);}
.tx-icon.send_consignment{background:var(--purple-l);}
.tx-icon.return_consignment{background:var(--warning-l);}
.tx-icon.consignment_sale,.tx-icon.warehouse_adj,.tx-icon.consignment_adj{background:var(--bg);}
.tx-info{flex:1;min-width:0;}
.tx-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tx-meta{font-size:11px;color:var(--muted);margin-top:1px;}
.tx-qty{font-size:14px;font-weight:800;flex-shrink:0;}
.tx-qty.in,.tx-qty.return_consignment{color:var(--success);}
.tx-qty.out,.tx-qty.consignment_sale{color:var(--danger);}
.tx-qty.send_consignment{color:var(--purple);}
.tx-qty.warehouse_adj,.tx-qty.consignment_adj{color:var(--muted);}
/* inout */
.type-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px;}
.type-btn{padding:10px 4px;border:2px solid var(--border2);border-radius:12px;background:#fff;cursor:pointer;text-align:center;}
.type-btn span{display:block;font-size:20px;margin-bottom:3px;}
.type-btn p{font-size:10px;font-weight:700;color:var(--muted);}
.type-btn.sel-in{border-color:var(--success);background:var(--success-l);}
.type-btn.sel-in p{color:var(--success);}
.type-btn.sel-out{border-color:var(--danger);background:var(--danger-l);}
.type-btn.sel-out p{color:var(--danger);}
.type-btn.sel-send{border-color:var(--purple);background:var(--purple-l);}
.type-btn.sel-send p{color:var(--purple);}
.type-btn.sel-return{border-color:var(--warning);background:var(--warning-l);}
.type-btn.sel-return p{color:var(--warning);}
.type-btn.sel-csale{border-color:var(--danger);background:var(--danger-l);}
.type-btn.sel-csale p{color:var(--danger);}
.type-btn.sel-wadj,.type-btn.sel-cadj{border-color:var(--muted);background:var(--bg);}
.type-btn.sel-wadj p,.type-btn.sel-cadj p{color:var(--muted);}
.selector-row{padding:13px 14px;border:1.5px solid var(--border2);border-radius:10px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:#fff;margin-bottom:13px;}
.selector-row.sel{border-color:var(--primary);background:var(--primary-l);}
.selector-text{font-size:15px;color:var(--muted);}
.selector-row.sel .selector-text{color:var(--text);font-weight:700;}
.infobox{background:var(--primary-l);border:1px solid #C7D2FE;border-radius:10px;padding:12px 14px;font-size:12px;color:var(--primary-d);line-height:1.6;margin-bottom:12px;}
@media(min-width:500px){
  .sheet{max-width:500px;margin:0 auto;border-radius:20px;}
  .overlay{align-items:center;justify-content:center;}
  .app{max-width:640px;margin:0 auto;border-left:1px solid var(--border2);border-right:1px solid var(--border2);}
}
</style>
</head>
<body>

<div class="setup" id="setup-screen" style="display:none">
  <div class="setup-card">
    <div class="setup-logo">
      <div class="icon">📦</div>
      <h1>재고 관리</h1>
      <p>창고 + 위탁처 통합 재고 관리</p>
    </div>
    <div class="fg"><label>내 이름</label><input type="text" id="sb-name" placeholder="홍길동" maxlength="20" autocomplete="off" style="font-size:18px;font-weight:700;text-align:center;"></div>
    <div class="fg"><label>이메일</label><input type="email" id="sb-email" placeholder="공용 계정 이메일" autocomplete="username" inputmode="email"></div>
    <div class="fg"><label>비밀번호</label><input type="password" id="sb-pw" placeholder="비밀번호" autocomplete="current-password" onkeydown="if(event.key==='Enter')finishSetup()"></div>
    <button class="btn btn-primary" onclick="finishSetup()">로그인 🚀</button>
  </div>
</div>

<div class="app" id="app">
  <div class="hdr" id="hdr">
    <div class="hdr-left" id="hdr-left"></div>
    <div class="hdr-center"><div class="hdr-title" id="hdr-title">홈</div></div>
    <div class="hdr-right" id="hdr-right"></div>
  </div>
  <div class="content" id="content"></div>
  <div class="bnav">
    <button class="bnav-item" id="nav-products" onclick="go('products')"><span class="bnav-icon">📦</span><span class="bnav-label">재고</span></button>
    <button class="bnav-item" id="nav-sales" onclick="go('sales')"><span class="bnav-icon">🧾</span><span class="bnav-label">납품서</span></button>
    <button class="bnav-item active" id="nav-dash" onclick="go('dash')"><span class="bnav-icon">🏠</span><span class="bnav-label">홈</span></button>
    <button class="bnav-item" id="nav-consign" onclick="go('consign')"><span class="bnav-icon">🚚</span><span class="bnav-label">위탁처</span></button>
    <button class="bnav-item" id="nav-more" onclick="go('more')"><span class="bnav-icon">⋯</span><span class="bnav-label">더보기</span></button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="sheet" id="sheet">
    <div class="handle"></div>
    <div class="modal-hd">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer" style="display:none;"></div>
  </div>
</div>
<div class="toast-wrap" id="toasts"></div>

<script>
const SB_URL='https://ctmbygkiqimctmouylof.supabase.co';
const SB_KEY='sb_publishable_uE-oA2O-lifSx7I9YcghdQ_v7I2wCRv';

const S={
  tab:'dash',products:[],locations:[],cstocks:[],transactions:[],
  salesOrders:[],salesOrderItems:[],purchaseOrders:[],purchaseOrderItems:[],
  ingredients:[],recipes:[],recipeItems:[],
  packageItems:[],pendingPackageItems:[],pkgForm:{},
  warehouses:[],warehouseStocks:[],
  cfg:null,sb:null,
  stockTab:'products',

function ingPricePerG(ing){
  if(!ing.package_qty||!ing.package_price)return 0;
  const ppu=ing.package_price/ing.package_qty; // 단위당 가격 (g 또는 ml)
  if(ing.package_unit==='ml'&&ing.density&&ing.density>0){
    // ml 단위: g당 가격 = ml당 가격 ÷ 밀도(g/ml)
    // 예) ₩98/ml ÷ 0.8g/ml = ₩122.5/g
    return ppu/ing.density;
  }
  return ppu; // g 단위: 그대로 g당 가격
}

window.importIngredientExcel=function(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      // 원재료 시트 우선, 없으면 첫 번째 시트
      const sheetName=wb.SheetNames.find(n=>n.includes('원재료'))||wb.SheetNames[0];
      const ws=wb.Sheets[sheetName];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
      // 헤더 행 찾기 (분류, 품목 등 포함)
      let headerRow=-1;
      for(let i=0;i<Math.min(rows.length,10);i++){
        const r=rows[i].map(c=>String(c||''));
        if(r.some(c=>c.includes('품목')||c.includes('분류')||c.includes('단가'))){headerRow=i;break;}
      }
      if(headerRow<0){toast('헤더를 찾을 수 없습니다. 품목/분류/단가 컬럼이 필요합니다','e');return;}
      const headers=rows[headerRow].map(c=>String(c||'').trim());
      const colIdx={
        category: headers.findIndex(h=>h.includes('분류')),
        name: headers.findIndex(h=>h.includes('품목')||h.includes('이름')||h.includes('원재료')),
        qty: headers.findIndex(h=>h.includes('용량')||h.includes('수량')),
        unit: headers.findIndex(h=>h==='단위'||h==='g'||h==='ml'),
        price: headers.findIndex(h=>h.includes('단가')&&!h.includes('/')),
        notes: headers.findIndex(h=>h.includes('비고')||h.includes('노트')),
      };
      const preview=[];
      for(let i=headerRow+1;i<rows.length;i++){
        const row=rows[i];
        if(!row||row.every(c=>c===null||c===''))continue;
        const name=colIdx.name>=0?String(row[colIdx.name]||'').trim():'';
        if(!name||name==='계'||name==='합계')continue;
        preview.push({
          category:colIdx.category>=0?String(row[colIdx.category]||'').trim():'원료',
          name,
          package_qty:colIdx.qty>=0?parseFloat(row[colIdx.qty])||null:null,
          package_unit:colIdx.unit>=0?String(row[colIdx.unit]||'g').trim():'g',
          package_price:colIdx.price>=0?parseFloat(row[colIdx.price])||0:0,
          notes:colIdx.notes>=0?String(row[colIdx.notes]||'').trim():'',
        });
      }
      if(!preview.length){toast('가져올 데이터가 없습니다','e');return;}
      S._ingImportPreview=preview; // 전역 상태에 저장 (onclick 문자열 전달 문제 회피)
      const existing=S.ingredients.map(i=>i.name.toLowerCase());
      showModal(`엑셀 가져오기 미리보기 (${preview.length}건)`,`
        <div style="font-size:13px;color:var(--muted);margin-bottom:10px;">가져올 항목을 선택하세요. 체크 해제하면 제외됩니다.</div>
        <div style="display:flex;gap:8px;margin-bottom:8px;">
          <button onclick="document.querySelectorAll('.ing-imp-chk').forEach(c=>c.checked=true)" style="padding:4px 10px;border:1.5px solid var(--border2);border-radius:8px;font-size:12px;cursor:pointer;background:#fff;">전체 선택</button>
          <button onclick="document.querySelectorAll('.ing-imp-chk').forEach(c=>c.checked=false)" style="padding:4px 10px;border:1.5px solid var(--border2);border-radius:8px;font-size:12px;cursor:pointer;background:#fff;">전체 해제</button>
        </div>
        <div class="row-list" style="max-height:320px;overflow-y:auto;">${preview.map((p,i)=>{
          const dup=existing.includes(p.name.toLowerCase());
          return`<div class="row-item" style="${dup?'opacity:.5':''}">
            <label style="display:flex;align-items:center;gap:10px;width:100%;cursor:pointer;">
              <input type="checkbox" class="ing-imp-chk" data-idx="${i}" ${dup?'':'checked'} style="width:18px;height:18px;flex-shrink:0;">
              <div><div style="font-weight:600;">${esc(p.name)}${dup?' <span style="color:var(--danger);font-size:11px;">(이미 등록됨)</span>':''}</div>
              <div style="font-size:11px;color:var(--muted);">${esc(p.category)} · ${p.package_qty||'-'}${p.package_unit} · ₩${Number(p.package_price).toLocaleString()}</div></div>
            </label>
          </div>`;}).join('')}
        </div>
      `,[{label:'취소',cls:'btn-secondary',fn:'closeModal()'},{label:'가져오기',cls:'btn-primary',fn:'confirmIngImport()'}]);
      input.value='';
    }catch(err){toast('파일 파싱 오류: '+err.message,'e');}
  };
  reader.readAsArrayBuffer(file);
};

function getCostItems(pid){const s=localStorage.getItem('ci_'+pid);return s?JSON.parse(s):[];}
function saveCostItems(pid,items){localStorage.setItem('ci_'+pid,JSON.stringify(items));}
function getGlobalCostItems(){const s=localStorage.getItem('ci_global');return s?JSON.parse(s):[];}
function saveGlobalCostItems(items){localStorage.setItem('ci_global',JSON.stringify(items));}
// type: 'fixed'=고정금액/개, 'pct_material'=재료비%, 'pct_sale'=판매가%, 'ingredient'=포장재/원재료 참조
function costItemAmount(it,materialCost,salePrice){
  if(it.type==='fixed')return it.value;
  if(it.type==='pct_sale')return salePrice*(it.value/100);
  if(it.type==='ingredient'){
    const ing=S.ingredients.find(x=>x.id===it.ingredientId);
    if(!ing)return 0;
    const unitPrice=ing.package_qty?ing.package_price/ing.package_qty:(ing.package_price||0);
    return unitPrice*(it.qty||1);
  }
  return 0; // pct_material은 lossPct로 별도 처리
}
function calcCostItems(pid,materialCost){
  const p=S.products.find(x=>x.id===pid);
  const salePrice=p?.unit_price||0;
  const items=[...getGlobalCostItems().map(it=>({...it,_global:true})),...getCostItems(pid)];
  let extra=0,lossPct=0;
  items.forEach(it=>{
    if(it.type==='pct_material')lossPct+=it.value/100;
    else extra+=costItemAmount(it,materialCost,salePrice);
  });
  return{extra,lossPct,items,total:materialCost*(1+lossPct)+extra};
}

/* ── 레시피 · 원가계산 ── */
function calcRecipeCost(productId){
  const recipe=S.recipes.find(r=>r.product_id===productId);if(!recipe)return null;
  const items=S.recipeItems.filter(i=>i.recipe_id===recipe.id);
  if(!items.length)return null;
  const batchWeight=recipe.batch_weight_g||1000;
  let batchCost=0;
  const breakdown=items.map(ri=>{
    const ing=S.ingredients.find(x=>x.id===ri.ingredient_id);
    const ppg=ing?ingPricePerG(ing):0;
    let amtG=ri.amount_g||0;
    if(ri.amount_unit==='ml'&&ing?.density)amtG=amtG*ing.density;
    const cost=amtG*ppg;
    batchCost+=cost;
    return{name:ri.ingredient_name,amtG,ppg,cost};
  });
  return{batchCost,batchWeight,breakdown,recipe};
}
function unitCostFromRecipe(productId,p){
  const rc=calcRecipeCost(productId);if(!rc)return null;
  const wg=p?.weight_g||0;if(!wg)return null;
  const materialCost=rc.batchCost*(wg/rc.batchWeight);
  const ci=calcCostItems(productId,materialCost);
  return ci.total;
}
// 재료비만 (원가 항목 제외)
function unitMaterialCostOnly(productId,p){
  const rc=calcRecipeCost(productId);if(!rc)return null;
  const wg=p?.weight_g||0;if(!wg)return null;
  return rc.batchCost*(wg/rc.batchWeight);
}

window.importRecipeExcel=function(input){

      // 제품명 행 찾기 (제품명이 여러 컬럼에 있는 행)
      let prodRow=-1,ingStartRow=-1;
      for(let i=0;i<Math.min(rows.length,6);i++){

      const prodCols=[];
      const hdr=rows[prodRow];
      for(let c=2;c<hdr.length;c++){if(hdr[c]!=null&&String(hdr[c]).trim())prodCols.push({col:c,name:String(hdr[c]).trim()});}
      if(!prodCols.length){toast('제품 컬럼을 찾을 수 없습니다','e');return;}
      // 원재료 행 파싱
      const ingRows=[];
      for(let r=ingStartRow;r<rows.length;r++){
        const row=rows[r];
        const ingName=row[1]||row[2];
        if(!ingName||String(ingName).includes('계')||String(ingName).includes('합계'))continue;
        const name=String(ingName).replace(/\(.*?\)/g,'').trim();
        if(name)ingRows.push({row:r,name,rawName:String(ingName).trim()});
      }
      S._recipeImportData={prodCols,ingRows,rows,sheetName};
      // 제품 선택 모달
      showModal('레시피 가져오기 — 제품 선택',`
        <div style="font-size:13px;color:var(--muted);margin-bottom:12px;">가져올 제품을 선택하세요. (시트: ${sheetName})</div>
        <div class="row-list">${prodCols.map(pc=>`<div class="row-item" onclick="previewRecipeImport(${pc.col},'${jsAttr(pc.name)}')" style="cursor:pointer;">
          <span style="font-weight:700;">${esc(pc.name)}</span><span class="row-arrow">›</span>
        </div>`).join('')}</div>
      `);
      input.value='';
    }catch(err){toast('파일 오류: '+err.message,'e');}
  };
  reader.readAsArrayBuffer(file);
};
window.previewRecipeImport=function(col,excelProdName){
  const d=S._recipeImportData;if(!d)return;
  // 앱 제품과 매칭
  const matchedProd=S.products.find(p=>p.name.includes(excelProdName)||excelProdName.includes(p.name));

window.confirmRecipeImport=async function(col){
  const d=S._recipeImportData;if(!d)return;
  const productId=document.getElementById('ri-prod-select')?.value;
  if(!productId){toast('제품을 선택하세요','e');return;}
  const items=d.ingRows.map(ir=>{
    const amt=parseFloat(d.rows[ir.row]?.[col])||0;
    const matchedIng=S.ingredients.find(i=>i.name.replace(/\(.*?\)/g,'').trim()===ir.name||ir.name.includes(i.name)||i.name.includes(ir.name));
    return{name:ir.rawName,amount:amt,ingId:matchedIng?.id||null};
  }).filter(i=>i.amount>0);
  try{
    let recipe=S.recipes.find(r=>r.product_id===productId);
    if(!recipe){
      const{data}=await S.sb.from('recipes').insert({product_id:productId,batch_weight_g:1000,created_at:new Date().toISOString(),updated_at:new Date().toISOString()}).select().single();
      recipe=data;if(recipe)S.recipes.push(recipe);
    }else{
      await S.sb.from('recipe_items').delete().eq('recipe_id',recipe.id);
    }
    await S.sb.from('recipe_items').insert(items.map(it=>({recipe_id:recipe.id,ingredient_id:it.ingId||null,ingredient_name:it.name,amount_g:it.amount,amount_unit:'g'})));
    await loadRecipes();await autoSyncCost(productId);
    closeModal();renderRecipePage();toast(`레시피 ${items.length}개 항목 가져왔습니다`,'s');
  }catch(err){toast('오류: '+err.message,'e');}
};

function showRecipeEditor(productId){
  const p=S.products.find(x=>x.id===productId);if(!p)return;

  const rc=calcRecipeCost(productId);
  const matCost=p.weight_g&&rc?rc.batchCost*(p.weight_g/( recipe?.batch_weight_g||1000)):0;
  const ci=calcCostItems(productId,matCost);

  const salePrice=p.unit_price||0;
  const itemRows=items.map((ri)=>{

/* 원가 자동 동기화 (cost_mode=auto인 제품) */
async function autoSyncCost(productId,showMsg=false){
  const p=S.products.find(x=>x.id===productId);
  if(!p){if(showMsg)toast('제품을 찾을 수 없습니다','e');return;}
  if(p.cost_mode!=='auto'){if(showMsg)toast('원가 입력 방식이 "레시피 자동계산"이 아닙니다','w');return;}
  if(!p.weight_g){if(showMsg)toast('제품 무게(g)를 먼저 입력하세요','w');return;}
  const rc=calcRecipeCost(productId);
  if(!rc){if(showMsg)toast('레시피 항목이 없습니다. 레시피·원가계산에서 원재료를 추가하세요','w');return;}
  const uc=unitCostFromRecipe(productId,p);
  if(!uc){if(showMsg)toast('원가 계산 결과가 0입니다. 원재료 단가를 확인하세요','w');return;}
  const cost=Math.round(uc);
  await S.sb.from('products').update({cost_price:cost,updated_at:new Date().toISOString()}).eq('id',productId);
  p.cost_price=cost;
  if(showMsg)toast(`원가 ₩${cost.toLocaleString()} 자동 적용됨 ✓`,'s');
}

window.submitRecipeItem=async function(productId){
  const ingId=document.getElementById('ri-ing')?.value;
  const amt=parseFloat(document.getElementById('ri-amt')?.value)||0;

  const ing=S.ingredients.find(x=>x.id===ingId);

/* ── 한글 금액 ── */
function numToKorean(n){
  if(!n||n===0)return'영 원';
  const u=['','일','이','삼','사','오','육','칠','팔','구'];
  const bu=['','만','억'];
  const su=['','십','백','천'];
  let num=Math.abs(Math.round(n)),res='',bi=0;
  while(num>0){
    const chunk=num%10000;
    if(chunk>0){
      let cs='';
      const p=[Math.floor(chunk/1000),Math.floor(chunk%1000/100),Math.floor(chunk%100/10),chunk%10];
      const sn=['천','백','십',''];
      p.forEach((v,i)=>{if(v>0)cs+=(v>1||i===3?u[v]:'')+sn[i];});
      res=cs+bu[bi]+res;
    }
    num=Math.floor(num/10000);bi++;
  }
  return res+' 원';
}

    await loadAll();subscribeRT();
    document.getElementById('setup-screen').style.display='none';
    document.getElementById('app').classList.add('on');
    go('dash');
  }catch(e){toast('연결 실패: '+e.message,'e');document.getElementById('setup-screen').style.display='flex';}
}

async function finishSetup(){
  const name=document.getElementById('sb-name').value.trim();
  const email=document.getElementById('sb-email').value.trim();
  const pw=document.getElementById('sb-pw').value;
  if(!name){toast('이름을 입력하세요','e');return;}
  if(!email||!pw){toast('이메일과 비밀번호를 입력하세요','e');return;}
  if(!S.sb)S.sb=supabase.createClient(SB_URL,SB_KEY);
  toast('로그인 중...','i');
  const{error}=await S.sb.auth.signInWithPassword({email,password:pw});
  if(error){toast('로그인 실패: '+error.message,'e');return;}
  S.cfg={url:SB_URL,key:SB_KEY,username:name};
  localStorage.setItem('inv_username',name);
  try{
    await loadAll();subscribeRT();
    document.getElementById('setup-screen').style.display='none';
    document.getElementById('app').classList.add('on');
    go('dash');toast('환영합니다 '+name+'님 👋','s');
  }catch(e){toast('오류: '+e.message,'e');}
}

function loadErr(label,error){console.error('['+label+' 로드 실패]',error);toast(label+' 불러오기 실패 — 기존 데이터 유지','e');}
// DB에서 기존 최대 번호를 조회해 +1 (배열 길이 채번의 삭제·200건 제한·동시작성 중복 문제 회피)
async function nextOrderNo(table,prefix){
  const{data,error}=await S.sb.from(table).select('order_no').ilike('order_no',prefix+'%').order('order_no',{ascending:false}).limit(1);
  let max=0;
  if(!error&&data&&data.length){const m=String(data[0].order_no).match(/(\d+)\s*$/);if(m)max=parseInt(m[1],10);}
  return prefix+String(max+1).padStart(6,'0');
}

async function loadProducts(){const{data,error}=await S.sb.from('products').select('*').order('name');if(error){loadErr('제품',error);return;}S.products=data||[];}

function subscribeRT(){
  S.sb.channel('inv_rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'products'},()=>loadProducts().then(()=>{if(S.tab==='dash')renderDash();if(S.tab==='products')renderProducts();}))
    .on('postgres_changes',{event:'*',schema:'public',table:'consignment_stocks'},()=>loadCstocks().then(()=>{if(S.tab==='dash')renderDash();if(S.tab==='products')renderProducts();}))
    .on('postgres_changes',{event:'*',schema:'public',table:'warehouse_stocks'},()=>loadWarehouseStocks().then(()=>{if(S.tab==='dash')renderDash();if(S.tab==='products')renderProducts();if(S.tab==='warehouses')renderWarehouses();}))
    .on('postgres_changes',{event:'*',schema:'public',table:'transactions'},()=>loadTx().then(()=>{if(S.tab==='dash')renderDash();}))
    .on('postgres_changes',{event:'*',schema:'public',table:'sales_orders'},()=>loadSalesOrders().then(()=>{if(S.tab==='dash')renderDash();if(S.tab==='sales')renderSales();}))
    .on('postgres_changes',{event:'*',schema:'public',table:'purchase_orders'},()=>loadPurchaseOrders().then(()=>{if(S.tab==='purchase')renderPurchase();}))
    .subscribe();
}

/* ── 재고 헬퍼 ── */
function getCS(pid,lid){return S.cstocks.find(s=>s.product_id===pid&&s.location_id===lid);}
function getWS(pid,wid){return S.warehouseStocks.find(s=>s.product_id===pid&&s.warehouse_id===wid);}
function getTotalWarehouseStock(pid){return S.warehouseStocks.filter(s=>s.product_id===pid).reduce((a,s)=>a+s.quantity,0);}
function getTotalStock(p){
  const ws=S.warehouseStocks.filter(s=>s.product_id===p.id);
  const whTotal=ws.length>0?ws.reduce((a,s)=>a+s.quantity,0):p.current_stock;
  return whTotal+S.cstocks.filter(s=>s.product_id===p.id).reduce((a,s)=>a+s.quantity,0);
}
function getDefaultWarehouse(){return S.warehouses.find(w=>w.is_default)||S.warehouses[0]||null;}
// 특정 창고의 재고 수량. 행이 있으면 그 값, 없으면: 다른 창고에 행이 있으면 0(유령재고 방지), 행이 전혀 없는 레거시 제품만 current_stock fallback
function getWSQty(pid,wid){
  const ws=getWS(pid,wid);if(ws!=null)return ws.quantity;
  if(S.warehouseStocks.some(s=>s.product_id===pid))return 0;
  const p=S.products.find(x=>x.id===pid);return p?p.current_stock:0;
}

async function upsertWS(pid,wid,qty){
  const ex=getWS(pid,wid);const now=new Date().toISOString();
  if(ex){await S.sb.from('warehouse_stocks').update({quantity:qty,updated_at:now}).eq('id',ex.id);ex.quantity=qty;}
  else{const{data:ins}=await S.sb.from('warehouse_stocks').insert({product_id:pid,warehouse_id:wid,quantity:qty,updated_at:now}).select().single();if(ins)S.warehouseStocks.push(ins);}
  // sync current_stock = sum of all warehouse_stocks
  const total=getTotalWarehouseStock(pid);
  await S.sb.from('products').update({current_stock:total,updated_at:now}).eq('id',pid);
  const p=S.products.find(x=>x.id===pid);if(p)p.current_stock=total;
}

async function recordTx(data){
  const p=S.products.find(x=>x.id===data.product_id);
  if(!p)throw new Error('제품을 찾을 수 없습니다');
  const q=data.quantity;
  const now=new Date().toISOString();

  // warehouse stock before
  const wid=data.warehouse_id;
  // 창고 지정 시: 해당 창고 재고(없으면 0, 레거시 무창고 제품만 current_stock). 미지정 시: current_stock
  const ws0=wid?getWSQty(p.id,wid):p.current_stock;

  // for move type
  if(data.type==='move'){
    const fwid=data.from_warehouse_id,twid=data.to_warehouse_id;
    if(!fwid||!twid)throw new Error('출발/도착 창고를 선택하세요');
    const fw=getWS(p.id,fwid);const fw0=fw?fw.quantity:0;
    if(fw0<q)throw new Error(`출발 창고 재고 부족 (현재 ${fw0}개)`);
    const tw=getWS(p.id,twid);const tw0=tw?tw.quantity:0;
    const fwName=S.warehouses.find(w=>w.id===fwid)?.name||'';
    const twName=S.warehouses.find(w=>w.id===twid)?.name||'';
    const{error:te}=await S.sb.from('transactions').insert({product_id:p.id,product_name:p.name,type:'move',quantity:q,warehouse_id:fwid,warehouse_name:fwName,to_warehouse_id:twid,to_warehouse_name:twName,wh_before:fw0,wh_after:fw0-q,unit_price:p.unit_price||0,cost_price:p.cost_price||0,notes:data.notes||'',created_by:S.cfg.username,created_at:now});
    if(te)throw te;
    await upsertWS(p.id,fwid,fw0-q);await upsertWS(p.id,twid,tw0+q);
    return;
  }

  let wh0=ws0,wh1=ws0,cs0=0,cs1=0;
  if(data.location_id){const cs=getCS(p.id,data.location_id);cs0=cs?cs.quantity:0;cs1=cs0;}
  switch(data.type){
    case 'in':wh1=wh0+q;break;
    case 'out':wh1=wh0-q;if(wh1<0)throw new Error(`창고 재고 부족 (현재 ${wh0}개)`);break;
    case 'send_consignment':wh1=wh0-q;if(wh1<0)throw new Error(`창고 재고 부족 (현재 ${wh0}개)`);cs1=cs0+q;break;
    case 'return_consignment':cs1=cs0-q;if(cs1<0)throw new Error(`위탁 재고 부족`);wh1=wh0+q;break;
    case 'consignment_sale':cs1=cs0-q;if(cs1<0)throw new Error(`위탁 재고 부족`);break;
    case 'warehouse_adj':wh1=q;break;
    case 'consignment_adj':cs1=q;break;
  }
  const loc=S.locations.find(l=>l.id===data.location_id);
  const whName=wid?S.warehouses.find(w=>w.id===wid)?.name||'':'';
  const{error:te}=await S.sb.from('transactions').insert({product_id:p.id,product_name:p.name,type:data.type,quantity:q,warehouse_id:wid||null,warehouse_name:whName,location_id:data.location_id||null,location_name:loc?loc.name:'',wh_before:wh0,wh_after:wh1,cs_before:cs0,cs_after:cs1,unit_price:p.unit_price||0,cost_price:p.cost_price||0,notes:data.notes||'',created_by:S.cfg.username,created_at:now});
  if(te)throw te;
  if(wid&&wh1!==wh0)await upsertWS(p.id,wid,wh1);
  else if(!wid&&wh1!==wh0){await S.sb.from('products').update({current_stock:wh1,updated_at:now}).eq('id',p.id);p.current_stock=wh1;}
  if(data.location_id&&cs1!==cs0){
    const ex=getCS(p.id,data.location_id);
    if(ex){await S.sb.from('consignment_stocks').update({quantity:cs1,updated_at:now}).eq('id',ex.id);ex.quantity=cs1;}
    else{const{data:ins}=await S.sb.from('consignment_stocks').insert({product_id:p.id,location_id:data.location_id,quantity:cs1,updated_at:now}).select().single();if(ins)S.cstocks.push(ins);}
  }
}

/* ── 납품서 출고 완료 ── */
async function completeSalesOrder(id){
  const o=S.salesOrders.find(x=>x.id===id);if(!o)return;
  const isCS=o.order_type==='consignment';
  if(isCS&&!o.location_id){toast('위탁처가 지정되지 않았습니다','e');return;}
  const msg=isCS?'위탁처로 재고가 이동됩니다. 진행하시겠습니까?':'재고가 차감됩니다. 진행하시겠습니까?';
  if(!confirm(msg))return;
  const items=S.salesOrderItems.filter(i=>i.order_id===id);
  const whId=o.warehouse_id||getDefaultWarehouse()?.id;
  // 사전 재고 검증 — 부분 차감 후 재시도로 인한 이중 차감 방지 (출고·위탁발송 모두 창고 재고 차감)
  const need={};
  for(const item of items){if(item.product_id)need[item.product_id]=(need[item.product_id]||0)+item.quantity;}
  for(const pid in need){
    const avail=getWSQty(pid,whId);
    if(avail<need[pid]){const p=S.products.find(x=>x.id===pid);toast(`재고 부족: ${p?.name||''} (필요 ${need[pid]}, 보유 ${avail})`,'e');return;}
  }
  try{
    for(const item of items){
      if(!item.product_id)continue;
      if(isCS){
        await recordTx({product_id:item.product_id,type:'send_consignment',quantity:item.quantity,warehouse_id:whId,location_id:o.location_id,notes:`납품서 ${o.order_no}`});
      }else{
        await recordTx({product_id:item.product_id,type:'out',quantity:item.quantity,warehouse_id:whId,notes:`납품서 ${o.order_no}`});
      }
    }
    await S.sb.from('sales_orders').update({status:'completed',updated_at:new Date().toISOString()}).eq('id',id);
    await loadSalesOrders();await loadProducts();await loadCstocks();await loadWarehouseStocks();
    closeModal();toast('출고 완료 처리되었습니다','s');
    if(S.tab==='sales')renderSales();else if(S.tab==='dash')renderDash();
  }catch(e){toast('오류: '+e.message,'e');}
}

async function confirmQuote(id){
  await S.sb.from('sales_orders').update({status:'quote_confirmed',updated_at:new Date().toISOString()}).eq('id',id);
  await loadSalesOrders();closeModal();if(S.tab==='sales')renderSales();toast('견적이 확정되었습니다','s');
}
async function convertToDelivery(id){
  if(!confirm('납품서로 전환하면 출고대기 상태가 됩니다. 진행하시겠습니까?'))return;
  await S.sb.from('sales_orders').update({status:'pending',updated_at:new Date().toISOString()}).eq('id',id);
  await loadSalesOrders();closeModal();if(S.tab==='sales')renderSales();toast('납품서로 전환되었습니다','s');
}
async function deleteSalesOrder(id){
  if(!confirm('판매서를 삭제하시겠습니까?'))return;
  await S.sb.from('sales_orders').delete().eq('id',id);
  await loadSalesOrders();closeModal();
  if(S.tab==='sales')renderSales();else if(S.tab==='dash')renderDash();
  toast('삭제되었습니다','s');
}

window.showSoLocPicker=function(){
  if(!S.locations.length){toast('위탁처를 먼저 추가하세요','e');return;}
  showModal('위탁처 선택',`<div>${S.locations.map(loc=>`<div class="sitem" onclick="S._soLocId='${loc.id}';showSalesOrderForm(S.soEditOrder,true)"><div class="sitem-name">${esc(loc.name)}</div></div>`).join('')}</div>`);
};
window.showSoWhPicker=function(){
  if(!S.warehouses.length){toast('창고를 먼저 추가하세요','e');go('warehouses');return;}
  showModal('출고 창고 선택',`<div>${S.warehouses.map(w=>`<div class="sitem" onclick="S._soWarehouseId='${w.id}';showSalesOrderForm(S.soEditOrder,true)"><div class="sitem-name">${esc(w.name)}${w.is_default?' ⭐':''}</div></div>`).join('')}</div>`);
};
function calcDiscAmt(dType,dVal,subtotal){
  if(dType==='percent')return subtotal*dVal/100;
  if(dType==='amount_each'){
    return S.pendingItems.reduce((a,i)=>a+Math.min(dVal,i.unit_price||0)*(i.quantity||1),0);
  }
  return dVal; // amount (total)
}
function recalcSo(){
  const subtotal=S.pendingItems.reduce((a,i)=>a+(i.unit_price||0)*(i.quantity||1),0);
  const dType=document.getElementById('so-disc-type')?.value||S._soDiscType||'amount';
  const dVal=parseFloat(document.getElementById('so-disc-val')?.value)||0;
  const discAmt=calcDiscAmt(dType,dVal,subtotal);
  const total=Math.max(0,subtotal-discAmt);
  const costTotal=S.pendingItems.reduce((a,i)=>a+(i.cost_price||0)*(i.quantity||1),0);
  const margin=total-costTotal;
  const mpct=total>0?(margin/total*100).toFixed(1):0;
  const el=id=>document.getElementById(id);
  if(el('so-subtotal-disp'))el('so-subtotal-disp').textContent='₩'+subtotal.toLocaleString();
  if(el('so-disc-disp'))el('so-disc-disp').textContent='-₩'+Math.round(discAmt).toLocaleString();
  if(el('so-total-display'))el('so-total-display').textContent='₩'+Math.round(total).toLocaleString();
  if(el('so-margin-disp'))el('so-margin-disp').textContent='₩'+Math.round(margin).toLocaleString()+` (${mpct}%)`;
}

function renderPendingItems(type){
  const wrap=document.getElementById(`${type==='sales'?'so':'po'}-items-wrap`);

      const sub=(item.unit_price||0)*(item.quantity||1);

      return`<div class="order-item-row" style="margin-bottom:2px;">

}

window.addPendingItem=function(productId,type,src){
  const isIng=src==='ing';
  const p=isIng?S.ingredients.find(x=>x.id===productId):S.products.find(x=>x.id===productId);if(!p)return;
  const exists=S.pendingItems.find(i=>i.product_id===productId);
  if(exists){exists.quantity++;}
  else{S.pendingItems.push({product_id:p.id,product_name:p.name,product_code:p.code||'',quantity:1,unit_price:isIng?(p.package_price||0):(p.unit_price||0),cost_price:p.cost_price||0,_itemType:isIng?'ingredient':'product'});}

async function submitSalesOrder(id,status){
  const oType=S._soType||'sale';
  const custSel=document.getElementById('so-customer')?.value.trim()||'';
  const custTxt=document.getElementById('so-customer-txt')?.value.trim()||'';
  const customer=oType==='sale'?(custSel&&custSel!==''?custSel:custTxt||S._soCustomer||''):'';
  const locId=oType==='consignment'?S._soLocId:null;
  const locName=locId?S.locations.find(l=>l.id===locId)?.name||'':'';
  if(oType==='consignment'&&!locId&&status!=='draft'){toast('위탁처를 선택하세요','e');return;}
  const saleDate=document.getElementById('so-date')?.value||new Date().toISOString().substring(0,10);
  const shipDate=document.getElementById('so-ship')?.value||null;
  const notes=document.getElementById('so-notes')?.value.trim()||'';
  const discType=document.getElementById('so-disc-type')?.value||S._soDiscType||'amount';
  const discVal=parseFloat(document.getElementById('so-disc-val')?.value)||0;
  const warehouseId=S._soWarehouseId||getDefaultWarehouse()?.id||null;
  const warehouseName=S.warehouses.find(w=>w.id===warehouseId)?.name||'';
  if(S.pendingItems.length===0&&status!=='draft'){toast('제품을 추가하세요','e');return;}
  const subtotal=S.pendingItems.reduce((a,i)=>(a+(i.unit_price||0)*(i.quantity||1)),0);
  const discAmt=calcDiscAmt(discType,discVal,subtotal);
  const total=Math.max(0,subtotal-discAmt);
  const now=new Date().toISOString();
  try{
    let orderId=id;
    const payload={customer,status,order_type:oType,location_id:locId||null,location_name:locName,warehouse_id:warehouseId,warehouse_name:warehouseName,sale_date:saleDate,ship_date:shipDate||null,notes,discount_type:discType,discount_value:discVal,total_amount:total,updated_at:now};
    if(!id){
      const no=await nextOrderNo('sales_orders','SO-');
      const{data,error}=await S.sb.from('sales_orders').insert({...payload,order_no:no,created_by:S.cfg.username,created_at:now}).select().single();
      if(error)throw error;orderId=data.id;
    }else{
      const{error}=await S.sb.from('sales_orders').update(payload).eq('id',id);
      if(error)throw error;
      await S.sb.from('sales_order_items').delete().eq('order_id',id);
    }
    if(S.pendingItems.length>0){
      const{error}=await S.sb.from('sales_order_items').insert(S.pendingItems.map(i=>({order_id:orderId,product_id:i.product_id,product_name:i.product_name,product_code:i.product_code,quantity:i.quantity,unit_price:i.unit_price,cost_price:i.cost_price||0})));
      if(error)throw error;
    }
    await loadSalesOrders();closeModal();
    if(S.tab==='sales')renderSales();else if(S.tab==='dash')renderDash();
    toast(status==='draft'?'임시저장됨':'납품서 저장됨','s');
  }catch(e){toast('오류: '+e.message,'e');}
}

async function completePurchaseOrder(id){
  if(!confirm('입고 완료 처리하면 재고가 추가됩니다. 진행하시겠습니까?'))return;
  const items=S.purchaseOrderItems.filter(i=>i.order_id===id);
  try{
    const whId=getDefaultWarehouse()?.id;
    const poNo=S.purchaseOrders.find(o=>o.id===id)?.order_no||'';
    for(const item of items){
      if(item.item_type==='ingredient'&&item.ingredient_id){
        await recordIngTx({ingredient_id:item.ingredient_id,type:'in',quantity:item.quantity});
      }else if(item.product_id){
        await recordTx({product_id:item.product_id,type:'in',quantity:item.quantity,warehouse_id:whId,notes:`발주서 ${poNo}`});
      }
    }
    await S.sb.from('purchase_orders').update({status:'completed',updated_at:new Date().toISOString()}).eq('id',id);
    await loadPurchaseOrders();await loadProducts();await loadIngredients();await loadWarehouseStocks();
    closeModal();toast('입고 완료 처리되었습니다','s');
    if(S.tab==='purchase')renderPurchase();else if(S.tab==='dash')renderDash();
  }catch(e){toast('오류: '+e.message,'e');}
}

async function deletePurchaseOrder(id){

async function submitPurchaseOrder(id,status){
  const suppSel=document.getElementById('po-supplier')?.value.trim()||'';
  const suppTxt=document.getElementById('po-supplier-txt')?.value.trim()||'';
  const supplier=suppSel&&suppSel!==''?suppSel:suppTxt;

  const expectedDate=document.getElementById('po-expected')?.value||null;
  const notes=document.getElementById('po-notes')?.value.trim()||'';
  const total=S.pendingItems.reduce((a,i)=>(a+(i.unit_price||0)*(i.quantity||1)),0);
  const now=new Date().toISOString();
  try{
    let orderId=id;
    if(!id){
      const no=await nextOrderNo('purchase_orders','PO-');
      const{data,error}=await S.sb.from('purchase_orders').insert({order_no:no,supplier,status,order_date:orderDate,expected_date:expectedDate||null,notes,total_amount:total,created_by:S.cfg.username,created_at:now,updated_at:now}).select().single();

        const isIng=i._itemType==='ingredient';
        return{order_id:orderId,product_id:isIng?null:i.product_id,ingredient_id:isIng?i.product_id:null,item_type:isIng?'ingredient':'product',product_name:i.product_name,product_code:i.product_code||'',quantity:i.quantity,unit_price:i.unit_price};

function filteredProducts(){
  const f=S.pFilters||{};let arr=[...S.products];
  if(S.pSearch){const q=S.pSearch.toLowerCase();arr=arr.filter(p=>p.name.toLowerCase().includes(q)||p.code.toLowerCase().includes(q));}
  if(f.stock==='low')arr=arr.filter(p=>getTotalStock(p)<=p.min_stock&&p.min_stock>0);
  if(f.type)arr=arr.filter(p=>f.type==='own'?p.type!=='oem':p.type==='oem');
  if(f.classification)arr=arr.filter(p=>p.classification===f.classification);
  if(f.category)arr=arr.filter(p=>p.category===f.category);
  if(f.location==='has')arr=arr.filter(p=>S.cstocks.some(s=>s.product_id===p.id&&s.quantity>0));
  if(f.locName)arr=arr.filter(p=>{const loc=S.locations.find(l=>l.name===f.locName);return loc&&S.cstocks.some(s=>s.product_id===p.id&&s.location_id===loc.id&&s.quantity>0);});
  const sort=S.pSort||'name';
  if(sort==='name')arr.sort((a,b)=>a.name.localeCompare(b.name,'ko'));
  else if(sort==='name_desc')arr.sort((a,b)=>b.name.localeCompare(a.name,'ko'));
  else if(sort==='sku')arr.sort((a,b)=>(a.code||'').localeCompare(b.code||''));
  else if(sort==='sku_desc')arr.sort((a,b)=>(b.code||'').localeCompare(a.code||''));
  else if(sort==='stock')arr.sort((a,b)=>getTotalStock(b)-getTotalStock(a));
  else if(sort==='stock_asc')arr.sort((a,b)=>getTotalStock(a)-getTotalStock(b));
  else if(sort==='created')arr.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  return arr;
}

function componentUnitCost(type,id){
  if(type==='product'){const p=S.products.find(x=>x.id===id);return p?.cost_price||0;}
  const ing=S.ingredients.find(x=>x.id===id);if(!ing)return 0;
  return ing.package_qty?ing.package_price/ing.package_qty:(ing.package_price||0);
}
function calcPendingPackageCost(){return S.pendingPackageItems.reduce((a,it)=>a+(it.unitCost||0)*(it.qty||1),0);}

window.submitPackageProduct=async function(){
  const f=S.pkgForm;
  if(!f.name||!f.name.trim()){toast('패키지명을 입력하세요','e');return;}
  if(f.code){const dup=S.products.find(p=>p.code===f.code&&p.id!==f.id);if(dup){toast(`이미 사용 중인 SKU입니다 (${dup.name})`,'e');return;}}
  if(!S.pendingPackageItems.length){toast('구성품을 1개 이상 추가하세요','e');return;}
  const costPrice=Math.round(calcPendingPackageCost());
  const prod={name:f.name.trim(),code:f.code||'',category:f.category||'',type:f.type||'own',unit_price:parseFloat(f.unitPrice)||0,cost_price:costPrice,current_stock:parseInt(f.stock)||0,min_stock:parseInt(f.minStock)||0,product_type:'package',cost_mode:'manual'};
  if(S.pendingImageFile){try{prod.image_url=await uploadProductImage(S.pendingImageFile,f.code||f.name);}catch(e){toast('사진 업로드 실패: '+e.message,'e');}}
  try{
    const now=new Date().toISOString();
    let pid=f.id;
    if(pid){const{error}=await S.sb.from('products').update({...prod,updated_at:now}).eq('id',pid);if(error)throw error;}
    else{const{data,error}=await S.sb.from('products').insert({...prod,created_at:now,updated_at:now}).select().single();if(error)throw error;pid=data.id;}
    await S.sb.from('package_items').delete().eq('package_id',pid);
    if(S.pendingPackageItems.length){
      const{error:ie}=await S.sb.from('package_items').insert(S.pendingPackageItems.map(it=>({package_id:pid,component_type:it.component_type,component_id:it.component_id,component_name:it.component_name,qty:it.qty})));
      if(ie)throw ie;
    }
    await loadProducts();await loadPackageItems();
    S.pendingImageFile=null;S.pendingPackageItems=[];S.pkgForm={};
    closeModal();renderProducts();toast(f.id?'수정됨':'패키지 제품 추가됨','s');
  }catch(e){toast('오류: '+e.message,'e');}
};

window.recalcProductCode=function(){
  const t=document.getElementById('pc-type')?.value||'1';
  const c=document.getElementById('pc-cat')?.value||'C';
  const s=document.getElementById('pc-size')?.value||'D';
  const seq=String(parseInt(document.getElementById('pc-seq')?.value)||1).padStart(3,'0');
  const baseCode=`${t}${c}-${s}${seq}`;
  const mfrToggle=document.getElementById('pc-mfr-toggle');
  const mfrFields=document.getElementById('pc-mfr-fields');
  const useMfr=mfrToggle?.checked;
  if(mfrFields)mfrFields.style.display=useMfr?'grid':'none';
  let code=baseCode;
  if(useMfr){
    const today=new Date();const yy=String(today.getFullYear()).slice(2);const mm=String(today.getMonth()+1).padStart(2,'0');const dd=String(today.getDate()).padStart(2,'0');
    const dateEl=document.getElementById('pc-mfr-date');if(dateEl&&!dateEl.value)dateEl.placeholder=`${yy}${mm}${dd}`;
    const date=document.getElementById('pc-mfr-date')?.value||`${yy}${mm}${dd}`;
    const count=String(parseInt(document.getElementById('pc-mfr-count')?.value)||1).padStart(2,'0');
    code=`${baseCode}-${date}-${count}`;
  }
  const el=document.getElementById('pc-preview');if(el)el.textContent=code;
};
window.applyGeneratedCode=function(){
  const code=document.getElementById('pc-preview')?.textContent;
  const el=document.getElementById('pf-code');if(el&&code)el.value=code;
};
function previewProductImage(input){
  const file=input.files[0];if(!file)return;
  S.pendingImageFile=file;

  reader.onload=e=>{const box=document.getElementById('pf-img-box');if(box)box.innerHTML=`<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;">`;};
  reader.readAsDataURL(file);
}
async function uploadProductImage(file,code){
  const ext=file.name.split('.').pop().toLowerCase()||'jpg';
  const fileName=`${code.replace(/[^a-zA-Z0-9]/g,'_')}_${Date.now()}.${ext}`;
  const{error}=await S.sb.storage.from('product-images').upload(fileName,file,{upsert:true,contentType:file.type});
  if(error)throw error;
  const{data}=S.sb.storage.from('product-images').getPublicUrl(fileName);
  return data.publicUrl;
}
async function submitProduct(id){
  const name=document.getElementById('pf-name').value.trim(),code=document.getElementById('pf-code').value.trim();
  if(!name){toast('제품명은 필수입니다','e');return;}
  if(code){const dup=S.products.find(p=>p.code===code&&p.id!==id);if(dup){toast(`이미 사용 중인 SKU입니다 (${dup.name})`,'e');return;}}
  const catVal=document.getElementById('pf-cat').value;
  const clsVal='';
  const cmode=document.getElementById('pf-cmode')?.value||'manual';
  const prod={id:id||undefined,name,code,category:catVal,classification:clsVal,type:document.getElementById('pf-type').value,unit_price:parseFloat(document.getElementById('pf-up').value)||0,cost_price:cmode==='manual'?(parseFloat(document.getElementById('pf-cp').value)||0):(parseFloat(document.getElementById('pf-cp').value)||0),current_stock:parseInt(document.getElementById('pf-stock').value)||0,min_stock:parseInt(document.getElementById('pf-min').value)||0,weight_g:parseFloat(document.getElementById('pf-weight')?.value)||null,weight_unit:document.getElementById('pf-wunit')?.value||'g',cost_mode:cmode};
  if(!id)delete prod.id;
  if(S.pendingImageFile){try{toast('사진 업로드 중...','i');prod.image_url=await uploadProductImage(S.pendingImageFile,code);}catch(e){toast('사진 업로드 실패: '+e.message,'e');}}
  try{
    const now=new Date().toISOString();
    S.pendingImageFile=null;
    let savedId=id;
    if(id){const{id:_,created_at,...u}=prod;u.updated_at=now;const{error}=await S.sb.from('products').update(u).eq('id',id);if(error)throw error;}
    else{
      const dw=getDefaultWarehouse();const initStock=prod.current_stock||0;const useWH=dw&&initStock>0;
      // 초기 재고가 있으면 current_stock=0으로 넣고 기본 창고 입고 트랜잭션으로 배정(창고재고 행 생성 + 이력 기록)
      const{data:ins,error}=await S.sb.from('products').insert({...prod,current_stock:useWH?0:initStock,created_at:now,updated_at:now}).select().single();
      if(error)throw error;
      savedId=ins.id;S.products.push(ins);
      if(useWH)await recordTx({product_id:savedId,type:'in',quantity:initStock,warehouse_id:dw.id,notes:'초기 재고'});
    }
    await loadProducts();await loadWarehouseStocks();
    // cost_mode=auto이면 레시피에서 즉시 원가 재계산
    if(prod.cost_mode==='auto'&&savedId)await autoSyncCost(savedId,true);
    closeModal();renderProducts();toast(id?'수정됨':'추가됨','s');
  }catch(e){toast('오류: '+e.message,'e');}
}
async function confirmDeleteProduct(id){
  const p=S.products.find(p=>p.id===id);
  if(!confirm(`"${esc(p?.name)}"을 삭제하시겠습니까?`))return;
  await S.sb.from('products').delete().eq('id',id);await loadProducts();await loadPackageItems();closeModal();renderProducts();toast('삭제됨','s');
}

/* 원재료 입출고 처리 */
async function recordIngTx(data){
  const ing=S.ingredients.find(x=>x.id===data.ingredient_id);if(!ing)throw new Error('원재료를 찾을 수 없습니다');
  const cur=ing.current_stock||0;let next=cur;
  if(data.type==='in')next=cur+data.quantity;
  else if(data.type==='out'){next=cur-data.quantity;if(next<0)throw new Error(`재고 부족 (현재 ${cur}개)`);}
  else if(data.type==='adj')next=data.quantity;
  await S.sb.from('ingredients').update({current_stock:next,updated_at:new Date().toISOString()}).eq('id',data.ingredient_id);
  ing.current_stock=next;
}

function setTxType(t){
  // syncTxType()이 txBtnMode/txFromType/txToType에서 txType을 재도출하므로 그 상태들을 함께 설정해야 함
  const M={
    in:['in','external','external'],
    out:['out','warehouse','external'],
    move:['move','external','external'],
    warehouse_adj:['adj','warehouse','external'],
    consignment_adj:['adj','consignment','external'],
    send_consignment:['out','warehouse','consignment'],
    return_consignment:['in','consignment','external'],
    consignment_sale:['out','consignment','external'],
  }[t];
  if(M){S.txBtnMode=M[0];S.txFromType=M[1];S.txToType=M[2];}
  S.txType=t;S.txItems=[];renderInOut();
}
function syncTxType(){
  const m=S.txBtnMode,f=S.txFromType,t=S.txToType;
  if(m==='move')S.txType='move';
  else if(m==='adj')S.txType=f==='consignment'?'consignment_adj':'warehouse_adj';
  else if(m==='in')S.txType=f==='consignment'?'return_consignment':'in';
  else if(m==='out'){if(f==='consignment')S.txType='consignment_sale';else S.txType=t==='consignment'?'send_consignment':'out';}
}
function setTxBtnMode(m){S.txBtnMode=m;S.txFromType=m==='adj'?'warehouse':'external';S.txToType='external';S.txItems=[];S.txProduct=null;S.txLocation=null;S.txToWarehouse=null;syncTxType();renderInOut();}
function selectProd(id){S.txProduct=S.products.find(p=>p.id===id);if(!S.txWarehouse)S.txWarehouse=getDefaultWarehouse();renderInOut();}

/* 재고 검색 (제품 + 원재료 + 포장재 통합) */
function _stockSearchContext(){
  // 위탁처 재고만 표시: 출고-위탁처판매, 입고-위탁처회수
  const isCS=(S.txBtnMode==='out'&&S.txFromType==='consignment')||(S.txBtnMode==='in'&&S.txFromType==='consignment');
  // 특정 창고 재고만 표시: 이동
  const isWH=S.txBtnMode==='move';
  const isBatch=(S.txBtnMode==='in'&&S.txFromType==='external')||(S.txBtnMode==='out'&&S.txFromType==='warehouse'&&S.txToType==='external');
  return{isCS,isWH,isBatch};
}
function _getContextStock(it,isCS,isWH,isIng){
  if(isCS&&S.txLocation)return(getCS(it.id,S.txLocation.id)||{quantity:0}).quantity;
  if(isWH&&S.txWarehouse)return isIng?(it.current_stock||0):whStockInfo(it.id,S.txWarehouse.id);
  return isIng?(it.current_stock||0):getTotalStock(it);
}
function showStockSearch(){
  const {isCS,isWH,isBatch}=_stockSearchContext();
  // 원재료/포장재는 배치(외부 입고·외부 출고)와 창고 실사에서만 처리 가능 → 그 외 흐름은 제품 탭만
  const ingAllowed=isBatch||(S.txBtnMode==='adj'&&S.txFromType==='warehouse');
  const forceProductTab=!ingAllowed;
  const searchTab=forceProductTab?'product':(S._stockSearchTab||'product');
  if(forceProductTab)S._stockSearchTab='product';

  const baseItems={
    product:S.products,
    ingredient:S.ingredients.filter(i=>!PKG_CATS.includes(i.category||'')),
    packaging:S.ingredients.filter(i=>PKG_CATS.includes(i.category||'')),
  };
  const isIng=searchTab!=='product';
  let items=(baseItems[searchTab]||[]).map(it=>{
    const stock=_getContextStock(it,isCS,isWH,isIng);
    return{...it,_ctxStock:stock,_isIng:isIng};
  });
  // 위탁처/창고 필터 시 해당 재고 있는 것만
  if((isCS&&S.txLocation)||(isWH&&S.txWarehouse))items=items.filter(it=>it._ctxStock>0);

  const tabs=[['product','📦 제품'],['ingredient','🧪 원재료'],['packaging','📦 포장재']];
  const tabBar=forceProductTab?'':`<div style="display:flex;border-bottom:1px solid var(--border2);margin-bottom:8px;">${tabs.map(([v,l])=>`<button onclick="S._stockSearchTab='${v}';showStockSearch()" style="flex:1;padding:8px 4px;border:none;background:none;font-size:12px;font-weight:700;cursor:pointer;border-bottom:2px solid ${searchTab===v?'var(--primary)':'transparent'};color:${searchTab===v?'var(--primary)':'var(--muted)'};">${l}</button>`).join('')}</div>`;
  const contextLabel=isCS&&S.txLocation?`위탁 재고 (${esc(S.txLocation.name)})`:isWH&&S.txWarehouse?`창고 재고 (${esc(S.txWarehouse.name)})`:'재고';
  const rows=items.map(it=>{
    const itype=it._isIng?'ingredient':'product';
    const fn=isBatch
      ?`S.txItems.push({id:'${it.id}',name:'${jsAttr(it.name)}',code:'${jsAttr(it.code||it.category||'')}',stock:${it._ctxStock},itemType:'${itype}',qty:1});closeModal();renderInOut()`
      :`S.txProduct={id:'${it.id}',name:'${jsAttr(it.name)}',code:'${jsAttr(it.code||'')}',_itemType:'${itype}'};if(!S.txWarehouse)S.txWarehouse=getDefaultWarehouse();closeModal();renderInOut()`;
    return`<div class="sitem" onclick="${fn}"><div><div class="sitem-name">${esc(it.name)}</div><div class="sitem-sub">${esc(it.code||it.category||'')} · ${contextLabel} ${it._ctxStock}개</div></div><span class="badge badge-primary">${it._ctxStock}</span></div>`;
  }).join('');
  showModal('재고 선택',`
    ${tabBar}
    <div class="search-box" style="margin-bottom:8px;"><input type="search" class="search-input" id="ss-inp" placeholder="검색..." oninput="filterStockList(this.value,'${searchTab}')"></div>
    <div id="ss-list">${rows||`<div style="color:var(--muted);text-align:center;padding:20px;">${(isCS&&S.txLocation)||(isWH&&S.txWarehouse)?'해당 재고 없음':'항목 없음'}</div>`}</div>
  `);
  setTimeout(()=>document.getElementById('ss-inp')?.focus(),200);
}
window.filterStockList=function(q,tab){
  const {isCS,isWH,isBatch}=_stockSearchContext();
  const baseItems={
    product:S.products,ingredient:S.ingredients.filter(i=>!PKG_CATS.includes(i.category||'')),packaging:S.ingredients.filter(i=>PKG_CATS.includes(i.category||''))
  };
  const isIng=tab!=='product';
  let items=(baseItems[tab]||[]).filter(i=>!q||i.name.toLowerCase().includes(q.toLowerCase())).map(it=>{
    const stock=_getContextStock(it,isCS,isWH,isIng);
    return{...it,_ctxStock:stock,_isIng:isIng};
  });
  if((isCS&&S.txLocation)||(isWH&&S.txWarehouse))items=items.filter(it=>it._ctxStock>0);
  const el=document.getElementById('ss-list');if(!el)return;
  const contextLabel=isCS&&S.txLocation?`위탁 재고 (${esc(S.txLocation.name)})`:isWH&&S.txWarehouse?`창고 재고 (${esc(S.txWarehouse.name)})`:'재고';
  el.innerHTML=items.map(it=>{
    const itype=it._isIng?'ingredient':'product';
    const fn=isBatch
      ?`S.txItems.push({id:'${it.id}',name:'${jsAttr(it.name)}',code:'${jsAttr(it.code||it.category||'')}',stock:${it._ctxStock},itemType:'${itype}',qty:1});closeModal();renderInOut()`
      :`S.txProduct={id:'${it.id}',name:'${jsAttr(it.name)}',code:'${jsAttr(it.code||'')}',_itemType:'${itype}'};if(!S.txWarehouse)S.txWarehouse=getDefaultWarehouse();closeModal();renderInOut()`;
    return`<div class="sitem" onclick="${fn}"><div><div class="sitem-name">${esc(it.name)}</div><div class="sitem-sub">${esc(it.code||it.category||'')} · ${contextLabel} ${it._ctxStock}개</div></div><span class="badge badge-primary">${it._ctxStock}</span></div>`;
  }).join('')||'<div style="color:var(--muted);text-align:center;padding:20px;">검색 결과 없음</div>';
};

/* 다중 입출고 일괄 처리 */
async function submitBatchTx(){
  if(!S.txItems.length){toast('재고를 추가하세요','e');return;}
  const notes=document.getElementById('tx-notes')?.value||'';
  const errors=[];let success=0;
  for(const it of S.txItems){
    try{
      if(it.itemType==='ingredient'){
        await recordIngTx({ingredient_id:it.id,type:S.txType,quantity:it.qty||1});
      }else{
        await recordTx({product_id:it.id,type:S.txType,quantity:it.qty||1,warehouse_id:S.txWarehouse?.id,notes});
      }
      success++;
    }catch(e){errors.push(`${esc(it.name)}: ${e.message}`);}
  }
  await loadIngredients();await loadProducts();await loadWarehouseStocks();await loadTx();
  S.txItems=[];renderInOut();
  if(errors.length)toast(`${success}개 완료, ${errors.length}개 실패: ${errors[0]}`,'e');
  else toast(`${success}개 항목 ${S.txType==='in'?'입고':'출고'} 완료`,'s');
}

};
async function submitTx(){
  if(!S.txProduct){toast('제품을 선택하세요','e');return;}
  if(S.txType==='move'){
    if(!S.txWarehouse||!S.txToWarehouse){toast('출발/도착 창고를 선택하세요','e');return;}
    if(S.txWarehouse.id===S.txToWarehouse.id){toast('출발과 도착 창고가 같습니다','e');return;}
  }
  if(needsLoc(S.txType)&&!S.txLocation){toast('위탁처를 선택하세요','e');return;}
  const qty=parseInt(document.getElementById('tx-qty').value);
  if(isNaN(qty)||qty<=0){toast('수량을 입력하세요','e');return;}
  const notes=document.getElementById('tx-notes')?.value||'';
  try{
    if(S.txProduct._itemType==='ingredient'){
      const t=S.txType==='warehouse_adj'?'adj':S.txType;
      if(!['in','out','adj'].includes(t)){toast('원재료는 이 작업을 지원하지 않습니다','e');return;}
      await recordIngTx({ingredient_id:S.txProduct.id,type:t,quantity:qty});
      await loadIngredients();
    }else if(S.txType==='move'){
      await recordTx({product_id:S.txProduct.id,type:'move',quantity:qty,from_warehouse_id:S.txWarehouse.id,to_warehouse_id:S.txToWarehouse.id,notes});
    }else{
      await recordTx({product_id:S.txProduct.id,type:S.txType,quantity:qty,warehouse_id:S.txWarehouse?.id,location_id:S.txLocation?.id,notes});
    }
    await loadTx();await loadWarehouseStocks();
    const tt=TX_TYPES.find(t=>t.id===S.txType);
    toast(`${tt?.label||''} 처리 완료!`,'s');
    S.txProduct=null;S.txLocation=null;S.txToWarehouse=null;
    renderInOut();
  }catch(e){toast('오류: '+e.message,'e');}
}

/* ── 매출 현황 공통 헬퍼 ── */
function getYearOrders(year){
  return S.salesOrders.filter(o=>o.status==='completed'&&new Date(o.created_at).getFullYear()===year);
}
// consignment_sale 트랜잭션을 pseudo-order 형태로 변환
function getYearCsSales(year){
  return(S.transactions||[]).filter(t=>t.type==='consignment_sale'&&new Date(t.created_at).getFullYear()===year).map(t=>{
    const p=S.products.find(x=>x.id===t.product_id);
    // 판매 시점 스냅샷 우선, 없는 과거 데이터만 현재가로 fallback
    const unitPrice=(t.unit_price!=null)?Number(t.unit_price):(p?.unit_price||0);
    const costPrice=(t.cost_price!=null)?Number(t.cost_price):(p?.cost_price||0);
    return{id:'cs_'+t.id,created_at:t.created_at,total_amount:unitPrice*t.quantity,order_type:'cs_sale',location_name:t.location_name,location_id:t.location_id,status:'completed',_isCsSale:true,_tx:t,_unitPrice:unitPrice,_costPrice:costPrice};
  });
}
function getAllYearSales(year){return[...getYearOrders(year),...getYearCsSales(year)];}
function getOrderItems(orders){
  return orders.flatMap(o=>{
    if(o._isCsSale){
      const t=o._tx;
      return[{order_id:o.id,product_id:t.product_id,product_name:t.product_name,quantity:t.quantity,unit_price:o._unitPrice,cost_price:o._costPrice}];
    }
    return S.salesOrderItems.filter(i=>i.order_id===o.id).map(i=>{
      const p=S.products.find(x=>x.id===i.product_id);
      return{...i,cost_price:(i.cost_price!=null)?Number(i.cost_price):(p?.cost_price||0)};
    });
  });
}
function calcCsSaleCommission(o){
  if(!o._isCsSale||!o.location_id)return 0;
  const loc=S.locations.find(l=>l.id===o.location_id);
  if(!loc||!loc.commission_rate)return 0;
  return Number(o.total_amount||0)*(loc.commission_rate/100);
}
function calcOrderCommission(o){
  if(o.order_type!=='consignment'||!o.location_id)return 0;
  const loc=S.locations.find(l=>l.id===o.location_id);
  if(!loc||!loc.commission_rate)return 0;
  return Number(o.total_amount||0)*(loc.commission_rate/100);
}
function calcTax(income){
  if(income<=0)return 0;
  const b=[
    [14000000,0.06,0],[50000000,0.15,1260000],[88000000,0.24,5760000],
    [150000000,0.35,15440000],[300000000,0.38,19940000],[500000000,0.40,25940000],
    [1000000000,0.42,35940000],[Infinity,0.45,65940000]
  ];
  const [,r,d]=b.find(([l])=>income<=l);
  return Math.max(0,Math.round(income*r-d));
}

function revenueBarChart(orders,year){
  const monthly=Array.from({length:12},(_,m)=>{
    return orders.filter(o=>new Date(o.created_at).getMonth()===m)
      .reduce((a,o)=>a+Number(o.total_amount||0),0);
  });
  const maxV=Math.max(...monthly,1);
  const W=36,G=4,H=100,PL=8;
  const svgW=(W+G)*12+PL*2;
  const bars=monthly.map((v,i)=>{
    const h=Math.max(2,Math.round(v/maxV*H));
    const x=PL+i*(W+G);const y=H-h;
    const lbl=v>=10000?`${Math.round(v/10000)}만`:'';
    return`<rect x="${x}" y="${y}" width="${W}" height="${h}" fill="#4F46E5" rx="3" opacity="${v>0?'0.85':'0.15'}"/>
<text x="${x+W/2}" y="${H+14}" text-anchor="middle" font-size="9" fill="#888">${i+1}월</text>
${lbl?`<text x="${x+W/2}" y="${y-3}" text-anchor="middle" font-size="8" fill="#4F46E5">${lbl}</text>`:''}`;
  }).join('');
  return`<svg viewBox="0 0 ${svgW} ${H+24}" style="width:100%;height:140px;">${bars}</svg>`;
}

}

/* ── 품목별 매출 ── */
function renderAnalyticsProducts(){
  const year=S.analyticsYear||new Date().getFullYear();
  const orders=getAllYearSales(year);
  const items=getOrderItems(orders);
  const totalRev=orders.reduce((a,o)=>a+Number(o.total_amount||0),0);
  const byProd={};
  items.forEach(i=>{
    if(!byProd[i.product_name])byProd[i.product_name]={qty:0,rev:0,cost:0};
    byProd[i.product_name].qty+=i.quantity;
    byProd[i.product_name].rev+=(i.unit_price||0)*i.quantity;
    byProd[i.product_name].cost+=(i.cost_price||0)*i.quantity;
  });
  const rows=Object.entries(byProd).sort((a,b)=>b[1].rev-a[1].rev).map(([name,v])=>{
    const margin=v.rev-v.cost;
    const pct=totalRev>0?((v.rev/totalRev)*100).toFixed(1):0;
    return`<div class="row-item" style="flex-direction:column;align-items:flex-start;gap:4px;">
      <div style="display:flex;justify-content:space-between;width:100%;">
        <span style="font-weight:700;">${name}</span>
        <span style="font-weight:700;color:var(--primary);">₩${v.rev.toLocaleString()}</span>
      </div>
      <div style="display:flex;gap:12px;font-size:12px;color:var(--muted);">
        <span>수량 ${v.qty}개</span>
        <span>마진 ₩${margin.toLocaleString()}</span>
        <span>비중 ${pct}%</span>
      </div>
      <div style="width:100%;background:var(--border2);border-radius:4px;height:4px;margin-top:2px;">
        <div style="width:${pct}%;background:var(--primary);border-radius:4px;height:4px;"></div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('content').innerHTML=`
    <div style="padding:16px;">
      ${analyticsBackBtn()}
      <div style="font-weight:700;font-size:16px;margin-bottom:4px;">품목별 매출</div>
      <div style="color:var(--muted);font-size:13px;margin-bottom:16px;">${year}년 · 출고완료 기준</div>
      ${rows?`<div class="row-list">${rows}</div>`:'<div class="empty"><div class="icon">📦</div><p>데이터 없음</p></div>'}
    </div>`;
}

/* ── 판매처별 매출 ── */
function renderAnalyticsCustomers(){
  const year=S.analyticsYear||new Date().getFullYear();
  const orders=getAllYearSales(year);
  const totalRev=orders.reduce((a,o)=>a+Number(o.total_amount||0),0);
  const byDest={};
  orders.forEach(o=>{
    const dest=o._isCsSale?(o.location_name||'위탁처 미지정'):o.order_type==='consignment'?(o.location_name||'위탁처 미지정'):(o.customer||'고객 미지정');
    const type=o._isCsSale?'🛍️':o.order_type==='consignment'?'🚚':'🛒';
    if(!byDest[dest])byDest[dest]={cnt:0,rev:0,type,commission:0};
    byDest[dest].cnt++;byDest[dest].rev+=Number(o.total_amount||0);
    byDest[dest].commission+=o._isCsSale?calcCsSaleCommission(o):calcOrderCommission(o);
  });
  const totalCommission=Object.values(byDest).reduce((a,v)=>a+v.commission,0);
  const rows=Object.entries(byDest).sort((a,b)=>b[1].rev-a[1].rev).map(([dest,v])=>{
    const pct=totalRev>0?((v.rev/totalRev)*100).toFixed(1):0;
    return`<div class="row-item" style="flex-direction:column;align-items:flex-start;gap:4px;">
      <div style="display:flex;justify-content:space-between;width:100%;">
        <span style="font-weight:700;">${v.type} ${dest}</span>
        <span style="font-weight:700;color:var(--primary);">₩${v.rev.toLocaleString()}</span>
      </div>
      <div style="display:flex;gap:12px;font-size:12px;color:var(--muted);">
        <span>${v.cnt}건</span><span>비중 ${pct}%</span>
        ${v.commission>0?`<span style="color:var(--danger);">수수료 ₩${v.commission.toLocaleString()}</span>`:''}
      </div>
      <div style="width:100%;background:var(--border2);border-radius:4px;height:4px;margin-top:2px;">
        <div style="width:${pct}%;background:var(--primary);border-radius:4px;height:4px;"></div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('content').innerHTML=`
    <div style="padding:16px;">
      ${analyticsBackBtn()}
      <div style="font-weight:700;font-size:16px;margin-bottom:4px;">판매처별 매출</div>
      <div style="color:var(--muted);font-size:13px;margin-bottom:${totalCommission>0?'8px':'16px'};">${year}년 · 출고완료 기준</div>

      ${rows?`<div class="row-list">${rows}</div>`:'<div class="empty"><div class="icon">👥</div><p>데이터 없음</p></div>'}
    </div>`;
}

/* ── 납품서 현황 ── */
function renderAnalyticsOrders(){
  const year=S.analyticsYear||new Date().getFullYear();
  const allOrders=S.salesOrders.filter(o=>new Date(o.created_at).getFullYear()===year);
  const byStatus={quote:0,quote_confirmed:0,pending:0,completed:0};
  allOrders.forEach(o=>{if(byStatus[o.status]!==undefined)byStatus[o.status]++;});
  const monthly=Array.from({length:12},(_,m)=>({cnt:0,rev:0,month:m+1}));
  allOrders.filter(o=>o.status==='completed').forEach(o=>{
    const m=new Date(o.created_at).getMonth();
    monthly[m].cnt++;monthly[m].rev+=Number(o.total_amount||0);
  });
  const statusRows=[['quote','견적서',byStatus.quote],['quote_confirmed','견적확정',byStatus.quote_confirmed],['pending','출고대기',byStatus.pending],['completed','출고완료',byStatus.completed]].map(([s,l,c])=>`<div class="row-item"><span class="row-label"><span class="badge ${soStatusBadge(s)}">${l}</span></span><span class="row-value set">${c}건</span></div>`).join('');
  const monthlyRows=monthly.filter(m=>m.cnt>0).map(m=>`<div class="row-item"><span class="row-label">${m.month}월</span><div style="text-align:right;"><div style="font-weight:700;color:var(--primary);">₩${m.rev.toLocaleString()}</div><div style="font-size:12px;color:var(--muted);">${m.cnt}건</div></div></div>`).join('');
  document.getElementById('content').innerHTML=`
    <div style="padding:16px;">
      ${analyticsBackBtn()}
      <div style="font-weight:700;font-size:16px;margin-bottom:4px;">납품서 현황</div>
      <div style="color:var(--muted);font-size:13px;margin-bottom:16px;">${year}년 전체</div>

      <div class="row-list" style="margin-bottom:16px;">${statusRows}</div>

    </div>`;
}

  document.getElementById('content').innerHTML=`

        <button onclick="calcVat()" style="padding:14px;background:#fff;border:none;border-radius:10px;color:#1a3a8f;font-size:15px;font-weight:700;cursor:pointer;">확인</button>

          <div id="vat-supply" style="flex:1;padding:16px;background:rgba(255,255,255,0.15);border-radius:10px;font-size:18px;font-weight:700;text-align:right;color:rgba(255,255,255,0.5);min-height:54px;">00,000,000</div>

          <div id="vat-tax" style="flex:1;padding:16px;background:rgba(255,255,255,0.25);border-radius:10px;font-size:18px;font-weight:700;text-align:right;color:rgba(255,255,255,0.5);min-height:54px;">00,000,000</div>

window.calcVat=function(){
  const val=parseFloat(document.getElementById('vat-input')?.value)||0;
  const supply=Math.round(val/1.1);
  const tax=val-supply;
  const fmt=n=>n>0?Number(n).toLocaleString():'00,000,000';
  const col=n=>n>0?'#fff':'rgba(255,255,255,0.4)';
  const s=document.getElementById('vat-supply');const t=document.getElementById('vat-tax');
  if(s){s.textContent=fmt(supply);s.style.color=col(supply);}
  if(t){t.textContent=fmt(tax);t.style.color=col(tax);}
};
window.resetVat=function(){
  const inp=document.getElementById('vat-input');
  if(inp)inp.value='';
  const s=document.getElementById('vat-supply');const t=document.getElementById('vat-tax');
  if(s){s.textContent='00,000,000';s.style.color='rgba(255,255,255,0.4)';}
  if(t){t.textContent='00,000,000';t.style.color='rgba(255,255,255,0.4)';}
  inp?.focus();
};

      <button class="btn btn-outline btn-sm" onclick="saveCompanyInfoForm()">회사정보 저장</button>
    </div>
    <div style="margin-bottom:20px;">
      <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px;">내 계정</div>
      <div class="row-list" style="margin:0 0 14px;">
        <div class="row-item"><span class="row-label">👤 이름</span><span class="row-value set">${esc(S.cfg.username)}</span></div>

    <div style="margin-bottom:20px;">
      <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px;">카테고리 관리</div>
      <div class="tag-list" id="cat-tag-list">${cats.length===0?'<span style="color:var(--muted);font-size:13px;">없음</span>':cats.map(c=>`<div class="tag-item">${c}<button class="tag-del" onclick="deleteCategorySetting('${c}')">×</button></div>`).join('')}</div>
      <div style="display:flex;gap:8px;"><input id="new-cat-input" placeholder="새 카테고리" style="flex:1;padding:10px;border:1.5px solid var(--border2);border-radius:10px;font-size:14px;"><button onclick="addCategorySetting()" style="padding:10px 14px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;">추가</button></div>

      <div class="tag-list" id="cls-tag-list">${clsfs.length===0?'<span style="color:var(--muted);font-size:13px;">없음</span>':clsfs.map(c=>`<div class="tag-item">${c}<button class="tag-del" onclick="deleteClassificationSetting('${c}')">×</button></div>`).join('')}</div>
      <div style="display:flex;gap:8px;"><input id="new-cls-input" placeholder="예: 완제품, 원재료" style="flex:1;padding:10px;border:1.5px solid var(--border2);border-radius:10px;font-size:14px;"><button onclick="addClassificationSetting()" style="padding:10px 14px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;">추가</button></div>
